  /* Sheet leaves a gap at the top: a tappable backdrop strip + clears the iOS status-bar tap zone so

// ---------- storage (IndexedDB via idb-keyval; synchronous in-memory cache hydrated at boot) ----------
// App code keeps the synchronous load/save/del API. Reads come from the cache;
// writes update the cache immediately and persist to IndexedDB in the background.
const idbStore = createStore("bricktriage", "kv");
const cache = new Map();
const load = (k, f) => {

// One-time migration from localStorage (pre-v0.10 data), then hydrate cache.
async function initStorage() {
  const ks = await idbKeys(idbStore);
  if (ks.length === 0 && (localStorage.getItem("bt:index") || localStorage.getItem("rb_api_key"))) {
    const entries = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !(k.startsWith("bt:") || k === "rb_api_key")) continue;
      const raw = localStorage.getItem(k);
      if (raw == null) continue;
      if (k === "rb_api_key") { entries.push([k, raw]); continue; }
      try { entries.push([k, JSON.parse(raw)]); } catch {}
    }
    await idbSetMany(entries, idbStore);
    for (const [k, v] of entries) cache.set(k, v);
    // localStorage intentionally left untouched ŌĆö frozen snapshot / emergency fallback
  } else {
    const vals = await idbGetMany(ks, idbStore);
    ks.forEach((k, i) => cache.set(k, vals[i]));
  }
}

// #13: brick/axle separators are tools, not set parts ŌĆö excluded from inventory entirely.
const SEPARATOR_PARTS = new Set(["96874", "630", "6007"]);
function isSeparator(p) {
  const n = (p.partName || "").toLowerCase();

// Sticker sheets: e buys bulk with stickers ALREADY applied to the tiles, so the loose
// "sticker sheet" inventory row is noise. Hidden from the parts list + % by default (toggle in
// Settings, like spares). The applied tile itself is a normal part counted as usual.
function isStickerSheet(p) { return /sticker/i.test(p.partName || ""); }
function hideStickers() { return load("bt:hideStickers", true); }
// excluded from inventory/% entirely: separators always; sticker sheets when the setting is on.
function isExcludedPart(p) { return isSeparator(p) || (hideStickers() && isStickerSheet(p)); }

// (e.g. "30350bpb187"), but a set's Rebrickable inventory lists the plain mould ("30350b").
// Strip the trailing print/pattern suffix (pb187 / pr0001 / pat0001) and a trailing mould letter
// so the applied-sticker tile in hand matches the base tile the set needs.
const partKey = n => (n || "").toLowerCase().replace(/p[a-z]+\d+$/, "").replace(/[a-z]$/, "");

const blPartInSets = id => `https://www.bricklink.com/catalogItemIn.asp?P=${encodeURIComponent(id || "")}&in=S`;

// #10: spares are excluded from completion % by default; Settings can opt in (bt:countSpares).
function countSpares() { return !!load("bt:countSpares", false); }
function completion(parts, includeSpares = countSpares()) {
  let need = 0, found = 0;
  for (const p of parts) {
    if (isExcludedPart(p)) continue;
    if (p.isSpare && !includeSpares) continue;
    need += p.qtyNeeded; found += Math.min(p.qtyFound, p.qtyNeeded);
  }
  return { found, total: need, pct: need ? Math.round((found / need) * 100) : 0 };
}
const normSetNum = s => { const t = s.trim(); return t && !t.includes("-") ? `${t}-1` : t; };
// "last bulk buy" = the BULK-kind buy most recently added to (newest set dateAdded among its links);
// falls back to the newest-created bulk buy if none has sets yet. Regular buys never qualify.
const lastBulkBuyOf = (buys, index) => {
  const bulks = buys.filter(b => (b.kind || "bulk") === "bulk");
  if (!bulks.length) return null;
  let best = null, bestT = -1;
  for (const e of index) for (const id of (e.buyIds || [])) {
    const b = bulks.find(x => x.id === id);
    if (b && e.dateAdded > bestT) { bestT = e.dateAdded; best = b; }
  }
  return best || bulks[bulks.length - 1];
};
// price guide: the v2 catalogitem.page#T=P anchor often lands on the catalog tab (esp. on mobile)
// instead of the price guide ŌĆö catalogPG.asp opens the price-guide table directly. (#1 fix)
const blHref = n => `https://www.bricklink.com/catalogPG.asp?S=${encodeURIComponent(n)}`;
const partsVal = parts => {

  for (const p of parts) {
    if (isExcludedPart(p)) continue;
    const r = partRate(p).rate, f = Math.min(p.qtyFound, p.qtyNeeded);
    foundQty += f; foundVal += r * f; fullQty += p.qtyNeeded; fullVal += r * p.qtyNeeded;
  }
  return { foundQty, foundVal, fullQty, fullVal };
};

  const { found, total, pct } = completion(rec.parts);

    img: rec.imgDefault === "box" ? blBoxImg(rec.setNum) : rec.img, triage: rec.triage,
    instructions: rec.instructions, found, total, pct, dateAdded: rec.dateAdded, buyIds: rec.buyIds || [],
    theme: rec.theme || null, bookletQty: (rec.booklets || []).length, donor: !!rec.donor,
    condition: condOfSet(rec), built: !!rec.built, building: !!rec.building,
    pricePaid: rec.pricePaid || 0, rrp: rec.rrp || 0, boxHas: !!rec.box?.has,
    valueSet: rec.valueSet || null, valuePartOut: rec.valuePartOut || null, ...partsVal(rec.parts) };
};
// regular-buy ("receipt") spend is DERIVED: ╬Ż linked set prices + ╬Ż linked merch prices.
// Legacy receipts with a manually entered price fall back to it when nothing is linked.
const receiptTotals = (b, index, merch) => {
  let paid = 0, rrp = 0;
  for (const e of index) if ((e.buyIds || []).includes(b.id)) { paid += e.pricePaid || 0; rrp += e.rrp || 0; }
  for (const m of merch) if ((m.buyIds || []).includes(b.id)) { paid += m.pricePaid || 0; rrp += m.rrp || 0; }
  if (!paid && b.price) { paid = b.price; rrp = rrp || b.rrp || 0; }
  return { paid, rrp };

// ---------- APIs ----------
async function rbFetch(url) {
  const res = await fetch(url, { headers: { Authorization: `key ${getKey().trim()}` } });
  if (!res.ok) {
    const e = new Error(res.status === 404 ? "Set not found on Rebrickable." :
      res.status === 401 || res.status === 403 ? "Rebrickable rejected the API key (Settings)." :
      `Rebrickable error HTTP ${res.status}.`);
    e.status = res.status; throw e;
  }
  return res.json();
}
// Resolve a scanned/typed id to a Rebrickable PART. Direct lookup first; on 404 (printed/sticker
// parts like 65474pb04 live under a different Rebrickable number) fall back to Rebrickable's
// bricklink_id filter so the in-app "find sets" flow still works instead of punting to BrickLink.
// Guarded by count so a server that ignores the param (returning the whole catalogue) is rejected.
async function resolveRbPart(pn) {
  try {
    return await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(pn)}/`);
  } catch (e) {
    if (e.status !== 404) throw e;
    try {
      const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/?bricklink_id=${encodeURIComponent(pn)}&page_size=5`);
      if (Array.isArray(j.results) && j.results.length && (j.count == null || j.count <= 5)) {
        return j.results.find(r => r.external_ids?.BrickLink?.includes(pn)) || j.results[0];
      }
    } catch {}
    return null;
  }
}
// Rebrickable part-colour list ({color_id, color_name, part_img_url, num_sets} per colour), cached
// per part for the session so the colour picker / colour-correct images don't refetch. Resolves a
// BrickLink/printed id to its Rebrickable part first so the colours endpoint matches.
const _partColorCache = new Map();
async function fetchPartColors(partNum) {
  const ck = partKey(partNum);
  if (_partColorCache.has(ck)) return _partColorCache.get(ck);
  const resolved = await resolveRbPart(partNum);
  const pn = resolved?.part_num || partNum;
  const cj = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(pn)}/colors/?page_size=200`);
  const list = (cj.results || []).map(c => ({ color_id: c.color_id, color_name: c.color_name, part_img_url: c.part_img_url, num_sets: c.num_sets || 0 }))
    .sort((a, b) => (b.num_sets || 0) - (a.num_sets || 0));
  _partColorCache.set(ck, list);
  return list;
}
// Resolve a part+colour to the colour-CORRECT Rebrickable image (the generic part image shows the
// part in its default colour, which is why list thumbnails didn't match the real colour). Matches by
// stored rebrickable colour id first, else by colour name. Returns null if it can't be resolved.
async function colorImgFor(partNum, { rbColorId, colorName } = {}) {
  try {
    const cs = await fetchPartColors(partNum);
    let c = null;
    if (rbColorId != null && rbColorId !== "") c = cs.find(x => String(x.color_id) === String(rbColorId));
    if (!c && colorName) c = cs.find(x => (x.color_name || "").toLowerCase() === colorName.toLowerCase());
    if (c && c.part_img_url) return { img: c.part_img_url, rbColorId: c.color_id, colorName: c.color_name };
  } catch {}
  return null;
}

// ---------- themes (Rebrickable theme list cached once; sets store their ROOT theme name) ----------
async function fetchThemesMap() {
  const cached = load("bt:themes", null);
  if (cached?.map) return cached.map;
  let url = "https://rebrickable.com/api/v3/lego/themes/?page_size=1000";
  const map = {};
  while (url) {
    const j = await rbFetch(url);
    for (const t of (j.results || [])) map[t.id] = [t.name, t.parent_id];
    url = j.next;
  }
  save("bt:themes", { fetched: Date.now(), map });
  return map;
}
function rootTheme(map, id) {
  let cur = id, guard = 0;
  while (cur != null && map[cur] && map[cur][1] != null && guard++ < 20) cur = map[cur][1];
  return map[cur] ? map[cur][0] : null;
}

  let theme = null;
  try { const map = await fetchThemesMap(); theme = rootTheme(map, m.theme_id) || "Other"; } catch {}
  const meta = { setNum: m.set_num, name: m.name, year: m.year, img: m.set_img_url, numParts: m.num_parts,
    themeId: m.theme_id, theme };
  // inc_minifig_parts=0: keep the main parts list to the set's own bricks ŌĆö minifig parts (hair,
  // torsos, etc.) are fetched separately into rec.minifigs, so excluding them here stops the
  // duplicate "hair in the parts list" rows.
  let url = `https://rebrickable.com/api/v3/lego/sets/${setNum}/parts/?page_size=1000&inc_minifig_parts=0`;
  const rows = [];
  let page = 1;
  while (url) {
    onProgress?.(`Fetching parts ŌĆö page ${page}ŌĆ”`);
    const j = await rbFetch(url);
    rows.push(...j.results);
    url = j.next; page++;
  }
  const parts = rows.map((r, i) => ({
    id: `${r.part?.part_num}|${r.color?.id}|${r.is_spare ? "s" : "n"}|${i}`,
    partNumber: r.part?.part_num, partName: r.part?.name,
    colorID: r.color?.id, colorName: r.color?.name,
    img: r.part?.part_img_url, qtyNeeded: r.quantity, qtyFound: 0, isSpare: !!r.is_spare,
  }));
  let minifigs = [];
  try { minifigs = await fetchSetMinifigs(setNum, onProgress); } catch { minifigs = []; }
  return { meta, parts, minifigs };
}
// #6 minifigs: a set's figs + each fig's part inventory (legs/torso/head/hair/accessories).
// Stored on the set record (rec.minifigs), tracked separately from the main parts count.
async function fetchSetMinifigs(setNum, onProgress) {
  onProgress?.("Fetching minifigsŌĆ”");
  const figs = [];
  let url = `https://rebrickable.com/api/v3/lego/sets/${setNum}/minifigs/?page_size=100`;
  while (url) { const j = await rbFetch(url); figs.push(...(j.results || [])); url = j.next; }
  const out = [];
  for (const f of figs) {
    onProgress?.(`Minifig ${f.set_num}ŌĆ”`);
    const rows = [];
    let pu = `https://rebrickable.com/api/v3/lego/minifigs/${encodeURIComponent(f.set_num)}/parts/?page_size=1000`;
    while (pu) { const j = await rbFetch(pu); rows.push(...(j.results || [])); pu = j.next; }
    const figQty = f.quantity || 1;
    out.push({
      figNum: f.set_num, name: f.set_name, img: f.set_img_url, quantity: figQty,
      parts: rows.map((r, i) => ({
        id: `${f.set_num}|${r.part?.part_num}|${r.color?.id}|${r.is_spare ? "s" : "n"}|${i}`,
        partNumber: r.part?.part_num, partName: r.part?.name,
        colorID: r.color?.id, colorName: r.color?.name,
        // a set with 2├Ś of the same fig needs 2├Ś of each of its parts ŌĆö bake the fig count into qtyNeeded
        img: r.part?.part_img_url, qtyNeeded: r.quantity * figQty, qtyFound: 0, isSpare: !!r.is_spare,
      })),
    });
  }
  return out;
}
// minifig completion (excludes spares + separators, like the main parts list)
function minifigStats(figs) {
  let need = 0, found = 0;
  for (const f of (figs || [])) for (const p of (f.parts || [])) {
    if (isSeparator(p) || p.isSpare) continue;
    need += p.qtyNeeded; found += Math.min(p.qtyFound, p.qtyNeeded);
  }
  return { found, total: need, pct: need ? Math.round((found / need) * 100) : 0 };
}
async function downscale(file, max = 1024) {
  try {
    const img = await createImageBitmap(file);
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    if (scale === 1) { img.close?.(); return file; }
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    img.close?.();
    const blob = await new Promise(r => c.toBlob(r, "image/jpeg", 0.85));
    return blob || file;
  } catch { return file; } // unsupported format etc ŌĆö send original
}
const blobToDataURL = blob => new Promise((res, rej) => {

  r.onerror = () => rej(new Error("Photo read failed"));
  r.readAsDataURL(blob);
});

// #7 Remaining mode: segmented donut ŌĆö green (intact) / yellow (left) / purple (parted) / red (missing)
const RemainingRing = ({ needed, remaining, parted, missing, size = 64 }) => {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  const remCol = parted === 0 ? "var(--green)" : "var(--yellow)";
  const seg = (qty, offsetQty, col) => {
    const len = circ * (needed ? qty / needed : 0);
    return html`<circle cx=${size / 2} cy=${size / 2} r=${r} stroke=${col} stroke-width="6" fill="none"
      stroke-dasharray=${`${len} ${circ - len}`} stroke-dashoffset=${-circ * (needed ? offsetQty / needed : 0)}
      transform=${`rotate(-90 ${size / 2} ${size / 2})`}/>`;
  };
  return html`<svg width=${size} height=${size} style="flex-shrink:0">
    <circle cx=${size / 2} cy=${size / 2} r=${r} stroke="var(--line)" stroke-width="6" fill="none"/>
    ${seg(remaining, 0, remCol)}
    ${seg(parted, remaining, "var(--purple)")}
    ${seg(missing, remaining + parted, "var(--red)")}
    <text x="50%" y="46%" dominant-baseline="middle" text-anchor="middle" fill="var(--text)" font-size=${size * 0.28} font-weight="800">${remaining}</text>
    <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" fill="var(--dim)" font-size=${size * 0.15} font-weight="700">in set</text>
  </svg>`;
};
// aggregates for Remaining mode (excludes spares + separators). qtyFound is reused as "remaining in set".
function remainingStats(rec) {
  let needed = 0, remaining = 0;
  for (const p of rec.parts) {
    if (isExcludedPart(p) || p.isSpare) continue;
    needed += p.qtyNeeded;
    remaining += Math.min(Math.max(0, p.qtyFound), p.qtyNeeded);
  }
  const missing = Math.min(needed, Math.max(0, rec.missingCount || 0));
  const had = Math.max(0, needed - missing);
  const remDisp = Math.min(remaining, had);   // missing is authoritative; cap so segments sum to needed
  const parted = Math.max(0, had - remDisp);
  return { needed, remaining: remDisp, parted, missing, had };
}

// swipe-left a row to reveal Edit / Delete buttons (iOS-style) ŌĆö safer than tap-target glyphs that
// are easy to hit by accident. Pass onEdit to add a blue Edit action left of the red Delete.
function SwipeRow({ children, onDelete, onEdit }) {
  const acts = [];
  if (onEdit) acts.push({ label: "Edit", bg: "var(--blue)", fn: onEdit });
  if (onDelete) acts.push({ label: "Delete", bg: "var(--red)", fn: onDelete });
  const BW = 76, W = acts.length * BW; // total revealed width
  const [dx, setDx] = useState(0); // 0 = closed, -W = fully open
  const drag = useRef(null);
  const onStart = e => { drag.current = { x0: e.touches[0].clientX, base: dx }; };
  const onMove = e => { if (!drag.current) return; const d = drag.current.base + (e.touches[0].clientX - drag.current.x0); setDx(Math.max(-W, Math.min(0, d))); };
  const onEnd = () => { setDx(dx < -W / 2 ? -W : 0); drag.current = null; };
  return html`<div style="position:relative;margin-bottom:5px;border-radius:10px;overflow:hidden">
    ${dx < -1 && html`<div style=${`position:absolute;top:0;right:0;height:100%;width:${W}px;display:flex;z-index:0`}>
      ${acts.map(a => html`<button style=${`flex:1;height:100%;background:${a.bg};border:none;color:#fff;font-weight:700;font-size:13px`}
        onClick=${() => { setDx(0); a.fn?.(); }}>${a.label}</button>`)}
    </div>`}
    <div style=${`position:relative;z-index:1;background:var(--bg);transform:translateX(${dx}px);transition:${drag.current ? "none" : "transform .18s"};touch-action:pan-y`}
      onTouchStart=${onStart} onTouchMove=${onMove} onTouchEnd=${onEnd}>
      ${children}
    </div>
  </div>`;
}

// ---------- buy form (shared: Buys tab + quick-create in pickers + edit) ----------
const DEFAULT_CATEGORIES = ["FB Marketplace", "eBay", "Gumtree", "LEGO Store", "Kmart"];
const buyKind = b => (b.kind || "bulk");
const toDateStr = ts => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };
const fromDateStr = str => { const [y, m, dd] = str.split("-").map(Number); return new Date(y, m - 1, dd, 12).getTime(); };

const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });

function BuyForm({ categories, initial, submitLabel = "Add buy", onAdd, onCancel }) {
  const isEdit = !!initial?.id;
  const initCat = initial?.category || "";
  const [label, setLabel] = useState(initial?.label || "");
  const [price, setPrice] = useState(initial?.price ? String(initial.price) : "");
  const [shipping, setShipping] = useState(initial?.shipping ? String(initial.shipping) : "");
  const [rrp, setRrp] = useState(initial?.rrp ? String(initial.rrp) : "");
  const [kind, setKind] = useState(initial ? buyKind(initial) : "bulk");
  const [cat, setCat] = useState(initCat && !categories.includes(initCat) ? "__other" : initCat);
  const [catOther, setCatOther] = useState(initCat && !categories.includes(initCat) ? initCat : "");
  const [dateStr, setDateStr] = useState(toDateStr(initial?.date || Date.now()));
  const category = cat === "__other" ? catOther.trim() : cat;
  const showLabel = kind === "bulk" || kind === "loose" || isEdit;
  const autoName = () => `${category || "Receipt"} ŌĆö ${fmtDate(fromDateStr(dateStr))}`;
  return html`<div>
    ${showLabel && html`<div>
      <input name="bt-buy-label" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder=${kind === "loose" ? 'Label ŌĆö e.g. "PAB August"' : 'Label ŌĆö e.g. "Container 3 ŌĆö Gumtree March"'} value=${label}
        onInput=${e => setLabel(e.target.value)} />
      <div style="height:8px"></div>
    </div>`}
    <div class="row" style="gap:6px;flex-wrap:wrap">
      <${Chip} label="Bulk" color="var(--purple)" active=${kind === "bulk"} onClick=${() => setKind("bulk")} />
      <${Chip} label="Regular" color="var(--blue)" active=${kind === "regular"} onClick=${() => setKind("regular")} />
      <${Chip} label="Loose / PAB" color="var(--green)" active=${kind === "loose"} onClick=${() => setKind("loose")} />
    </div>
    <div style="height:8px"></div>
    <select value=${cat} onChange=${e => setCat(e.target.value)}>
      <option value="">${kind === "regular" ? "ŌĆö channel ŌĆö" : "ŌĆö channel (optional) ŌĆö"}</option>
      ${categories.map(c => html`<option value=${c}>${c}</option>`)}
      <option value="__other">OtherŌĆ”</option>
    </select>
    ${cat === "__other" && html`<div>
      <div style="height:8px"></div>
      <input placeholder="Custom channel" value=${catOther} onInput=${e => setCatOther(e.target.value)} />
    </div>`}
    <div style="height:8px"></div>
    ${kind === "regular"
      ? html`<div class="dim" style="font-size:12px;padding:2px 2px 0">Total + RRP are auto-calculated from the sets and merch linked to this receipt.</div>`
      : kind === "loose"
      ? html`<div>
          <${Label}>PAB box ŌĆö fill-a-box pricing</${Label}>
          <div class="row" style="gap:6px;flex-wrap:wrap">
            <${Chip} label="Small $17.95" color="var(--green)" active=${price === "17.95"} onClick=${() => setPrice("17.95")} />
            <${Chip} label="Large $32.99" color="var(--green)" active=${price === "32.99"} onClick=${() => setPrice("32.99")} />
          </div>
          <div style="height:8px"></div>
          <input inputmode="decimal" placeholder="Price paid (box / order)" value=${price} onInput=${e => setPrice(e.target.value)} />
          <div style="height:8px"></div>
          <${Label}>Shipping ŌĆö whole buy (optional)</${Label}>
          <input inputmode="decimal" placeholder="Order-level postage" value=${shipping} onInput=${e => setShipping(e.target.value)} />
          <div class="dim" style="font-size:12px;margin-top:6px">Itemise individual parts (with their own price + shipping) from the buy's detail after saving.</div>
        </div>`
      : html`<input inputmode="decimal" placeholder="Price paid (optional)" value=${price}
          onInput=${e => setPrice(e.target.value)} />`}
    <div style="height:8px"></div>
    <${Label}>Date purchased</${Label}>
    <input type="date" value=${dateStr} onChange=${e => e.target.value && setDateStr(e.target.value)} />
    ${kind === "regular" && !isEdit && html`<div class="dim" style="font-size:12px;margin-top:8px">Saves as "${autoName()}"</div>`}
    <div style="height:10px"></div>
    <div class="row" style="gap:8px">
      <button class="btn" style="flex:1" disabled=${kind === "bulk" && !label.trim()} onClick=${() =>
        onAdd({ ...(initial || {}), id: initial?.id || String(Date.now()),
          label: label.trim() || (kind === "regular" ? autoName() : kind === "loose" ? `PAB ŌĆö ${fmtDate(fromDateStr(dateStr))}` : ""),
          price: kind === "regular" ? (initial?.price || 0) : (parseFloat(price) || 0),
          shipping: kind === "loose" ? (parseFloat(shipping) || 0) : (initial?.shipping || 0),
          rrp: kind === "regular" ? (initial?.rrp || 0) : (initial?.rrp || 0),
          date: fromDateStr(dateStr), kind, category })}>${submitLabel}</button>
      ${onCancel && html`<button class="ghost" style="flex:1" onClick=${onCancel}>Cancel</button>`}
    </div>
  </div>`;
}

// ---------- buy picker (dropdown + inline quick-create) ----------
function BuySelect({ buys, cats, selected, onChange, onCreateBuy }) {
  const [creating, setCreating] = useState(false);
  const sel = selected || [];
  const chosen = buys.filter(b => sel.includes(b.id));
  const avail = buys.filter(b => !sel.includes(b.id));
  return html`<div>
    ${chosen.length > 0 && html`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:8px">
      ${chosen.map(b => html`<button class="chip"
        style="border-color:var(--purple);color:#1C1A17;background:var(--purple)"
        onClick=${() => onChange(sel.filter(id => id !== b.id))}>${b.label} ├Ś</button>`)}
    </div>`}
    ${!creating && html`<select value="" onChange=${e => {
        const v = e.target.value;
        if (v === "__new") setCreating(true);
        else if (v) onChange([...sel, v]);
        e.target.value = "";
      }}>
      <option value="">${chosen.length ? "+ add another buyŌĆ”" : "ŌĆö select bulk buy ŌĆö"}</option>
      ${avail.map(b => html`<option value=${b.id}>${b.label}</option>`)}
      <option value="__new">’╝ŗ New bulk buyŌĆ”</option>
    </select>`}
    ${creating && html`<${BuyForm} categories=${cats} onCancel=${() => setCreating(false)}
      onAdd=${b => { onCreateBuy(b); onChange([...sel, b.id]); setCreating(false); }} />`}
  </div>`;
}

// ---------- scan (Brickognize) ----------
function ScanModal({ onClose, onPick, hint }) {
  const [state, setState] = useState("pick"); // pick | busy | results | error
  const [items, setItems] = useState([]);
  const [err, setErr] = useState("");
  const [big, setBig] = useState(null); // candidate whose image is expanded full-screen
  const fileRef = useRef(null);
  useEffect(() => { fileRef.current?.click(); }, []);

  async function go(file) {
    setState("busy");
    try {
      const small = await downscale(file);
      const j = await brickognize(small);
      const its = (j.items || []).slice(0, 8);
      if (!its.length) { setErr("No candidates. Tips: ONE item per photo, plain background, fill the frame, good light. Assembled clusters of parts won't identify ŌĆö scan parts individually."); setState("error"); }
      else { setItems(its); setState("results"); }
    } catch (e) { setErr(String(e.message || e) + " ŌĆö check connection and retry; if it persists the photo may be unreadable."); setState("error"); }
  }

  return html`<${Portal}><div class="modal" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="sheet">
      <${Header} title="Scan" sub=${hint} onBack=${onClose} />
      <input ref=${fileRef} type="file" accept="image/*" style="display:none"
        onChange=${e => { const f = e.target.files?.[0]; if (f) go(f); e.target.value = ""; }} />
      ${state === "pick" && html`<button class="btn" onClick=${() => fileRef.current?.click()}>Take / choose photo</button>`}
      ${state === "busy" && html`<div class="dim" style="padding:20px;text-align:center">IdentifyingŌĆ”</div>`}
      ${state === "error" && html`
        <div class="card" style="color:var(--red);font-size:13px">${err}</div>
        <button class="ghost" onClick=${() => fileRef.current?.click()}>Try another photo</button>`}
      ${state === "results" && html`<div class="dim" style="font-size:12px;margin-bottom:8px">Tap a card to use it ┬Ę tap the picture to enlarge. (BrickLink renders these as grey line-art ŌĆö colour isn't shown.)</div>`}
      ${state === "results" && items.map(it => html`
        <div class="card row" style="cursor:pointer" onClick=${() => onPick(it)}>
          ${it.img_url && html`<img class="setimg" style="width:72px;height:72px" src=${it.img_url} loading="lazy"
            onClick=${e => { e.stopPropagation(); setBig(it); }}/>`}
          <div style="flex:1;min-width:0">
            <div class="clamp2" style="font-size:14px;font-weight:600">${it.name}</div>
            <div class="dim mono" style="font-size:11px">${it.type || ""} ┬Ę ${it.id} ┬Ę ${Math.round((it.score || 0) * 100)}%</div>
          </div>
        </div>`)}
      ${state === "results" && html`<button class="ghost" onClick=${() => fileRef.current?.click()}>Rescan</button>`}
    </div>
    ${big && html`<${Portal}><div class="modal" style="align-items:center;z-index:30" onClick=${() => setBig(null)}>
      <div style="max-width:520px;width:100%;padding:16px;position:relative;display:flex;flex-direction:column;justify-content:center" onClick=${e => e.stopPropagation()}>
        <button class="step" style="position:absolute;top:26px;right:26px;z-index:2;background:rgba(0,0,0,.65);border-color:rgba(255,255,255,.3);color:#fff" onClick=${() => setBig(null)}>Ō£Ģ</button>
        ${big.img_url && html`<img src=${big.img_url} style="width:100%;max-height:70vh;object-fit:contain;border-radius:14px;background:#fff"/>`}
        <div class="card" style="margin-top:10px">
          <div style="font-size:15px;font-weight:700">${big.name}</div>
          <div class="dim mono" style="font-size:12px;margin-top:4px">${big.type || ""} ┬Ę ${big.id}</div>
          <button class="btn green" style="margin-top:10px" onClick=${() => { setBig(null); onPick(big); }}>Use this</button>
        </div>
      </div>
    </div></${Portal}>`}
  </div></${Portal}>`;
}

// ---------- App ----------
function App() {
  const [tab, setTab] = useState("sets");
  const [index, setIndex] = useState(() => {
    let idx = load("bt:index", []);
    if (idx.some(e => e.fullVal === undefined || e.bookletQty === undefined || e.condition === undefined || e.idxVer !== 5)) {
      idx = idx.map(e => { const rec = load(`bt:set:${e.setNum}`, null); return rec ? indexEntry(rec) : e; });
      save("bt:index", idx);
    }
    return idx;
  });
  const [merch, setMerch] = useState(() => load("bt:merch", []));
  const saveMerchList = next => { setMerch(next); save("bt:merch", next); };
  const upsertMerch = m => saveMerchList(merch.some(x => x.id === m.id) ? merch.map(x => x.id === m.id ? m : x) : [...merch, m]);
  const deleteMerch = id => {
    const victim = merch.find(x => x.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    saveMerchList(merch.filter(x => x.id !== id));
  };
  const [openMerchId, setOpenMerchId] = useState(null);
  const [mocs, setMocs] = useState(() => load("bt:mocs", []));
  const saveMocs = next => { setMocs(next); save("bt:mocs", next); };
  const upsertMoc = m => saveMocs(mocs.some(x => x.id === m.id) ? mocs.map(x => x.id === m.id ? m : x) : [...mocs, m]);
  const deleteMoc = id => {
    const victim = mocs.find(x => x.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    for (const f of (victim?.pdfs || [])) del(pdfKey(f.id));
    saveMocs(mocs.filter(x => x.id !== id));
  };
  const [openMocId, setOpenMocId] = useState(null);
  // WTB named lists (lifted to App so the WTB tab, Set detail and MOC detail all share them)
  const [wtbLists, setWtbListsRaw] = useState(() => loadWtbLists());
  const saveWtbLists = v => { setWtbListsRaw(v); save("bt:wtbLists", v); };
  const upsertWtbList = l => saveWtbLists(wtbLists.some(x => x.id === l.id) ? wtbLists.map(x => x.id === l.id ? l : x) : [...wtbLists, l]);
  // Push a Set/MOC's shortfall into its linked WTB list (creating it if needed); tops up on re-run.
  // Returns the list id. parts: [{partNum, name, colorName, qty}].
  const pushMissingToWtb = ({ linkType, linkId, name, parts }) => {
    const incoming = (parts || []).filter(p => (p.qty || 0) > 0);
    let list = wtbLists.find(l => l.linkType === linkType && l.linkId === linkId);
    if (!list) {
      list = { id: "wtb-" + Date.now(), name, linkType, linkId, dateAdded: Date.now(), parts: incoming.map(newWtbPart) };
      saveWtbLists([list, ...wtbLists]);
    } else {
      const next = [...(list.parts || [])];
      for (const p of incoming) {
        const i = next.findIndex(x => x.partNum === p.partNum && (x.colorName || "") === (p.colorName || ""));
        if (i >= 0) { if (!next[i].got) next[i] = { ...next[i], qty: Math.max(next[i].qty || 0, p.qty || 0) }; }
        else next.push(newWtbPart(p));
      }
      saveWtbLists(wtbLists.map(l => l.id === list.id ? { ...l, parts: next } : l));
    }
    return list.id;
  };
  const allocBySet = useMemo(() => {
    const m = new Map();
    for (const mo of mocs) for (const a of (mo.parts || []))
      if (a.qty > 0) m.set(a.setNum, (m.get(a.setNum) || 0) + a.qty);
    return m;
  }, [mocs]);
  const [buys, setBuys] = useState(() => load("bt:buys", []).map(b => ({ kind: "bulk", category: "", ...b })));
  const [openSetNum, setOpenSetNum] = useState(null);
  const [adding, setAdding] = useState(false);
  const [openBuyId, setOpenBuyId] = useState(null);
  const [setOrigin, setSetOrigin] = useState(null); // null | "buys"
  const [cats, setCats] = useState(() => load("bt:cats", null) || DEFAULT_CATEGORIES);
  const saveCats = next => { setCats(next); save("bt:cats", next); };
  const ensureCat = c => { if (c && !cats.includes(c)) saveCats([...cats, c]); };
  const addCat = c => ensureCat(c.trim());
  const renameCat = (oldC, newC) => {
    saveCats(cats.map(x => x === oldC ? newC : x));
    setBuys(prev => { const next = prev.map(b => b.category === oldC ? { ...b, category: newC } : b); save("bt:buys", next); return next; });
  };
  const delCat = c => {
    saveCats(cats.filter(x => x !== c));
    setBuys(prev => { const next = prev.map(b => b.category === c ? { ...b, category: "" } : b); save("bt:buys", next); return next; });
  };

  const persistIndex = next => { setIndex(next); save("bt:index", next); };
  const persistSet = useCallback(rec => {
    save(`bt:set:${rec.setNum}`, rec);
    setIndex(idx => {
      const next = idx.filter(e => e.setNum !== rec.setNum).concat(indexEntry(rec))
        .sort((a, b) => b.dateAdded - a.dateAdded);
      save("bt:index", next);
      return next;
    });
  }, []);

  // ---------- tags (shared registry + CRUD; entities store tag-id arrays) ----------
  const [tags, setTags] = useState(() => loadTags());
  const saveTags = next => { setTags(next); save("bt:tags", next); };
  const createTag = (name, color) => {
    const nm = (name || "").trim();
    const existing = tags.find(t => t.name.toLowerCase() === nm.toLowerCase());
    if (existing) return existing.id;
    const t = { id: newTagId(), name: nm, color: color || TAG_COLORS[tags.length % TAG_COLORS.length] };
    saveTags([...tags, t]);
    return t.id;
  };
  const updateTag = (id, patch) => saveTags(tags.map(t => t.id === id ? { ...t, ...patch } : t));
  const deleteTag = id => {
    saveTags(tags.filter(t => t.id !== id));
    for (const e of index) {
      const rec = load(`bt:set:${e.setNum}`, null);
      if (rec && (rec.tags || []).includes(id)) { rec.tags = rec.tags.filter(x => x !== id); persistSet(rec); }
    }
    setMocs(prev => { const next = prev.map(m => (m.tags || []).includes(id) ? { ...m, tags: m.tags.filter(x => x !== id) } : m); save("bt:mocs", next); return next; });
    setWtbListsRaw(prev => { const next = prev.map(l => ({ ...l, tags: (l.tags || []).filter(x => x !== id), parts: (l.parts || []).map(p => (p.tags || []).includes(id) ? { ...p, tags: p.tags.filter(x => x !== id) } : p) })); save("bt:wtbLists", next); return next; });
    const pm = { ...loadPartTags() }; let ch = false;
    for (const k of Object.keys(pm)) { if (pm[k].includes(id)) { pm[k] = pm[k].filter(x => x !== id); if (!pm[k].length) delete pm[k]; ch = true; } }
    if (ch) save("bt:partTags", pm);
  };

  const backFromSet = () => {
    setOpenSetNum(null);
    if (setOrigin === "buys") setTab("buys");
    setSetOrigin(null);
  };
  const deleteSet = setNum => {
    del(`bt:set:${setNum}`);
    persistIndex(index.filter(e => e.setNum !== setNum));
    backFromSet();
  };
  const addBuy = b => {
    ensureCat(b.category);
    setBuys(prev => { const next = [...prev, b]; save("bt:buys", next); return next; });
  };
  const updateBuy = b => {
    ensureCat(b.category);
    setBuys(prev => { const next = prev.map(x => x.id === b.id ? b : x); save("bt:buys", next); return next; });
  };
  const deleteBuy = id => {
    const victim = buys.find(b => b.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    for (const e of index) {
      if (!(e.buyIds || []).includes(id)) continue;
      const rec = load(`bt:set:${e.setNum}`, null);
      if (rec) { rec.buyIds = (rec.buyIds || []).filter(x => x !== id); persistSet(rec); }
    }
    setBuys(prev => { const next = prev.filter(b => b.id !== id); save("bt:buys", next); return next; });
    if (openBuyId === id) setOpenBuyId(null);
  };
  const openSetFromBuys = n => { setAdding(false); setOpenSetNum(n); setSetOrigin("buys"); setTab("sets"); };
  const openMerchFromBuys = id => { save("bt:sv:seg", "merch"); setAdding(false); setOpenSetNum(null); setSetOrigin(null); setOpenMerchId(id); setTab("sets"); };
  // add a set FROM a buy's detail page: pre-link that buy + return there afterwards
  const [addFromBuyId, setAddFromBuyId] = useState(null);
  const addSetFromBuy = id => { setAddFromBuyId(id); setOpenSetNum(null); setAdding(true); setTab("sets"); };
  const backToOriginBuy = () => { setAdding(false); setAddFromBuyId(null); setTab("buys"); }; // openBuyId still set
  const mutateBuys = fn => setBuys(prev => { const next = fn(prev); save("bt:buys", next); return next; });

  return html`
    <div class="shell">
      <div class="content">
        ${tab === "sets" && !openSetNum && !adding && !openMocId && html`
          <${SetsList} key="v-setslist" index=${index} buys=${buys} cats=${cats} addBuy=${addBuy} persistSet=${persistSet}
            merch=${merch} upsertMerch=${upsertMerch} deleteMerch=${deleteMerch}
            openMerchId=${openMerchId} setOpenMerchId=${setOpenMerchId}
            mocs=${mocs} upsertMoc=${upsertMoc} allocBySet=${allocBySet} onOpenMoc=${setOpenMocId}
            wtbLists=${wtbLists} saveWtbLists=${saveWtbLists} upsertWtbList=${upsertWtbList}
            tags=${tags} createTag=${createTag}
            onOpen=${n => { setSetOrigin(null); setOpenSetNum(n); }} onAdd=${() => setAdding(true)} />`}
        ${tab === "sets" && !openSetNum && !adding && openMocId && html`
          <${MocDetail} key=${openMocId} moc=${mocs.find(m => m.id === openMocId)} mocs=${mocs} index=${index}
            upsertMoc=${upsertMoc} deleteMoc=${id => { deleteMoc(id); setOpenMocId(null); }}
            wtbLists=${wtbLists} pushMissingToWtb=${pushMissingToWtb}
            tags=${tags} createTag=${createTag}
            onBack=${() => setOpenMocId(null)} />`}
        ${tab === "sets" && adding && html`
          <${AddSet} key="v-addset" buys=${buys} cats=${cats} addBuy=${addBuy} existing=${index.map(e => e.setNum)}
            lastBuy=${lastBulkBuyOf(buys, index)}
            prefBuy=${addFromBuyId ? buys.find(b => b.id === addFromBuyId) : null}
            onCancel=${() => { if (addFromBuyId) backToOriginBuy(); else setAdding(false); }}
            onOpenExisting=${n => { setAdding(false); setAddFromBuyId(null); setSetOrigin(null); setOpenSetNum(n); }}
            onSave=${rec => { persistSet(rec); if (addFromBuyId) { backToOriginBuy(); } else { setAdding(false); setSetOrigin(null); setOpenSetNum(rec.setNum); } }}
            onQuickSave=${(rec, stay) => { persistSet(rec); if (!stay) { if (addFromBuyId) backToOriginBuy(); else { setAdding(false); setSetOrigin(null); } } }} />`}
        ${tab === "sets" && openSetNum && !adding && html`
          <${SetDetail} key=${"v-set-" + openSetNum} setNum=${openSetNum} buys=${buys} cats=${cats} addBuy=${addBuy} persistSet=${persistSet}
            mocs=${mocs} upsertMoc=${upsertMoc} wtbLists=${wtbLists} pushMissingToWtb=${pushMissingToWtb}
            tags=${tags} createTag=${createTag}

function SetCard({ e, buys, onOpen, showBuys = true, mocPcs = 0, compact = false, expanded = false, onToggleExpand, tags = [] }) {
  const myTags = resolveTags(tags, e.tags);
  const linked = showBuys ? (e.buyIds || []).map(id => buys.find(b => b.id === id)).filter(Boolean) : [];
  const channels = [...new Set(linked.map(b => b.category).filter(Boolean))];
  const isNew = e.condition === "new";
  // #9: condition shown as a corner emoji on the image ŌĆö part-out overrides, then new vs used
  const condEmoji = e.triage === "partOut" ? "­¤ōż" : isNew ? "Ō£©" : "ŌÖ╗’ĖÅ";
  // #11: new-set cards hide % + triage by default (Settings can force them back on)
  const showPct = !isNew || load("bt:cardNewPct", false);
  const showTriage = !isNew || load("bt:cardNewTriage", false);
  const inSet = Math.max(0, (e.found || 0) - mocPcs);
  const priceLine = isNew && (e.pricePaid > 0 || e.rrp > 0);
  const detailBody = html`
    <div class="row" style="gap:6px;margin-top:5px;flex-wrap:wrap">
      ${showTriage && html`<span style=${`font-size:11px;font-weight:700;color:${triageOf(e.triage).color}`}>${triageOf(e.triage).label}</span>`}
      ${e.donor && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">ŌÖ╗’ĖÅ Donor</span>`}
      ${e.boxHas && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">­¤ō”</span>`}
      ${e.theme && html`<span class="badge" style="color:var(--purple);border:1px solid var(--purple)">${e.theme}</span>`}
      ${mocPcs > 0 && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">ŌÖ╗’ĖÅ ${mocPcs} ŌåÆ MOC ┬Ę ${inSet} in set</span>`}
      ${e.built && html`<span class="badge" style="color:var(--green);border:1px solid var(--green)">Built Ō£ō</span>`}
      ${e.building && !e.built && html`<span class="badge" style="color:var(--yellow);border:1px solid var(--yellow)">­¤ö© Building</span>`}
      ${!isNew && e.pct >= 90 && e.pct < 100 && html`<span class="badge" style="color:var(--green);border:1px solid var(--green)">near complete</span>`}
      ${!isNew && e.pct === 100 && html`<span class="badge" style="color:#1C1A17;background:var(--green)">complete</span>`}
    </div>
    ${myTags.length > 0 && html`<div style="margin-top:5px"><${TagChips} tags=${myTags} small /></div>`}
    ${(e.valueSet || e.valuePartOut || e.fullVal || priceLine) ? html`<div class="mono" style="margin-top:4px;font-size:11px;font-weight:700;line-height:1.45">
      ${(e.valueSet || e.valuePartOut) ? html`<div class="row" style="gap:10px">
        ${e.valueSet ? html`<span style="color:var(--yellow)">Set ${money(e.valueSet)}</span>` : ""}
        ${e.valuePartOut ? html`<span style="color:var(--purple)">Parts ${money(e.valuePartOut)}</span>` : ""}
      </div>` : ""}
      ${priceLine ? html`<div class="row" style="gap:10px">
        ${e.pricePaid > 0 ? html`<span style="color:var(--green)">${money(e.pricePaid)}</span>` : ""}
        ${e.rrp > 0 ? html`<span class="dim">RRP ${money(e.rrp)}${e.pricePaid > 0 && e.rrp > e.pricePaid ? ` ┬Ę ŌłÆ${Math.round((1 - e.pricePaid / e.rrp) * 100)}%` : ""}</span>` : ""}
      </div>` : (e.foundVal || e.fullVal) ? html`<div class="row" style="gap:10px">
        ${e.foundVal ? html`<span style="color:var(--green)">Found Ōēł ${money(e.foundVal)}</span>` : ""}
        ${e.fullVal ? html`<span class="dim">Full Ōēł ${money(e.fullVal)}</span>` : ""}
      </div>` : ""}
    </div>` : ""}
    ${(linked.length > 0 || channels.length > 0) && html`<div class="row" style="gap:6px;margin-top:3px;justify-content:space-between">

      <span class="row" style="gap:4px;flex-shrink:0">
        ${channels.map(c => html`<span key=${c} class="badge" style="color:var(--yellow);border:1px solid var(--yellow);font-size:10px;padding:0 5px">${c}</span>`)}
      </span>
    </div>`}`;

  if (compact) return html`<div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
    <div class="row" style="align-items:stretch;gap:0">

          <span style="position:absolute;top:-4px;left:-4px;font-size:13px;line-height:1;filter:drop-shadow(0 1px 2px #000)">${condEmoji}</span>

            ${e.boxHas && html`<span style="font-size:11px;flex-shrink:0">­¤ō”</span>`}
            ${e.donor && html`<span style="font-size:11px;flex-shrink:0;color:var(--blue);font-weight:700">Donor</span>`}
            ${mocPcs > 0 && html`<span style="font-size:11px;flex-shrink:0">ŌÖ╗’ĖÅ</span>`}
          </div>
        </div>
      </div>
      <button onClick=${onToggleExpand}
        style="width:42px;background:transparent;border:none;border-left:1px solid var(--line);color:var(--dim);font-size:13px;flex-shrink:0">${expanded ? "Ō¢┤" : "Ō¢Š"}</button>
    </div>
    ${expanded && html`<div style="padding:0 10px 10px 64px">${detailBody}</div>`}
  </div>`;

  return html`<div class="card row" style="cursor:pointer" onClick=${() => onOpen(e.setNum)}>
    <div style="position:relative;flex-shrink:0">
      ${e.img ? html`<img class="setimg" src=${e.img} loading="lazy"/>` : html`<div class="setimg" style="background:var(--panel2)"></div>`}
      <span style="position:absolute;top:-5px;left:-5px;font-size:16px;line-height:1;filter:drop-shadow(0 1px 2px #000)">${condEmoji}</span>
    </div>
    <div style="flex:1;min-width:0">
      <div class="ellip" style="font-weight:700">${e.name}</div>
      <div class="dim mono" style="font-size:12px">${e.setNum} ┬Ę ${e.year}${e.instructions === "paper" ? ` ┬Ę ­¤ō¢${(e.bookletQty || 0) > 1 ? "├Ś" + e.bookletQty : ""}` : e.instructions === "digital" ? " ┬Ę ­¤ō¢ reprint" : ""}</div>
      ${detailBody}
    </div>
    ${showPct ? html`<${Ring} pct=${e.pct} />` : ""}
  </div>`;
}

function MerchSheet({ initial, buys, cats, addBuy, presetBuyIds, onSave, onDelete, onClose }) {
  const [name, setName] = useState(initial?.name || "");
  const [year, setYear] = useState(initial?.year ? String(initial.year) : "");
  const [rrp, setRrp] = useState(initial?.rrp ? String(initial.rrp) : "");
  const [price, setPrice] = useState(initial?.pricePaid ? String(initial.pricePaid) : "");
  const [cond, setCond] = useState(initial?.condition || "good");
  const [qty, setQty] = useState(initial?.qty ? String(initial.qty) : "1");
  const [market, setMarket] = useState(initial?.marketRate ? String(initial.marketRate) : "");
  const [buyIds, setBuyIds] = useState(initial?.buyIds || presetBuyIds || []);
  const [notes, setNotes] = useState(initial?.notes || "");
  const [photoIds, setPhotoIds] = useState(initial?.photoIds || []);
  const [confirmDel, setConfirmDel] = useState(false);
  const photoInput = useRef(null);
  async function addPhotos(files) {
    const ids = [];
    for (const file of files) {
      const small = await downscale(file, 1024);
      try {
        const dataURL = await blobToDataURL(small);
        const id = `${Date.now()}${Math.random().toString(36).slice(2, 6)}`;
        save(photoKey(id), dataURL);
        ids.push(id);
      } catch (e) { alert("CouldnŌĆÖt read a photo: " + (e.message || e)); }
    }
    if (ids.length) setPhotoIds(prev => [...prev, ...ids]);
  }
  const removePhoto = id => { del(photoKey(id)); setPhotoIds(prev => prev.filter(x => x !== id)); };
  return html`<${Portal}><div class="modal" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="sheet">
      <${Header} title=${initial ? "Edit merch" : "New merch"} onBack=${onClose} />
      <input name="bt-merch-name" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder='Name ŌĆö e.g. "Storage Brick 8 ŌĆö Red"' value=${name} onInput=${e => setName(e.target.value)} />

        <input inputmode="numeric" placeholder="Year" value=${year} onInput=${e => setYear(e.target.value)} />

      </div>
      <div style="height:8px"></div>
      <div class="row" style="gap:8px">
        <div style="flex:1"><${Label}>Qty</${Label}><input inputmode="numeric" placeholder="1" value=${qty} onInput=${e => setQty(e.target.value)} /></div>
        <div style="flex:1"><${Label}>Market rate (each)</${Label}><input inputmode="decimal" placeholder="ŌĆö" value=${market} onInput=${e => setMarket(e.target.value)} /></div>
      </div>
      <div style="height:10px"></div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">
        ${photoIds.map((id, i) => {
          const src = photoSrc(id);
          return src && html`<div key=${id} style="position:relative;flex-shrink:0">
            <img src=${src} style=${`width:64px;height:64px;object-fit:cover;border-radius:10px;border:${i === 0 ? "2px solid var(--yellow)" : "1px solid var(--line)"}`}/>
            <button class="step" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;font-size:11px;border-radius:50%;background:var(--red);border:none;color:#fff"
              onClick=${() => removePhoto(id)}>Ō£Ģ</button>
          </div>`;
        })}
        <button class="step" style="width:64px;height:64px;font-size:24px" onClick=${() => photoInput.current?.click()}>’╝ŗ</button>
      </div>
      <div class="dim" style="font-size:11px;margin-top:6px">Multi-select supported. First photo = display pic; reorder via the merch detail page.</div>
      <input ref=${photoInput} type="file" accept="image/*" multiple style="display:none"
        onChange=${e => { const fs = [...(e.target.files || [])]; if (fs.length) addPhotos(fs); e.target.value = ""; }} />
      <div style="height:10px"></div>
      <${Label}>Condition</${Label}>
      <div class="row" style="gap:6px">
        ${CONDITIONS.map(([id, label]) => html`<${Chip} label=${label} color=${condColor(id)} active=${cond === id} onClick=${() => setCond(id)} />`)}
      </div>
      <div style="height:10px"></div>
      <input inputmode="decimal" placeholder="Price paid (optional)" value=${price} onInput=${e => setPrice(e.target.value)} />
      <div style="height:10px"></div>
      <${Label}>Source buys</${Label}>
      <${BuySelect} buys=${buys} cats=${cats} selected=${buyIds} onChange=${setBuyIds} onCreateBuy=${addBuy} />
      <div style="height:10px"></div>
      <textarea style="height:50px" placeholder="Notes" value=${notes} onInput=${e => setNotes(e.target.value)}></textarea>
      <div style="height:12px"></div>
      <div class="row" style="gap:8px">
        <button class="btn" style="flex:1" disabled=${!name.trim()} onClick=${() => onSave({
          id: initial?.id || String(Date.now()), name: name.trim(),
          year: parseInt(year) || null, rrp: parseFloat(rrp) || null,
          pricePaid: parseFloat(price) || 0, condition: cond, buyIds, notes,
          qty: parseInt(qty) || 1, marketRate: parseFloat(market) || null,
          photoIds, dateAdded: initial?.dateAdded || Date.now() })}>${initial ? "Save changes" : "Add merch"}</button>
        <button class="ghost" style="flex:1" onClick=${onClose}>Cancel</button>
      </div>
      ${initial && html`<div style="margin-top:10px">
        ${!confirmDel
          ? html`<button class="ghost" style="color:var(--red);border-color:var(--red)" onClick=${() => setConfirmDel(true)}>Delete merchŌĆ”</button>`
          : html`<button class="btn red" onClick=${onDelete}>Tap again to permanently delete</button>`}
      </div>`}
    </div>
  </div></${Portal}>`;
}

        <button class="ghost" style="flex:1" onClick=${onClose}>Cancel</button>
      </div>
    </div>
  </div></${Portal}>`;
}

// NF2: parse a wanted-parts list pasted from BrickLink Studio (BL XML) or Rebrickable (CSV/TSV).
// Standard formats now; hardened later against real exports. Returns [{partNum, colorName, qty}].
function parseWantedList(text) {
  const out = [], t = (text || "").trim();
  if (!t) return out;
  if (/<ITEM>|<INVENTORY/i.test(t)) {
    for (const it of (t.match(/<ITEM>[\s\S]*?<\/ITEM>/gi) || [])) {
      const id = (it.match(/<ITEMID>([^<]*)<\/ITEMID>/i) || [])[1];
      const col = (it.match(/<COLOR>([^<]*)<\/COLOR>/i) || [])[1];
      const qty = (it.match(/<MINQTY>([^<]*)<\/MINQTY>/i) || it.match(/<QTY>([^<]*)<\/QTY>/i) || [])[1];
      if (id) out.push({ partNum: id.trim(), name: "", colorName: col ? `BL color ${col.trim()}` : "", qty: parseInt(qty) || 1 });
    }
    return out;
  }
  const lines = t.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return out;
  const sep = lines[0].includes("\t") ? "\t" : ",";
  // quote-aware split ŌĆö PartName fields legitimately contain commas ("Brick, Modified 1 x 2ŌĆ”")
  const split = l => {
    const res = []; let cur = "", q = false;
    for (const ch of l) {
      if (ch === '"') { q = !q; continue; }
      if (ch === sep && !q) { res.push(cur); cur = ""; continue; }
      cur += ch;
    }
    res.push(cur);
    return res.map(s => s.trim());
  };
  let pi = 0, ni = -1, ci = -1, qi = -1, bi = -1, start = 0;
  const h = split(lines[0]).map(s => s.toLowerCase());
  if (h.some(x => /part|element|design|item|colou?r|qty/.test(x))) {
    start = 1;
    pi = h.findIndex(x => /^(bl)?item|design|^part ?(num|no|id)|element/.test(x));
    if (pi < 0) pi = h.findIndex(x => /part|item|element|design/.test(x));
    ni = h.findIndex(x => /part.?name|^name$/.test(x));               // part name, not colour name
    ci = h.findIndex(x => /colou?r.?name/.test(x));                   // prefer the colour NAME columnŌĆ”
    if (ci < 0) ci = h.findIndex(x => /colou?r/.test(x) && !/id$/.test(x)); // ŌĆ”never the colour-id number
    bi = h.findIndex(x => /^bl ?colou?r ?id|^colou?r ?id$|colou?r.?id/.test(x)); // BrickLink colour id ŌåÆ part image
    qi = h.findIndex(x => /^min|qty|quantity|count/.test(x));
  }
  if (pi < 0) pi = 0;
  for (let i = start; i < lines.length; i++) {
    const c = split(lines[i]); const partNum = (c[pi] || "").trim();
    if (!partNum) continue;
    out.push({ partNum, name: ni >= 0 ? (c[ni] || "").trim() : "",
      colorName: ci >= 0 ? (c[ci] || "").trim() : "", blColorId: bi >= 0 ? (c[bi] || "").trim() : "",
      qty: parseInt(c[qi >= 0 ? qi : 2]) || 1 });
  }
  return out;
}

function MocDetail({ moc, mocs, index, upsertMoc, deleteMoc, wtbLists = [], pushMissingToWtb, tags = [], createTag, onBack }) {
  const [mode, setMode] = useState(null); // null | "add" | "return"
  const [tagPick, setTagPick] = useState(false);
  const [recatTick, setRecatTick] = useState(0); // re-render after a part recategorise
  const [importSet, setImportSet] = useState(""); // set number to import an exact parts list from
  const [importSetBusy, setImportSetBusy] = useState(false);
  const [editing, setEditing] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [srcSet, setSrcSet] = useState("");
  const [q, setQ] = useState("");
  const [openGroups, setOpenGroups] = useState(() => new Set());
  const [wantOpen, setWantOpen] = useState(() => new Set()); // collapsible parts-list colour groups
  const toggleWant = g => setWantOpen(prev => { const n = new Set(prev); n.has(g) ? n.delete(g) : n.add(g); return n; });
  const [partGroup, setPartGroupRaw] = useState(() => load("bt:mocpartgroup", "color")); // color | type
  const setPartGroup = v => { setPartGroupRaw(v); save("bt:mocpartgroup", v); setWantOpen(new Set()); };
  const [partsOpen, setPartsOpen] = useState(true); // Parts List accordion block
  const [addOpen, setAddOpen] = useState(false);    // collapsible add/import sub-block (hidden until tapped)
  const [sel, setSel] = useState(() => new Set());  // parts ticked to push onto a want list (by wanted index)
  const [importOpen, setImportOpen] = useState(false); // NF2
  const [importText, setImportText] = useState("");
  const [wantPart, setWantPart] = useState("");
  const [wantColor, setWantColor] = useState("");
  const [wantQty, setWantQty] = useState("1");
  const pdfInput = useRef(null);
  const [importMsg, setImportMsg] = useState("");
  const [wtbMsg, setWtbMsg] = useState("");
  const [viewPart, setViewPart] = useState(null); // wanted line shown full-size (tap thumbnail)
  const [editWanted, setEditWanted] = useState(null); // {i, w} ŌĆö colour/qty edit sheet for a wanted line
  const [imgBusy, setImgBusy] = useState(false);   // resolving part images from Rebrickable
  const [searchQ, setSearchQ] = useState("");      // add-parts: search Rebrickable by name
  const [searchBusy, setSearchBusy] = useState(false);
  const [searchRes, setSearchRes] = useState(null);
  const [searchMsg, setSearchMsg] = useState("");
  const [sourceFor, setSourceFor] = useState(null); // {pn, kind:"donor"|"avail"} ŌĆö list of sets holding a part
  // a WTB list linked to this MOC contributes its "got" (bought) parts toward the plan's have-count
  const linkedWtb = (wtbLists || []).find(l => l.linkType === "moc" && l.linkId === moc?.id);
  // Scan every tracked set's full record ONCE for: (a) a part image we can reuse here (same source the
  // sets list uses ŌĆö Rebrickable part_img_url), and (b) free pieces sitting in DONOR sets so the
  // have-count reflects what you can pull. Keyed by base part number so a BrickLink import matches.
  const setData = useMemo(() => {
    const img = new Map(), sources = new Map(); // partKey ŌåÆ [{meta,donor,built,free,part}]
    for (const e of (index || [])) {
      const rec = load(`bt:set:${e.setNum}`, null);
      if (!rec) continue;
      const meta = { setNum: rec.setNum, name: rec.name }, donor = !!rec.donor, built = !!rec.built;
      for (const p of (rec.parts || [])) {
        const k = partKey(p.partNumber);
        if (p.img && !img.has(k)) img.set(k, p.img);
        const free = Math.max(0, (p.qtyFound || 0) - allocatedRow(mocs, rec.setNum, p.id));
        if (free > 0) { if (!sources.has(k)) sources.set(k, []); sources.get(k).push({ meta, donor, built, free, part: p }); }
      }
    }
    return { img, sources };
  }, [index, mocs]);
  const imgIndexFor = pn => setData.img.get(partKey(pn)) || null;
  const sourcesFor = pn => setData.sources.get(partKey(pn)) || [];
  // pieces free in DONOR sets, and pieces free in other (non-donor) sets NOT marked built/assembled.
  // These are only AVAILABLE ŌĆö they don't count toward have/need until you transfer them in (ŌåÆ).
  const donorFor = pn => sourcesFor(pn).reduce((a, s) => a + (s.donor ? s.free : 0), 0);
  const inSetsFor = pn => sourcesFor(pn).reduce((a, s) => a + (!s.donor && !s.built ? s.free : 0), 0);
  // pieces actually transferred (allocated) from sets into THIS moc. Base-match (3023 import Ōåö 3023b).
  const allocFor = pn => (moc?.parts || []).reduce((a, x) => a + (String(x.partNumber) === String(pn) || partKey(x.partNumber) === partKey(pn) ? x.qty : 0), 0);
  // have-count = ONLY what's recorded: parts transferred into this MOC + bought (got) parts from the
  // linked want list. Donor / "in sets" availability is NOT counted until you actually transfer it.
  const haveFor = pn => {
    let n = allocFor(pn);
    if (linkedWtb) n += (linkedWtb.parts || []).reduce((a, w) => a + (w.got && (String(w.partNum) === String(pn) || partKey(w.partNum) === partKey(pn)) ? (w.qty || 0) : 0), 0);
    return n;
  };
  const wanted = moc?.wanted || [];
  const wantTotal = wanted.reduce((a, w) => a + (w.qty || 0), 0);
  const wantHave = wanted.reduce((a, w) => a + Math.min(haveFor(w.partNum), w.qty || 0), 0);
  const wantPct = wantTotal ? Math.round((wantHave / wantTotal) * 100) : 0;
  // BUG FIX (part picture): fall back to a real allocated part's image (Rebrickable url) when the
  // imported/hand-added line has no BrickLink colour id to build an image url from.
  const allocImg = pn => (moc?.parts || []).find(a => a.img && (String(a.partNumber) === String(pn) || partKey(a.partNumber) === partKey(pn)))?.img || null;
  const partImgFor = w => w.img || blPartImg(w.partNum, w.blColorId) || allocImg(w.partNum) || imgIndexFor(w.partNum);
  // BUG FIX (qty stepper): edit a parts-list line's needed quantity in place (min 1; Ō£Ģ to remove).
  const setWantQtyAt = (i, q) => upsertMoc({ ...moc, wanted: wanted.map((w, j) => j === i ? { ...w, qty: Math.max(1, q) } : w) });
  const toggleSel = i => setSel(prev => { const n = new Set(prev); n.has(i) ? n.delete(i) : n.add(i); return n; });
  const selectAllMissing = () => setSel(new Set(wanted.map((w, i) => i).filter(i => haveFor(wanted[i].partNum) < (wanted[i].qty || 0))));
  // push the ticked parts-list lines onto a (MOC-linked) want list ŌĆö shortfall when partly had, else full qty
  const addSelToWant = () => {
    const picks = [...sel].map(i => wanted[i]).filter(Boolean);
    if (!picks.length) return;
    const parts = picks.map(w => { const short = Math.max(0, (w.qty || 0) - haveFor(w.partNum));
      return { partNum: w.partNum, name: w.name, colorName: w.colorName, blColorId: w.blColorId, rbColorId: w.rbColorId, img: w.img, qty: short > 0 ? short : (w.qty || 1) }; });
    pushMissingToWtb?.({ linkType: "moc", linkId: moc.id, name: moc.name, parts });
    setSel(new Set());
    setWtbMsg(`Added ${picks.length} part${picks.length === 1 ? "" : "s"} to a want list.`);
    setTimeout(() => setWtbMsg(""), 3500);
  };
  // Pull real part images (+ names) from Rebrickable for any line missing one ŌĆö same source the sets
  // list uses, so imported/hand-added parts get a picture too. Stores onto the line permanently.
  const fetchPartImages = async () => {
    if (!getKey().trim()) { setWtbMsg("Add your Rebrickable key in Settings first."); setTimeout(() => setWtbMsg(""), 3500); return; }
    setImgBusy(true);
    const next = [...wanted]; let changed = 0;
    for (let i = 0; i < next.length; i++) {
      const w = next[i];
      if (w.img) continue;
      try {
        // colour-correct image when a colour is known (generic part image is the default colour);
        // fall back to the default part image when no colour is set on the line.
        if (w.colorName || w.rbColorId != null) {
          const ci = await colorImgFor(w.partNum, { rbColorId: w.rbColorId, colorName: w.colorName });
          if (ci?.img) { next[i] = { ...w, img: ci.img, rbColorId: ci.rbColorId, colorName: ci.colorName || w.colorName }; changed++; continue; }
        }
        const p = await resolveRbPart(w.partNum);
        if (p?.part_img_url) { next[i] = { ...w, img: p.part_img_url, name: w.name || p.name }; changed++; }
      } catch {}
    }
    if (changed) upsertMoc({ ...moc, wanted: next });
    setImgBusy(false);
    setWtbMsg(changed ? `Fetched ${changed} part image${changed === 1 ? "" : "s"}.` : "No new images found (parts may not be on Rebrickable).");
    setTimeout(() => setWtbMsg(""), 3500);
  };
  // search Rebrickable parts by NAME or number so a part can be added without knowing its number
  const searchParts = async () => {
    const ql = searchQ.trim();
    if (!ql) return;
    if (!getKey().trim()) { setSearchMsg("Add your Rebrickable key in Settings first."); return; }
    setSearchBusy(true); setSearchMsg(""); setSearchRes(null);
    try {
      const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/?search=${encodeURIComponent(ql)}&page_size=24`);
      setSearchRes(j.results || []);
      if (!(j.results || []).length) setSearchMsg("No parts matched.");
    } catch (e) { setSearchMsg(e.message || "Search failed."); }
    setSearchBusy(false);
  };
  const addSearchResult = p => {
    upsertMoc({ ...moc, wanted: [...wanted, { partNum: p.part_num, name: p.name, img: p.part_img_url, colorName: "", qty: 1 }] });
    setSearchMsg(`Added ${p.name || p.part_num}.`);
    setTimeout(() => setSearchMsg(""), 2500);
  };
  const doImport = () => {
    const parsed = parseWantedList(importText);
    if (!parsed.length) { alert("Couldn't find any parts in that text. Paste a BrickLink Studio (XML) or Rebrickable / Studio (CSV) parts export."); return; }
    const lots = parsed.length, pcs = parsed.reduce((a, w) => a + (w.qty || 0), 0);
    upsertMoc({ ...moc, wanted: [...wanted, ...parsed] });
    setImportText(""); setImportOpen(false);
    setImportMsg(`Imported ${lots} part${lots === 1 ? "" : "s"} (${pcs} pcs).`);
    setTimeout(() => setImportMsg(""), 4000);
  };
  // Request 2: fetch a real set's EXACT inventory from Rebrickable and add it as this MOC's parts
  // list ŌĆö for building a set from your own bulk instead of buying it boxed. Merges main + minifig
  // parts (skips spares / separators / sticker sheets) and collapses duplicates by part+colour.
  const importSetParts = async () => {
    const sn = normSetNum(importSet);
    if (!sn) return;
    if (!getKey().trim()) { setImportMsg("Add your Rebrickable key in Settings first."); setTimeout(() => setImportMsg(""), 3500); return; }
    setImportSetBusy(true); setImportMsg("");
    try {
      const r = await fetchFullSet(sn);
      const rows = [];
      for (const p of r.parts) if (!p.isSpare && !isExcludedPart(p)) rows.push(p);
      for (const f of (r.minifigs || [])) for (const p of (f.parts || [])) if (!p.isSpare && !isExcludedPart(p)) rows.push(p);
      const map = new Map();
      for (const p of rows) {
        const k = `${p.partNumber}|${p.colorID}`;
        const ex = map.get(k);
        if (ex) ex.qty += p.qtyNeeded;
        else map.set(k, { partNum: p.partNumber, name: p.partName, colorName: p.colorName, rbColorId: p.colorID, img: p.img, qty: p.qtyNeeded });
      }
      const additions = [...map.values()];
      upsertMoc({ ...moc, wanted: [...wanted, ...additions] });
      setImportSet("");
      setImportMsg(`Imported ${additions.length} part${additions.length === 1 ? "" : "s"} from ${r.meta.setNum} ŌĆö ${r.meta.name}.`);
      setTimeout(() => setImportMsg(""), 5000);
    } catch (e) { setImportMsg(e.message || "Import failed."); }
    setImportSetBusy(false);
  };
  const toggleGroup = id => setOpenGroups(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  // outstanding allocations grouped by source set
  const groups = useMemo(() => {
    const m = new Map();
    for (const a of (moc?.parts || [])) {
      if (a.qty <= 0) continue;
      if (!m.has(a.setNum)) m.set(a.setNum, { setName: a.setName, list: [] });
      m.get(a.setNum).list.push(a);
    }
    return [...m.entries()];
  }, [moc?.parts]);

  // ---- add-parts mode ----
  const srcRec = mode === "add" && srcSet ? load(`bt:set:${srcSet}`, null) : null;
  const srcRows = useMemo(() => {
    if (!srcRec) return [];
    const ql = q.trim().toLowerCase();
    return srcRec.parts.filter(p => p.qtyFound > 0 &&
      (!ql || p.partName?.toLowerCase().includes(ql) || p.partNumber?.toLowerCase().includes(ql) || p.colorName?.toLowerCase().includes(ql)));
  }, [srcRec, q, mocs]);

  if (!moc) return html`<div class="card">MOC not found. <button class="ghost" onClick=${onBack}>Back</button></div>`;
  const stats = mocStats(moc);

  // ---- allocation mutations ----
  const withAlloc = (parts, setRec, p, delta) => {
    const next = [...parts];
    const i = next.findIndex(a => a.setNum === setRec.setNum && a.partRowId === p.id);
    if (i >= 0) {
      const nq = next[i].qty + delta;
      if (nq <= 0) next.splice(i, 1);
      else next[i] = { ...next[i], qty: nq };
    } else if (delta > 0) {
      next.push({ id: `${Date.now()}${Math.random().toString(36).slice(2, 6)}`, setNum: setRec.setNum, setName: setRec.name,
        partRowId: p.id, partNumber: p.partNumber, partName: p.partName, colorID: p.colorID, colorName: p.colorName,
        img: p.img, qty: delta });
    }
    return next;
  };
  const take = (setRec, p, delta) =>
    upsertMoc({ ...moc, parts: withAlloc(moc.parts || [], setRec, p, delta),
      status: moc.status === "disassembled" && delta > 0 ? "building" : moc.status });
  const giveBack = (a, n) => {
    const next = [...(moc.parts || [])];
    const i = next.findIndex(x => x.id === a.id);
    if (i < 0) return;
    const nq = Math.max(0, next[i].qty - n);
    if (nq === 0) next.splice(i, 1); else next[i] = { ...next[i], qty: nq };
    const emptied = next.every(x => x.qty <= 0) || next.length === 0;
    upsertMoc({ ...moc, parts: next, status: emptied ? "disassembled" : moc.status });
  };

  // ---- PDFs ----
  function attachPdf(file) {
    const id = `${Date.now()}${Math.random().toString(36).slice(2, 6)}`;
    save(pdfKey(id), file); // Blob straight into IndexedDB
    upsertMoc({ ...moc, pdfs: [...(moc.pdfs || []), { id, name: file.name || "instructions.pdf", size: file.size || 0 }] });
  }
  function openPdf(f) {
    const blob = load(pdfKey(f.id), null);
    if (!blob) { alert("PDF missing from storage."); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = f.name || "instructions.pdf"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  }
  function removePdf(id) {
    del(pdfKey(id));
    upsertMoc({ ...moc, pdfs: (moc.pdfs || []).filter(x => x.id !== id) });
  }
  const mb = n => n > 0 ? ` ┬Ę ${(n / 1024 / 1024).toFixed(1)} MB` : "";

  const st = mocStatus(moc.status);

  if (mode === "add") return html`<div class="navin" key="moc-add">
    <${Header} title="Add parts" sub=${moc.name} onBack=${() => { setMode(null); setQ(""); }} />
    <div class="card">
      <${Label}>Take parts fromŌĆ”</${Label}>
      <select value=${srcSet} onChange=${e => setSrcSet(e.target.value)}>
        <option value="">ŌĆö pick a tracked set ŌĆö</option>
        ${index.map(e => html`<option value=${e.setNum}>${e.name} ┬Ę ${e.setNum}</option>`)}
      </select>
      ${srcRec && html`<input style="margin-top:8px" placeholder="Filter parts (name / number / colour)" value=${q} onInput=${e => setQ(e.target.value)} />`}
    </div>
    ${srcRec && srcRows.length > 0 && html`<div class="row" style="gap:8px;margin-bottom:10px">
      <button class="btn green" style="flex:1" onClick=${() => {
        let parts = moc.parts || [];
        for (const p of srcRows) { const free = p.qtyFound - allocatedRow(mocs, srcRec.setNum, p.id); if (free > 0) parts = withAlloc(parts, srcRec, p, free); }
        upsertMoc({ ...moc, parts, status: moc.status === "disassembled" ? "building" : moc.status });
      }}>Ō£ō Take all free</button>
      <button class="ghost" style="flex:1" disabled=${!(moc.parts || []).some(a => a.setNum === srcRec.setNum)}
        onClick=${() => { if (confirm("Return everything taken from this set?")) upsertMoc({ ...moc, parts: (moc.parts || []).filter(a => a.setNum !== srcRec.setNum) }); }}>Clear taken</button>
    </div>`}
    ${srcRec && srcRows.length === 0 && html`<div class="card dim" style="text-align:center">No found parts${q ? " matching the filter" : ""} in this set.</div>`}
    ${srcRec && srcRows.map(p => {
      const totalAlloc = allocatedRow(mocs, srcRec.setNum, p.id);
      const mine = (moc.parts || []).find(a => a.setNum === srcRec.setNum && a.partRowId === p.id)?.qty || 0;
      const free = p.qtyFound - totalAlloc;
      return html`<div key=${p.id} class="row" style="background:var(--panel);border:1px solid ${mine > 0 ? "var(--purple)" : "var(--line)"};border-radius:12px;padding:8px 10px;margin-bottom:6px">
        ${p.img ? html`<img class="partimg" src=${p.img} loading="lazy"/>` : html`<div class="partimg" style="background:var(--panel2)"></div>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px;line-height:1.25">${p.partName}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName} ┬Ę ${p.qtyFound} found${totalAlloc - mine > 0 ? ` ┬Ę ${totalAlloc - mine} in other MOCs` : ""}</div>
        </div>
        <button class="step" disabled=${mine === 0} onClick=${() => take(srcRec, p, -1)}>ŌłÆ</button>
        <div class="mono" style=${`font-size:14px;font-weight:700;min-width:34px;text-align:center;color:${mine > 0 ? "var(--purple)" : "var(--dim)"}`}>${mine}</div>
        <button class="step plus" disabled=${free <= 0} onClick=${() => take(srcRec, p, +1)}>+</button>
      </div>`;
    })}
    <button class="btn" onClick=${() => { setMode(null); setQ(""); }}>Done</button>
  </div>`;

  if (mode === "return") return html`<div class="navin" key="moc-return">
    <${Header} title="Return parts" sub=${`${moc.name} ┬Ę ${stats.pcs} pcs still out`} onBack=${() => setMode(null)} />
    ${groups.length === 0 && html`<div class="card" style="color:var(--green);font-weight:600;font-size:14px">Ō£ō Everything is home ŌĆö MOC marked Disassembled.</div>`}
    ${groups.map(([setNum, g]) => html`<div key=${setNum} style="margin-bottom:12px">
      <div class="label" style="margin:0 2px 8px">ŌåÆ back to ${g.setName} ┬Ę ${g.list.reduce((a, x) => a + x.qty, 0)} pcs</div>
      ${g.list.map(a => html`<div key=${a.id} class="row" style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:6px">
        ${a.img ? html`<img class="partimg" src=${a.img} loading="lazy"/>` : html`<div class="partimg" style="background:var(--panel2)"></div>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px;line-height:1.25">${a.partName}</div>
