// NF2: parse a wanted-parts list pasted from BrickLink Studio (BL XML) or Rebrickable (CSV/TSV).
// Standard formats now; hardened later against real exports. Returns [{partNum, colorName, qty}].
function parseWantedList(text) {
  const out = [], t = (text || "").trim();
  if (!t) return out;
  if (/<ITEM>|<INVENTORY/i.test(t)) {
    for (const it of (t.match(/<ITEM>[\s\S]*?<\/ITEM>/gi) || [])) {
      const id = (it.match(/<ITEMID>([^<]*)<\/ITEMID>/i) || [])[1];
      const col = (it.match(/<COLOR>([^<]*)<\/COLOR>/i) || [])[1];
      const qty = (it.match(/<MINQTY>([^<]*)<\/MINQTY>/i) || it.match(/<QTY>([^<]*)<\/QTY>/i) || [])[1];
      if (id) out.push({ partNum: id.trim(), colorName: col ? `BL color ${col.trim()}` : "", qty: parseInt(qty) || 1 });
    }
    return out;
  }
  const lines = t.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return out;
  const sep = lines[0].includes("\t") ? "\t" : ",";
  const split = l => l.split(sep).map(s => s.replace(/^"|"$/g, "").trim());
  let pi = 0, ci = 1, qi = 2, start = 0;
  const h = split(lines[0]).map(s => s.toLowerCase());
  if (h.some(x => /part|element|design|blid|item/.test(x))) {
    start = 1;
    pi = h.findIndex(x => /part|element|design|blid|item/.test(x));
    ci = h.findIndex(x => /colou?r/.test(x));
    qi = h.findIndex(x => /qty|quantity|count|min/.test(x));
  }
  for (let i = start; i < lines.length; i++) {
    const c = split(lines[i]); const partNum = (c[pi] || "").trim();
    if (!partNum) continue;
    out.push({ partNum, colorName: ci >= 0 ? (c[ci] || "").trim() : "", qty: parseInt(c[qi >= 0 ? qi : 2]) || 1 });
  }
  return out;
}

function MocDetail({ moc, mocs, index, upsertMoc, deleteMoc, onBack }) {
  const [mode, setMode] = useState(null); // null | "add" | "return"
  const [editing, setEditing] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [srcSet, setSrcSet] = useState("");
  const [q, setQ] = useState("");
  const [openGroups, setOpenGroups] = useState(() => new Set());
  const [importOpen, setImportOpen] = useState(false); // NF2
  const [importText, setImportText] = useState("");
  const [wantPart, setWantPart] = useState("");
  const [wantColor, setWantColor] = useState("");
  const [wantQty, setWantQty] = useState("1");
  const pdfInput = useRef(null);
  // NF2: have-count for a wanted line = real parts allocated whose part number matches
  const haveFor = pn => (moc?.parts || []).reduce((a, x) => a + (String(x.partNumber) === String(pn) ? x.qty : 0), 0);
  const wanted = moc?.wanted || [];
  const wantTotal = wanted.reduce((a, w) => a + (w.qty || 0), 0);
  const wantHave = wanted.reduce((a, w) => a + Math.min(haveFor(w.partNum), w.qty || 0), 0);
  const wantPct = wantTotal ? Math.round((wantHave / wantTotal) * 100) : 0;
  const doImport = () => {
    const parsed = parseWantedList(importText);
    if (!parsed.length) { alert("Couldn't find any parts in that text. Paste a BrickLink Studio (XML) or Rebrickable (CSV) parts export."); return; }
    upsertMoc({ ...moc, wanted: [...wanted, ...parsed] });
    setImportText(""); setImportOpen(false);
  };
  const toggleGroup = id => setOpenGroups(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  // outstanding allocations grouped by source set
  const groups = useMemo(() => {
    const m = new Map();
    for (const a of (moc?.parts || [])) {
      if (a.qty <= 0) continue;
      if (!m.has(a.setNum)) m.set(a.setNum, { setName: a.setName, list: [] });
      m.get(a.setNum).list.push(a);
    }
    return [...m.entries()];
  }, [moc?.parts]);

  // ---- add-parts mode ----
  const srcRec = mode === "add" && srcSet ? load(`bt:set:${srcSet}`, null) : null;
  const srcRows = useMemo(() => {
    if (!srcRec) return [];
    const ql = q.trim().toLowerCase();
    return srcRec.parts.filter(p => p.qtyFound > 0 &&
      (!ql || p.partName?.toLowerCase().includes(ql) || p.partNumber?.toLowerCase().includes(ql) || p.colorName?.toLowerCase().includes(ql)));
  }, [srcRec, q, mocs]);

  if (!moc) return html`<div class="card">MOC not found. <button class="ghost" onClick=${onBack}>Back</button></div>`;
  const stats = mocStats(moc);

  // ---- allocation mutations ----
  const withAlloc = (parts, setRec, p, delta) => {
    const next = [...parts];
    const i = next.findIndex(a => a.setNum === setRec.setNum && a.partRowId === p.id);
    if (i >= 0) {
      const nq = next[i].qty + delta;
      if (nq <= 0) next.splice(i, 1);
      else next[i] = { ...next[i], qty: nq };
    } else if (delta > 0) {
      next.push({ id: `${Date.now()}${Math.random().toString(36).slice(2, 6)}`, setNum: setRec.setNum, setName: setRec.name,
        partRowId: p.id, partNumber: p.partNumber, partName: p.partName, colorID: p.colorID, colorName: p.colorName,
        img: p.img, qty: delta });
    }
    return next;
  };
  const take = (setRec, p, delta) =>
    upsertMoc({ ...moc, parts: withAlloc(moc.parts || [], setRec, p, delta),
      status: moc.status === "disassembled" && delta > 0 ? "building" : moc.status });
  const giveBack = (a, n) => {
    const next = [...(moc.parts || [])];
    const i = next.findIndex(x => x.id === a.id);
    if (i < 0) return;
    const nq = Math.max(0, next[i].qty - n);
    if (nq === 0) next.splice(i, 1); else next[i] = { ...next[i], qty: nq };
    const emptied = next.every(x => x.qty <= 0) || next.length === 0;
    upsertMoc({ ...moc, parts: next, status: emptied ? "disassembled" : moc.status });
  };

  // ---- PDFs ----
  function attachPdf(file) {
    const id = `${Date.now()}${Math.random().toString(36).slice(2, 6)}`;
    save(pdfKey(id), file); // Blob straight into IndexedDB
    upsertMoc({ ...moc, pdfs: [...(moc.pdfs || []), { id, name: file.name || "instructions.pdf", size: file.size || 0 }] });
  }
  function openPdf(f) {
    const blob = load(pdfKey(f.id), null);
    if (!blob) { alert("PDF missing from storage."); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = f.name || "instructions.pdf"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  }
  function removePdf(id) {
    del(pdfKey(id));
    upsertMoc({ ...moc, pdfs: (moc.pdfs || []).filter(x => x.id !== id) });
  }
  const mb = n => n > 0 ? ` · ${(n / 1024 / 1024).toFixed(1)} MB` : "";

  const st = mocStatus(moc.status);

  if (mode === "add") return html`<div class="navin" key="moc-add">
    <${Header} title="Add parts" sub=${moc.name} onBack=${() => { setMode(null); setQ(""); }} />
    <div class="card">
      <${Label}>Take parts from…</${Label}>
      <select value=${srcSet} onChange=${e => setSrcSet(e.target.value)}>
        <option value="">— pick a tracked set —</option>
        ${index.map(e => html`<option value=${e.setNum}>${e.name} · ${e.setNum}</option>`)}
      </select>
      ${srcRec && html`<input style="margin-top:8px" placeholder="Filter parts (name / number / colour)" value=${q} onInput=${e => setQ(e.target.value)} />`}
    </div>
    ${srcRec && srcRows.length > 0 && html`<div class="row" style="gap:8px;margin-bottom:10px">
      <button class="btn green" style="flex:1" onClick=${() => {
        let parts = moc.parts || [];
        for (const p of srcRows) { const free = p.qtyFound - allocatedRow(mocs, srcRec.setNum, p.id); if (free > 0) parts = withAlloc(parts, srcRec, p, free); }
        upsertMoc({ ...moc, parts, status: moc.status === "disassembled" ? "building" : moc.status });
      }}>✓ Take all free</button>
      <button class="ghost" style="flex:1" disabled=${!(moc.parts || []).some(a => a.setNum === srcRec.setNum)}
        onClick=${() => { if (confirm("Return everything taken from this set?")) upsertMoc({ ...moc, parts: (moc.parts || []).filter(a => a.setNum !== srcRec.setNum) }); }}>Clear taken</button>
    </div>`}
    ${srcRec && srcRows.length === 0 && html`<div class="card dim" style="text-align:center">No found parts${q ? " matching the filter" : ""} in this set.</div>`}
    ${srcRec && srcRows.map(p => {
      const totalAlloc = allocatedRow(mocs, srcRec.setNum, p.id);
      const mine = (moc.parts || []).find(a => a.setNum === srcRec.setNum && a.partRowId === p.id)?.qty || 0;
      const free = p.qtyFound - totalAlloc;
      return html`<div key=${p.id} class="row" style="background:var(--panel);border:1px solid ${mine > 0 ? "var(--purple)" : "var(--line)"};border-radius:12px;padding:8px 10px;margin-bottom:6px">
        ${p.img ? html`<img class="partimg" src=${p.img} loading="lazy"/>` : html`<div class="partimg" style="background:var(--panel2)"></div>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px;line-height:1.25">${p.partName}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName} · ${p.qtyFound} found${totalAlloc - mine > 0 ? ` · ${totalAlloc - mine} in other MOCs` : ""}</div>
        </div>
        <button class="step" disabled=${mine === 0} onClick=${() => take(srcRec, p, -1)}>−</button>
        <div class="mono" style=${`font-size:14px;font-weight:700;min-width:34px;text-align:center;color:${mine > 0 ? "var(--purple)" : "var(--dim)"}`}>${mine}</div>
        <button class="step plus" disabled=${free <= 0} onClick=${() => take(srcRec, p, +1)}>+</button>
      </div>`;
    })}
    <button class="btn" onClick=${() => { setMode(null); setQ(""); }}>Done</button>
  </div>`;

  if (mode === "return") return html`<div class="navin" key="moc-return">
    <${Header} title="Return parts" sub=${`${moc.name} · ${stats.pcs} pcs still out`} onBack=${() => setMode(null)} />
    ${groups.length === 0 && html`<div class="card" style="color:var(--green);font-weight:600;font-size:14px">✓ Everything is home — MOC marked Disassembled.</div>`}
    ${groups.map(([setNum, g]) => html`<div key=${setNum} style="margin-bottom:12px">
      <div class="label" style="margin:0 2px 8px">→ back to ${g.setName} · ${g.list.reduce((a, x) => a + x.qty, 0)} pcs</div>
      ${g.list.map(a => html`<div key=${a.id} class="row" style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:6px">
        ${a.img ? html`<img class="partimg" src=${a.img} loading="lazy"/>` : html`<div class="partimg" style="background:var(--panel2)"></div>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px;line-height:1.25">${a.partName}</div>
          <div class="dim mono" style="font-size:11px">${a.colorName} · ${a.qty} out</div>
        </div>
        <button class="step" style="width:46px;color:var(--green);border-color:var(--green)" onClick=${() => giveBack(a, 1)}>⇠1</button>
        <button class="step" style="width:52px;font-size:12px;color:var(--green);border-color:var(--green)" onClick=${() => giveBack(a, a.qty)}>⇠ all</button>
      </div>`)}
    </div>`)}
    <button class="btn" onClick=${() => setMode(null)}>Done</button>
  </div>`;

  return html`<div class="navin" key="moc-main">
    <${Header} title=${moc.name} sub=${`${stats.pcs} real pcs · ${stats.sets} source set${stats.sets === 1 ? "" : "s"}`} onBack=${onBack} />
    <div class="card row" style="gap:14px">
      ${moc.photoIds?.[0] && photoSrc(moc.photoIds[0])
        ? html`<img style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid var(--line);flex-shrink:0" src=${photoSrc(moc.photoIds[0])}/>`
        : html`<div class="setimg" style="width:72px;height:72px;background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:26px">🧩</div>`}
      <div style="flex:1;min-width:0">
        ${moc.notes && html`<div class="dim clamp2" style="font-size:13px;margin-bottom:6px">${moc.notes}</div>`}
        <button class="ghost" style="padding:9px" onClick=${() => setEditing(true)}>Edit MOC…</button>
      </div>
    </div>

    <div class="card">
      <${Label}>Status</${Label}>
      <div class="row" style="gap:6px">
        ${MOC_STATUS.map(([id, label, color]) => html`<${Chip} label=${label} color=${color} active=${moc.status === id}
          onClick=${() => upsertMoc({ ...moc, status: id })} />`)}
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <${Label}>Wanted parts (target build)${wantTotal ? ` · ${wantHave}/${wantTotal}` : ""}</${Label}>
        ${wantTotal > 0 && html`<span class="mono" style=${`font-weight:800;color:${wantPct >= 100 ? "var(--green)" : wantPct >= 50 ? "var(--yellow)" : "var(--dim)"}`}>${wantPct}%</span>`}
      </div>
      ${wanted.length === 0 && html`<div class="dim" style="font-size:12px;margin-bottom:8px">Import the build's parts from BrickLink Studio (XML) or Rebrickable (CSV), or add part numbers below — then gather the real bricks with + Add parts. Have-counts match by part number.</div>`}
      ${wanted.map((w, i) => { const have = haveFor(w.partNum), ok = have >= w.qty;
        return html`<div key=${i} class="row" style="gap:8px;padding:6px 0;border-bottom:1px solid var(--line)">
          <div class="ellip" style="flex:1;min-width:0;font-size:13px;font-weight:600">${w.partNum}${w.colorName ? html` <span class="dim">· ${w.colorName}</span>` : ""}</div>
          <span class="mono" style=${`font-size:12px;font-weight:800;color:${ok ? "var(--green)" : "var(--yellow)"}`}>${Math.min(have, w.qty)}/${w.qty}</span>
          <button class="step" style="width:30px;height:30px;font-size:11px;color:var(--red);border-color:var(--red)" onClick=${() => upsertMoc({ ...moc, wanted: wanted.filter((_, j) => j !== i) })}>✕</button>
        </div>`; })}
      <div class="row" style="gap:6px;margin-top:10px">
        <input style="flex:1" name="bt-want-part" autocomplete="off" autocapitalize="characters" placeholder="Part # to want" value=${wantPart} onInput=${e => setWantPart(e.target.value)} />
        <input style="width:52px;text-align:center" inputmode="numeric" value=${wantQty} onInput=${e => setWantQty(e.target.value)} />
        <button class="step plus" style="width:40px" disabled=${!wantPart.trim()}
          onClick=${() => { upsertMoc({ ...moc, wanted: [...wanted, { partNum: wantPart.trim(), colorName: "", qty: parseInt(wantQty) || 1 }] }); setWantPart(""); setWantQty("1"); }}>+</button>
      </div>
      <button class="ghost" style="margin-top:8px" onClick=${() => setImportOpen(true)}>⬇ Import parts list…</button>
      ${wanted.length > 0 && html`<button class="ghost" style="margin-top:6px;color:var(--red);border-color:var(--red)"
        onClick=${() => { if (confirm("Clear the entire wanted list?")) upsertMoc({ ...moc, wanted: [] }); }}>Clear wanted list</button>`}
    </div>

    <div class="card">
      <${Label}>Instructions (PDF) · ${(moc.pdfs || []).length}</${Label}>
      ${(moc.pdfs || []).map(f => html`<div key=${f.id} class="row" style="margin-bottom:8px">
        <button class="ghost ellip" style="flex:1;text-align:left;min-width:0;padding:10px 12px" onClick=${() => openPdf(f)}>📄 ${f.name}${mb(f.size)}</button>
        <button class="step" style="width:38px;height:38px;font-size:14px;color:var(--red);border-color:var(--red)"
          onClick=${() => { if (confirm(`Remove "${f.name}"?`)) removePdf(f.id); }}>✕</button>
      </div>`)}
      <button class="ghost" onClick=${() => pdfInput.current?.click()}>+ Attach PDF</button>
      <input ref=${pdfInput} type="file" accept="application/pdf" style="display:none"
        onChange=${e => { const f = e.target.files?.[0]; if (f) attachPdf(f); e.target.value = ""; }} />
      <div class="dim" style="font-size:12px;margin-top:8px">Stored on this device; tap to save/open via the iOS sheet. PDFs are NOT included in JSON backups — keep originals in Files.</div>
    </div>

    <div class="row" style="gap:8px;margin-bottom:12px">
      <button class="btn" style="flex:1" onClick=${() => { setMode("add"); setSrcSet(groups[0]?.[0] || ""); }}>+ Add parts</button>
      <button class="ghost" style="flex:1" disabled=${stats.pcs === 0} onClick=${() => setMode("return")}>⇠ Return parts</button>
    </div>

    ${groups.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">
      No real parts allocated yet. + Add parts pulls from a tracked set; the → button on any set part row pushes from there.</div>`}
    ${groups.map(([setNum, g]) => {
      const open = openGroups.has(setNum);
      const pcs = g.list.reduce((a, x) => a + x.qty, 0);
      return html`<div key=${setNum} style="margin-bottom:8px">
        <button class="row" onClick=${() => toggleGroup(setNum)}
          style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);justify-content:space-between">
          <span class="label ellip" style="margin:0;min-width:0;flex:1;text-align:left">${g.setName} · ${setNum}</span>
          <span class="row" style="gap:10px;flex-shrink:0">
            <span class="mono dim" style="font-size:12px;font-weight:700">${pcs} pcs</span>
            <span class="dim">${open ? "▾" : "▸"}</span>
          </span>
        </button>
        ${open && html`<div style="margin-top:6px">
          ${g.list.map(a => html`<div key=${a.id} class="row" style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:6px">
            ${a.img ? html`<img class="partimg" src=${a.img} loading="lazy"/>` : html`<div class="partimg" style="background:var(--panel2)"></div>`}
            <div style="flex:1;min-width:0">
              <div class="clamp2" style="font-size:13px;line-height:1.25">${a.partName}</div>
              <div class="dim mono" style="font-size:11px">${a.colorName} · ${a.partNumber}</div>
            </div>
            <span class="mono" style="font-weight:700;font-size:13px;color:var(--purple)">×${a.qty}</span>
          </div>`)}
        </div>`}
      </div>`;
    })}

    <div style="height:8px"></div>
    ${!confirmDel
      ? html`<button class="ghost" style="color:var(--red);border-color:var(--red)" onClick=${() => setConfirmDel(true)}>Delete MOC…</button>`
      : html`<button class="btn red" onClick=${() => deleteMoc(moc.id)}>Tap again — parts stay where they physically are, tags are removed</button>`}
    <div style="height:16px"></div>

    ${importOpen && html`<div class="modal" onClick=${e => { if (e.target === e.currentTarget) setImportOpen(false); }}>
      <div class="sheet">
        <${Header} title="Import parts list" onBack=${() => setImportOpen(false)} />
        <div class="dim" style="font-size:12px;margin-bottom:8px">Paste a BrickLink Studio export (XML) or a Rebrickable parts CSV/TSV. Part numbers + quantities are read; colours kept as-is. Imports append to the wanted list.</div>
        <textarea style="height:150px;font-family:ui-monospace,monospace;font-size:12px" placeholder="Paste XML or CSV here…" value=${importText} onInput=${e => setImportText(e.target.value)}></textarea>
        <div style="height:10px"></div>
        <div class="row" style="gap:8px">
          <button class="btn" style="flex:1" disabled=${!importText.trim()} onClick=${doImport}>Import</button>
          <button class="ghost" style="flex:1" onClick=${() => { setImportText(""); setImportOpen(false); }}>Cancel</button>
        </div>
      </div>
    </div>`}

    ${editing && html`<${MocSheet} initial=${moc} onClose=${() => setEditing(false)}
      onSave=${m => { upsertMoc(m); setEditing(false); }} />`}
  </div>`;
}

function WtbAdd({ onAdd }) {
  const [partNum, setPartNum] = useState("");
  const [color, setColor] = useState("");
  const [qty, setQty] = useState("1");
  const [note, setNote] = useState("");
  const add = () => {
    if (!partNum.trim() && !note.trim()) return;
    onAdd({ partNum: partNum.trim(), colorName: color.trim(), qty: parseInt(qty) || 1, note: note.trim() });
    setPartNum(""); setColor(""); setQty("1"); setNote("");
  };
  return html`<div class="card" style="padding:12px">
    <div class="row" style="gap:8px">
      <input name="bt-wtb-part" autocomplete="off" autocapitalize="characters" style="flex:1" placeholder="Part # or name" value=${partNum} onInput=${e => setPartNum(e.target.value)} />
      <input inputmode="numeric" style="width:58px;text-align:center" placeholder="Qty" value=${qty} onInput=${e => setQty(e.target.value)} />
    </div>
    <div style="height:8px"></div>
    <div class="row" style="gap:8px">
      <input name="bt-wtb-color" autocomplete="off" style="flex:1" placeholder="Colour (optional)" value=${color} onInput=${e => setColor(e.target.value)} />
      <input name="bt-wtb-note" autocomplete="off" style="flex:1" placeholder="Note (set, MOC…)" value=${note} onInput=${e => setNote(e.target.value)} />
    </div>
    <div style="height:8px"></div>
    <button class="btn" disabled=${!partNum.trim() && !note.trim()} onClick=${add}>+ Add to want list</button>
  </div>`;
}

function SetsList({ index, buys, cats, addBuy, persistSet, merch, upsertMerch, deleteMerch, openMerchId, setOpenMerchId, mocs = [], upsertMoc, allocBySet, onOpenMoc, onOpen, onAdd }) {
  const [newMoc, setNewMoc] = useState(false);
  const [wtb, setWtbRaw] = useState(() => load("bt:wtb", [])); // NF4 want-to-buy list
  const saveWtb = v => { setWtbRaw(v); save("bt:wtb", v); };
  const [editingMerch, setEditingMerch] = useState(false); // merch edit sheet over the detail page
  // segment: sets | merch
  const [seg, setSegRaw] = useState(() => load("bt:sv:seg", "sets"));
  const setSeg = v => { setSegRaw(v); save("bt:sv:seg", v); };
  // persisted view state
  // triage/theme filters are MULTI-SELECT (v0.21): arrays of included ids; Keep is unticked by default.
  const [filterM, setFilterMRaw] = useState(() => load("bt:sv:filterM", ["undecided", "sell", "partOut"]));
  const [themeM, setThemeMRaw] = useState(() => load("bt:sv:themeM", [])); // empty = all themes
  const setFilterM = v => { setFilterMRaw(v); save("bt:sv:filterM", v); };
  const setThemeM = v => { setThemeMRaw(v); save("bt:sv:themeM", v); };
  const toggleFilter = id => setFilterM(filterM.includes(id) ? filterM.filter(x => x !== id) : [...filterM, id]);
  const toggleTheme = t => setThemeM(themeM.includes(t) ? themeM.filter(x => x !== t) : [...themeM, t]);
  const [sort, setSortRaw] = useState(() => load("bt:sv:sort", "date"));
  const [view, setViewRaw] = useState(() => load("bt:sv:view", "flat")); // flat | bybuy | bytheme
  const [density, setDensityRaw] = useState(() => load("bt:sv:density", "detailed")); // detailed | compact
  const setDensity = v => { setDensityRaw(v); save("bt:sv:density", v); };
  const [expandedIds, setExpandedIds] = useState(() => new Set()); // compact rows expanded in place
  const toggleExpanded = n => setExpandedIds(prev => { const x = new Set(prev); x.has(n) ? x.delete(n) : x.add(n); return x; });
  const [bkind, setBkindRaw] = useState(() => load("bt:sv:bkind", "all")); // by-buy view: bulk | regular | all
  const setBkind = v => { setBkindRaw(v); save("bt:sv:bkind", v); };
  const [openNav, setOpenNav] = useState(null); // null | "triage" | "theme"
  const setSort = v => { const nv = typeof v === "function" ? v(sort) : v; setSortRaw(nv); save("bt:sv:sort", nv); };
  const setView = v => { setViewRaw(v); save("bt:sv:view", v); };
  const [condF, setCondFRaw] = useState(() => load("bt:sv:cond", "all")); // all | new | used (#2)
  const setCondF = v => { setCondFRaw(v); save("bt:sv:cond", v); };
  const [incompleteOnly, setIncRaw] = useState(() => load("bt:sv:incomplete", false));
  const setIncompleteOnly = v => { setIncRaw(v); save("bt:sv:incomplete", v); };
  const [openBuyGroups, setOpenBuyGroups] = useState(() => new Set(load("bt:sv:groups", [])));
  const toggleBuyGroup = id => setOpenBuyGroups(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id);
    save("bt:sv:groups", [...n]); return n;
  });
  const [openThemeGroups, setOpenThemeGroups] = useState(() => new Set(load("bt:sv:tgroups", [])));
  const toggleThemeGroup = id => setOpenThemeGroups(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id);
    save("bt:sv:tgroups", [...n]); return n;
  });

  // theme backfill for sets added before v0.16
  const [backfill, setBackfill] = useState("");
  const missingTheme = useMemo(() => index.filter(e => !e.theme), [index]);
  async function fetchThemes() {
    if (!getKey().trim()) { setBackfill("Add your Rebrickable key in Settings first."); return; }
    try {
      const map = await fetchThemesMap();
      let i = 0;
      for (const e of missingTheme) {
        setBackfill(`Fetching themes… ${++i}/${missingTheme.length}`);
        const rec = structuredClone(load(`bt:set:${e.setNum}`, null));
        if (!rec) continue;
        const m = await rbFetch(`https://rebrickable.com/api/v3/lego/sets/${e.setNum}/`);
        rec.themeId = m.theme_id;
        rec.theme = rootTheme(map, m.theme_id) || "Other";
        persistSet(rec);
      }
      setBackfill("");
    } catch (e) { setBackfill("Theme fetch failed: " + (e.message || e)); }
  }

  const themeOf = e => e.theme || "No theme";
  const usedThemes = useMemo(() => {
    const m = new Map();
    for (const e of index) { const t = themeOf(e); m.set(t, (m.get(t) || 0) + 1); }
    return [...m.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }, [index]);

  const bestVal = e => Math.max(e.valueSet || 0, e.valuePartOut || 0);
  const allTriage = filterM.length >= TRIAGE.length;
  const shown = useMemo(() => {
    let l = index;
    if (!allTriage) l = l.filter(e => filterM.includes(e.triage));
    if (themeM.length) l = l.filter(e => themeM.includes(themeOf(e)));
    if (condF !== "all") l = l.filter(e => (e.condition === "new" ? "new" : "used") === condF);
    if (incompleteOnly) l = l.filter(e => (e.pct || 0) < 100);
    return [...l].sort((a, b) =>
      sort === "pct" ? b.pct - a.pct :
      sort === "value" ? bestVal(b) - bestVal(a) :
      b.dateAdded - a.dateAdded);
  }, [index, filterM, themeM, sort, allTriage, condF, incompleteOnly]);

  // by-buy view (v0.21): groups by CHANNEL — all Amazon together, all FB Marketplace together…
  // A set spanning channels appears under each; unlinked sets under No Buy (All segment only).
  const buyGroups = useMemo(() => {
    if (view !== "bybuy") return [];
    const kindOk = b => bkind === "all" || buyKind(b) === bkind;
    const m = new Map(); // channel -> Map(setNum -> entry)
    for (const e of shown) for (const id of (e.buyIds || [])) {
      const b = buys.find(x => x.id === id);
      if (!b || !kindOk(b)) continue;
      const ch = b.category || "No channel";
      if (!m.has(ch)) m.set(ch, new Map());
      m.get(ch).set(e.setNum, e);
    }
    const gs = [...m.entries()]
      .sort((a, b) => a[0] === "No channel" ? 1 : b[0] === "No channel" ? -1 : a[0].localeCompare(b[0]))
      .map(([ch, sm]) => ({ id: "ch:" + ch, label: ch, sets: [...sm.values()] }));
    if (bkind === "all") {
      const noBuy = shown.filter(e => !(e.buyIds || []).length);
      if (noBuy.length) gs.push({ id: "__nobuy", label: "No Buy Configured", sets: noBuy });
    }
    return gs;
  }, [view, shown, buys, bkind]);

  // by-theme grouping: alpha order, No theme last
  const themeGroups = useMemo(() => {
    if (view !== "bytheme") return [];
    const m = new Map();
    for (const e of shown) { const t = themeOf(e); if (!m.has(t)) m.set(t, []); m.get(t).push(e); }
    return [...m.entries()].sort((a, b) =>
      a[0] === "No theme" ? 1 : b[0] === "No theme" ? -1 : a[0].localeCompare(b[0]));
  }, [view, shown]);

  // #12: New purchases vs Bulk/used (independent of the by-buy channel grouping)
  const condGroups = useMemo(() => {
    if (view !== "bycond") return [];
    const groups = { "✨ New purchases": [], "♻️ Bulk / used": [] };
    for (const e of shown) groups[e.condition === "new" ? "✨ New purchases" : "♻️ Bulk / used"].push(e);
    return Object.entries(groups).filter(([, l]) => l.length);
  }, [view, shown]);

  const filtersActive = !allTriage || themeM.length > 0 || condF !== "all" || incompleteOnly;
  const triageActive = allTriage ? "Triage" : `Triage · ${filterM.length}`;
  const themeActive = themeM.length === 0 ? "Theme" : `Theme · ${themeM.length}`;
  const seenMerch = useMemo(() => [...merch].sort((a, b) => b.dateAdded - a.dateAdded), [merch]);

  const segBar = html`<div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:12px">
    ${[["sets", `Sets · ${index.length}`], ["merch", `Merch · ${merch.length}`], ["mocs", `MOCs · ${mocs.length}`], ["wtb", `WTB · ${wtb.length}`]].map(([id, label]) => html`
      <button key=${id} onClick=${() => setSeg(id)}
        style=${`flex:1;border:none;padding:9px 5px;border-radius:9px;font-weight:700;font-size:12px;` +
          (seg === id ? "background:var(--yellow);color:#1C1A17" : "background:transparent;color:var(--dim)")}>${label}</button>`)}
  </div>`;

  if (seg === "mocs") return html`<div key="seg-mocs">
    <${Header} title="MOCs" sub=${`${mocs.length} build${mocs.length === 1 ? "" : "s"}`} />
    ${segBar}
    <button class="btn" style="margin-bottom:12px" onClick=${() => setNewMoc(true)}>+ Add MOC</button>
    ${mocs.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
      No MOCs yet. Create one, then pull real parts in from your tracked sets — the app remembers where every genuine piece came from.</div>`}
    ${[...mocs].sort((a, b) => b.dateAdded - a.dateAdded).map(m => {
      const s = mocStats(m);
      const src = (m.photoIds || [])[0] && photoSrc(m.photoIds[0]);
      const st = mocStatus(m.status);
      return html`<div key=${m.id} class="card row" style="cursor:pointer" onClick=${() => onOpenMoc(m.id)}>
        ${src ? html`<img class="setimg" style="object-fit:cover" src=${src}/>`
          : html`<div class="setimg" style="background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px">🧩</div>`}
        <div style="flex:1;min-width:0">
          <div class="ellip" style="font-weight:700">${m.name}</div>
          <div class="dim mono" style="font-size:12px">${s.pcs} real pcs from ${s.sets} set${s.sets === 1 ? "" : "s"}${(m.pdfs || []).length ? " · 📄" : ""}</div>
          <div style="margin-top:5px">
            <span class="badge" style=${m.status === "built"
              ? "color:#1C1A17;background:var(--green)"
              : `color:${st[2]};border:1px solid ${st[2]}`}>${st[1]}</span>
          </div>
        </div>
      </div>`;
    })}
    ${newMoc && html`<${MocSheet} initial=${null} onClose=${() => setNewMoc(false)}
      onSave=${m => { upsertMoc(m); setNewMoc(false); onOpenMoc(m.id); }} />`}
  </div>`;

  if (seg === "wtb") return html`<div key="seg-wtb">
    <${Header} title="Want to buy" sub=${`${wtb.filter(w => !w.got).length} open · ${wtb.length} total`} />
    ${segBar}
    <${WtbAdd} onAdd=${p => saveWtb([{ id: String(Date.now()), got: false, ...p }, ...wtb])} />
    <div style="height:12px"></div>
    ${wtb.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">
      Nothing flagged yet. Add parts you want to grab next PAB-wall or second-hand trip — then check them off as you find them.</div>`}
    ${[...wtb].sort((a, b) => (a.got ? 1 : 0) - (b.got ? 1 : 0)).map(w => html`<div key=${w.id} class="card row" style=${`gap:10px;${w.got ? "opacity:.5" : ""}`}>
      <button class="step" style=${`width:34px;height:34px;flex-shrink:0;border-color:${w.got ? "var(--green)" : "var(--line)"};background:${w.got ? "var(--green)" : "transparent"};color:#1C1A17;font-weight:800`}
        onClick=${() => saveWtb(wtb.map(x => x.id === w.id ? { ...x, got: !x.got } : x))}>${w.got ? "✓" : ""}</button>
      <div style="flex:1;min-width:0">
        <div class="ellip" style=${`font-weight:700;${w.got ? "text-decoration:line-through" : ""}`}>${w.partNum || "(part)"}${w.colorName ? ` · ${w.colorName}` : ""}</div>
        <div class="dim" style="font-size:12px">×${w.qty}${w.note ? ` · ${w.note}` : ""}</div>
      </div>
      <button class="step" style="width:34px;height:34px;flex-shrink:0;color:var(--red);border-color:var(--red)"
        onClick=${() => saveWtb(wtb.filter(x => x.id !== w.id))}>✕</button>
    </div>`)}
    ${wtb.some(w => w.got) && html`<button class="ghost" style="margin-top:8px" onClick=${() => { if (confirm("Clear all checked-off items?")) saveWtb(wtb.filter(w => !w.got)); }}>Clear checked-off</button>`}
  </div>`;

  const openMerchItem = openMerchId && openMerchId !== "__new" ? (merch.find(m => m.id === openMerchId) || null) : null;
  const merchSheet = (openMerchId === "__new" || (openMerchItem && editingMerch)) && html`<${MerchSheet}
    initial=${openMerchId === "__new" ? null : openMerchItem}
    buys=${buys} cats=${cats} addBuy=${addBuy}
    onClose=${() => { setEditingMerch(false); if (openMerchId === "__new") setOpenMerchId(null); }}
    onSave=${m => { upsertMerch(m); setEditingMerch(false); if (openMerchId === "__new") setOpenMerchId(m.id); }}
    onDelete=${() => { deleteMerch(openMerchId); setEditingMerch(false); setOpenMerchId(null); }} />`;

  // full-page read-only merch detail (replaces the list while open)
  if (seg === "merch" && openMerchItem) return html`<div key=${"seg-merch-detail-" + openMerchItem.id}>
    <${MerchDetail} m=${openMerchItem} buys=${buys} upsertMerch=${upsertMerch}
      onEdit=${() => setEditingMerch(true)}
      onBack=${() => { setEditingMerch(false); setOpenMerchId(null); }} />
    ${merchSheet}
  </div>`;

  if (seg === "merch") return html`<div key="seg-merch">
    <${Header} title="Merch" sub=${`${merch.length} item${merch.length === 1 ? "" : "s"}`} />
    ${segBar}
    <button class="btn" style="margin-bottom:12px" onClick=${() => setOpenMerchId("__new")}>+ Add merch</button>
    ${merch.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
      No merch yet. Track LEGO-branded boxes, storage, displays — anything that isn't a set.</div>`}
    ${seenMerch.map(m => {
      const linked = (m.buyIds || []).map(id => buys.find(b => b.id === id)).filter(Boolean);
      const src = (m.photoIds || [])[0] && photoSrc(m.photoIds[0]);
      return html`<div key=${m.id} class="card row" style="cursor:pointer" onClick=${() => setOpenMerchId(m.id)}>
        ${src ? html`<img class="setimg" style="object-fit:cover" src=${src}/>`
          : html`<div class="setimg" style="background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px">🧰</div>`}
        <div style="flex:1;min-width:0">
          <div class="ellip" style="font-weight:700">${m.name}</div>
          <div class="dim mono" style="font-size:12px">${[m.year, m.rrp ? `RRP ${money(m.rrp)} then` : null].filter(Boolean).join(" · ") || "—"}</div>
          <div class="row" style="gap:6px;margin-top:5px">
            <span class="badge" style=${`color:${condColor(m.condition)};border:1px solid ${condColor(m.condition)}`}>${condLabel(m.condition)}</span>
            ${linked.length > 0 && html`<span class="dim ellip" style="font-size:11px;min-width:0">${linked.map(b => b.label).join("  +  ")}</span>`}
          </div>
        </div>
        ${m.pricePaid ? html`<span class="mono" style="font-weight:700;font-size:13px;color:var(--yellow);flex-shrink:0">${money(m.pricePaid)}</span>` : ""}
      </div>`;
    })}
    ${merchSheet}
  </div>`;

  return html`<div key="seg-sets">
    <${Header} title="Sets" sub=${`${index.length} tracked`} />
    ${segBar}
    <button class="btn" style="margin-bottom:12px" onClick=${onAdd}>+ Add set</button>
    ${missingTheme.length > 0 && html`<div class="card row" style="padding:10px 12px">
      <span class="dim" style="font-size:12px;flex:1">${backfill || `${missingTheme.length} set${missingTheme.length === 1 ? "" : "s"} missing theme`}</span>
      <button class="chip" style="border-color:var(--yellow);color:var(--yellow)" disabled=${backfill.startsWith("Fetching")}
        onClick=${fetchThemes}>Fetch</button>
    </div>`}
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px">
      <${Chip} key="c-view" label=${view === "bybuy" ? "⊟ By buy" : view === "bytheme" ? "⊞ By theme" : view === "bycond" ? "✨ By condition" : "≡ Flat"} color="var(--purple)" active
        onClick=${() => setView(view === "flat" ? "bybuy" : view === "bybuy" ? "bytheme" : view === "bytheme" ? "bycond" : "flat")} />
      <${Chip} key="c-density" label=${density === "compact" ? "▤ Compact" : "▦ Detailed"} color="var(--green)" active
        onClick=${() => setDensity(density === "compact" ? "detailed" : "compact")} />
      ${density === "compact" && html`<${Chip} key="c-expall" label=${expandedIds.size > 0 ? "⌃ All" : "⌄ All"} color="var(--dim)" active=${false}
        onClick=${() => setExpandedIds(expandedIds.size > 0 ? new Set() : new Set(shown.map(e => e.setNum)))} />`}
      <${Chip} key="c-triage" label=${`${triageActive} ${openNav === "triage" ? "▴" : "▾"}`}
        color=${allTriage ? "var(--text)" : "var(--yellow)"} active
        onClick=${() => setOpenNav(v => v === "triage" ? null : "triage")} />
      <${Chip} key="c-theme" label=${`${themeActive} ${openNav === "theme" ? "▴" : "▾"}`} color="var(--yellow)" active
        onClick=${() => setOpenNav(v => v === "theme" ? null : "theme")} />
      <${Chip} key="c-cond" label=${condF === "new" ? "✨ New" : condF === "used" ? "♻️ Used" : "Condition"} color="var(--green)" active=${condF !== "all"}
        onClick=${() => setCondF(condF === "all" ? "used" : condF === "used" ? "new" : "all")} />
      <${Chip} key="c-inc" label="Incomplete" color="var(--yellow)" active=${incompleteOnly}
        onClick=${() => setIncompleteOnly(!incompleteOnly)} />
      <${Chip} key="c-sort" label=${sort === "pct" ? "↓ Completion" : sort === "value" ? "↓ Value" : "↓ Newest"} color="var(--blue)" active
        onClick=${() => setSort(s => s === "date" ? "pct" : s === "pct" ? "value" : "date")} />
      ${filtersActive && html`<${Chip} key="c-clear" label="✕ Clear" color="var(--red)" active=${false}
        onClick=${() => { setFilterM(TRIAGE.map(t => t.id)); setThemeM([]); setCondF("all"); setIncompleteOnly(false); setOpenNav(null); }} />`}
    </div>

    ${openNav === "triage" && html`<div key="nav-triage" class="card navin" style="padding:10px;display:flex;flex-direction:column;gap:8px">
      <div class="row" style="gap:8px">
        <button class="chip" style="flex:1;border-color:var(--line);color:var(--dim)"
          onClick=${() => setFilterM(TRIAGE.map(t => t.id))}>All</button>
        <button class="chip" style="flex:1;border-color:var(--line);color:var(--dim)"
          onClick=${() => setFilterM([])}>None</button>
      </div>
      ${TRIAGE.map(o => {
        const on = filterM.includes(o.id);
        return html`<button key=${o.id} class="chip row" style=${`border-color:${o.color};color:${o.color};gap:8px;justify-content:flex-start`}
          onClick=${() => toggleFilter(o.id)}>
          <span style=${`width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid ${o.color};background:${on ? o.color : "transparent"};color:#1C1A17`}>${on ? "✓" : ""}</span>
          ${o.label} · ${index.filter(e => e.triage === o.id).length}
        </button>`;
      })}
      <div class="dim" style="font-size:11px">Tick combinations — e.g. Undecided + Sell. Keep is unticked by default to thin the list.</div>
    </div>`}
    ${openNav === "theme" && html`<div key="nav-theme" class="card navin" style="padding:10px;display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto">
      <button class="chip" style=${`border-color:var(--dim);color:${themeM.length === 0 ? "#1C1A17" : "var(--dim)"};background:${themeM.length === 0 ? "var(--dim)" : "transparent"}`}
        onClick=${() => setThemeM([])}>All themes · ${index.length}</button>
      ${usedThemes.map(([t, n]) => {
        const on = themeM.includes(t);
        return html`<button key=${t} class="chip row" style="border-color:var(--yellow);color:var(--yellow);gap:8px;justify-content:flex-start"
          onClick=${() => toggleTheme(t)}>
          <span style=${`width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid var(--yellow);background:${on ? "var(--yellow)" : "transparent"};color:#1C1A17`}>${on ? "✓" : ""}</span>
          ${t} · ${n}
        </button>`;
      })}
    </div>`}

    ${shown.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
      ${index.length === 0 ? "No sets yet. Add one to start triaging." : "Nothing matches this filter. Keep is unticked by default — open Triage to re-tick it."}</div>`}

    ${(() => {
      const card = (e, showBuysCard = true) => html`<${SetCard} key=${density + "-" + e.setNum} e=${e} buys=${buys}
        mocPcs=${allocBySet?.get(e.setNum) || 0} onOpen=${onOpen} showBuys=${showBuysCard}
        compact=${density === "compact"} expanded=${expandedIds.has(e.setNum)}
        onToggleExpand=${() => toggleExpanded(e.setNum)} />`;
      return html`<div>
        ${view === "flat" && html`<div key="v-flat">${shown.map(e => card(e))}</div>`}

        ${view === "bybuy" && html`<div key="v-bybuy">
          <div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:10px">
            ${[["bulk", "Bulk"], ["regular", "Regular"], ["all", "All"]].map(([id, label]) => html`
              <button key=${id} onClick=${() => setBkind(id)}
                style=${`flex:1;border:none;padding:8px;border-radius:9px;font-weight:700;font-size:13px;` +
                  (bkind === id ? "background:var(--yellow);color:#1C1A17" : "background:transparent;color:var(--dim)")}>${label}</button>`)}
          </div>
          ${buyGroups.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">No sets under this segment.</div>`}
          ${buyGroups.map(g => {
            const open = openBuyGroups.has(g.id);
            return html`<div key=${g.id} style="margin-bottom:8px">
              <button class="row" onClick=${() => toggleBuyGroup(g.id)}
                style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);justify-content:space-between">
                <span class="label ellip" style="margin:0;min-width:0;flex:1;text-align:left">${g.label}</span>
                <span class="row" style="gap:10px;flex-shrink:0">
                  <span class="mono dim" style="font-size:12px;font-weight:700">${g.sets.length}</span>
                  <span class="dim">${open ? "▾" : "▸"}</span>
                </span>
              </button>
              ${open && html`<div style="margin-top:6px">
                ${g.sets.map(e => card(e, true))}
              </div>`}
            </div>`;
          })}
        </div>`}

        ${view === "bytheme" && html`<div key="v-bytheme">${themeGroups.map(([t, sets]) => {
          const open = openThemeGroups.has(t);
          return html`<div key=${t} style="margin-bottom:8px">
            <button class="row" onClick=${() => toggleThemeGroup(t)}
              style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);justify-content:space-between">
              <span class="label ellip" style="margin:0;min-width:0;flex:1;text-align:left">${t}</span>
              <span class="row" style="gap:10px;flex-shrink:0">
                <span class="mono dim" style="font-size:12px;font-weight:700">${sets.length}</span>
                <span class="dim">${open ? "▾" : "▸"}</span>
              </span>
            </button>
            ${open && html`<div style="margin-top:6px">
              ${sets.map(e => card(e))}
            </div>`}
          </div>`;
        })}</div>`}

        ${view === "bycond" && html`<div key="v-bycond">${condGroups.map(([t, sets]) => {
          const open = openThemeGroups.has("cond-" + t);
          return html`<div key=${t} style="margin-bottom:8px">
            <button class="row" onClick=${() => toggleThemeGroup("cond-" + t)}
              style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);justify-content:space-between">
              <span class="label ellip" style="margin:0;min-width:0;flex:1;text-align:left">${t}</span>
              <span class="row" style="gap:10px;flex-shrink:0">
                <span class="mono dim" style="font-size:12px;font-weight:700">${sets.length}</span>
                <span class="dim">${open ? "▾" : "▸"}</span>
              </span>
            </button>
            ${open && html`<div style="margin-top:6px">${sets.map(e => card(e))}</div>`}
          </div>`;
        })}</div>`}
      </div>`;
    })()}
    ${merchSheet}
  </div>`;
}

// ---------- Add set (direct fetch + scan) ----------
function AddSet({ buys, cats, addBuy, existing, lastBuy, prefBuy, onCancel, onOpenExisting, onSave, onQuickSave }) {
  const [numRaw, setNumRaw] = useState("");
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState("");
  const [err, setErr] = useState("");
  const [dup, setDup] = useState(null); // already-tracked set number
  const [fetched, setFetched] = useState(null); // {meta, parts}
  const [buyIds, setBuyIds] = useState(() => prefBuy ? [prefBuy.id] : lastBuy ? [lastBuy.id] : []);
  const [scan, setScan] = useState(false);
  const [newReceipt, setNewReceipt] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  // mode: normal | quick | bulk (bulk implies quick) — persisted via the two legacy keys
  const [quick, setQuickRaw] = useState(() => load("bt:quickadd", false));
  const [bulkMode, setBulkModeRaw] = useState(() => load("bt:bulkadd", false));
  const mode = quick ? (bulkMode ? "bulk" : "quick") : "normal";
  const setMode = m => {
    const q = m !== "normal", b = m === "bulk";
    setQuickRaw(q); save("bt:quickadd", q);
    setBulkModeRaw(b); save("bt:bulkadd", b);
  };
  const [savedMsg, setSavedMsg] = useState("");
  const key = getKey().trim();

  // #1: autosave an in-progress add as a draft so tabbing away (jump-to-top) never loses it.
  // Only for the general add flow (not when adding into a specific buy).
  const clearDraft = () => del("bt:addset:draft");
  useEffect(() => {
    if (prefBuy) return;
    const d = load("bt:addset:draft", null);
    if (d) { if (d.numRaw) setNumRaw(d.numRaw); if (Array.isArray(d.buyIds) && d.buyIds.length) setBuyIds(d.buyIds); if (d.fetched) setFetched(d.fetched); }
  }, []);
  useEffect(() => {
    if (prefBuy) return;
    if (numRaw || fetched) save("bt:addset:draft", { numRaw, buyIds, fetched });
    else del("bt:addset:draft");
  }, [numRaw, buyIds, fetched, prefBuy]);

  async function go(raw) {
    const setNum = normSetNum(raw);
    setErr(""); setSavedMsg(""); setDup(null);
    if (!key) { setErr("Add your Rebrickable key in Settings first."); return; }
    if (existing.includes(setNum)) { setDup(setNum); return; }
    setBusy(true);
    try {
      const r = await fetchFullSet(setNum, setProgress);
      if (quick) {
        const linked = buys.filter(b => buyIds.includes(b.id));
        const cond = defaultCondFromBuys(buyIds, buys);
        let rec = { ...r.meta, instructions: "none", triage: "undecided", condition: cond,
          built: false, pricePaid: 0, rrp: 0, box: { has: false, cond: "good", note: "" },
          buyIds: [...buyIds], notes: "", dateAdded: Date.now(), parts: r.parts, minifigs: r.minifigs || [] };
        if (cond === "new") rec = applyNewAutofill(rec);
        onQuickSave(rec, bulkMode);
        if (!bulkMode) clearDraft();
        if (bulkMode) { setNumRaw(""); setSavedMsg(`Saved ${r.meta.name} (${r.meta.setNum})${linked.length ? " → " + linked.map(b => b.label).join(" + ") : ""}`); }
      } else {
        setFetched(r);
      }
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false); setProgress("");
  }

  const MODE_HINT = {
    normal: "Fetch, review, then save manually.",
    quick: `Fetch auto-saves, linked to the buys below, then returns to ${prefBuy ? "the buy" : "the sets list"}.`,
    bulk: "Fetch auto-saves and stays here for the next set.",
  };
  const FETCH_LABEL = { normal: "Fetch set + inventory", quick: "Fetch + save", bulk: "Fetch + save (stay)" };
  const MODE_ON = { normal: "background:var(--line);color:var(--text)",
    quick: "background:var(--yellow);color:#1C1A17", bulk: "background:var(--purple);color:#1C1A17" };

  return html`<div>
    <${Header} title="Add set" sub=${prefBuy ? `into ${prefBuy.label}` : "Rebrickable direct"} onBack=${() => { clearDraft(); onCancel(); }} />
    <div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:6px">
      ${[["normal", "Normal"], ["quick", "⚡ Quick"], ["bulk", "↻ Bulk"]].map(([id, label]) => html`
        <button key=${id} onClick=${() => setMode(id)}
          style=${"flex:1;border:none;padding:9px 4px;border-radius:9px;font-weight:700;font-size:13px;" +
            (mode === id ? MODE_ON[id] : "background:transparent;color:var(--dim)")}>${label}</button>`)}
    </div>
    <div class="dim" style="font-size:12px;margin:0 2px 12px">${MODE_HINT[mode]}</div>
    ${savedMsg && html`<div class="card" style="color:var(--green);font-size:13px;font-weight:600">✓ ${savedMsg}</div>`}
    ${!fetched && html`<div>
      <div class="card">
        <${Label}>Link to buy</${Label}>
        ${(() => {
          const chosen = buys.filter(b => buyIds.includes(b.id));
          const summary = chosen.length ? chosen.map(b => b.label).join("  +  ") : "No buy — tap to link";
          return html`<button class="row" onClick=${() => setPickerOpen(v => !v)}
            style=${`width:100%;background:var(--panel2);border:1px solid ${chosen.length ? "var(--purple)" : "var(--line)"};border-radius:10px;padding:12px;color:var(--text);justify-content:space-between;text-align:left`}>
            <span class="ellip" style=${`font-weight:700;font-size:14px;min-width:0;flex:1;${chosen.length ? "" : "color:var(--dim)"}`}>${summary}</span>
            <span class="dim" style="flex-shrink:0">${pickerOpen ? "▴" : "▾"}</span>
          </button>`;
        })()}
        ${pickerOpen && html`<div style="margin-top:10px">
          ${(() => {
            const isToday = ts => { const a = new Date(ts), b = new Date();
              return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); };
            const todays = buys.filter(b => buyKind(b) === "regular" && isToday(b.date) && !buyIds.includes(b.id)).slice(-2).reverse();
            return html`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:8px">
              ${todays.map(b => html`<button key=${b.id} class="chip"
                style="border-color:var(--blue);color:var(--blue)"
                onClick=${() => setBuyIds([...buyIds, b.id])}>⚡ ${b.label}</button>`)}
              ${!newReceipt && html`<button class="chip" style="border-color:var(--line);color:var(--dim)"
                onClick=${() => setNewReceipt(true)}>＋ New receipt…</button>`}
            </div>`;
          })()}
          ${newReceipt && html`<div style="margin-bottom:8px">
            <${BuyForm} categories=${cats} initial=${{ kind: "regular" }} submitLabel="Add receipt"
              onCancel=${() => setNewReceipt(false)}
              onAdd=${b => { addBuy(b); setBuyIds([...buyIds, b.id]); setNewReceipt(false); }} />
          </div>`}
          <${BuySelect} buys=${buys} cats=${cats} selected=${buyIds} onChange=${setBuyIds} onCreateBuy=${addBuy} />
          <div class="dim" style="font-size:12px;margin-top:8px">Defaults to the last bulk buy added to. ⚡ chips link today's receipts. Applies to every set saved from this page. Receipt-linked sets save as 🛍️ New (all parts auto-marked have).</div>
        </div>`}
      </div>
      <div class="card">
        <${Label}>Set number</${Label}>
        <input inputmode="numeric" placeholder="e.g. 75281 or 75281-1" value=${numRaw}
          onInput=${e => setNumRaw(e.target.value)} />
        <div style="height:10px"></div>
        <button class="btn" disabled=${busy || !numRaw.trim()} onClick=${() => go(numRaw)}>
          ${busy ? (progress || "Fetching…") : FETCH_LABEL[mode]}
        </button>
        <div style="height:8px"></div>
        <button class="ghost" disabled=${busy} onClick=${() => setScan(true)}>📷 Scan box / instructions / model</button>
      </div>
    </div>`}

    ${fetched && html`
      <div class="card row">
        ${fetched.meta.img && html`<img class="setimg" style="width:72px;height:72px" src=${fetched.meta.img}/>`}
        <div>
          <div style="font-weight:700">${fetched.meta.name}</div>
          <div class="dim mono" style="font-size:12px">${fetched.meta.setNum} · ${fetched.meta.year} · ${fetched.meta.numParts} parts · ${fetched.parts.length} inventory rows</div>
        </div>
      </div>
      <div class="card">
        <button class="btn green" onClick=${() => {
          const cond = defaultCondFromBuys(buyIds, buys);
          let rec = { ...fetched.meta, instructions: "none", triage: "undecided", condition: cond,
            built: false, pricePaid: 0, rrp: 0, box: { has: false, cond: "good", note: "" },
            buyIds, notes: "", dateAdded: Date.now(), parts: fetched.parts, minifigs: fetched.minifigs || [] };
          if (cond === "new") rec = applyNewAutofill(rec);
          clearDraft();
          onSave(rec);
        }}>Save set</button>
        <div style="height:8px"></div>
        <button class="ghost" onClick=${() => setFetched(null)}>Back</button>
      </div>`}

    ${dup && html`<div class="card">
      <div style="font-weight:700;margin-bottom:4px">${dup} is already tracked</div>
      <div class="dim" style="font-size:13px;margin-bottom:10px">Open it to log more parts, or dismiss and keep adding.</div>
      <div class="row" style="gap:8px">
        <button class="btn" style="flex:1" onClick=${() => onOpenExisting(dup)}>Open set</button>
        <button class="ghost" style="flex:1" onClick=${() => { setDup(null); setNumRaw(""); }}>Dismiss</button>
      </div>
    </div>`}
    ${err && html`<div class="card" style="color:var(--red);font-size:13px">${err}</div>`}
    ${scan && html`<${ScanModal} hint="One set per photo" onClose=${() => setScan(false)}
      onPick=${it => { setScan(false); setNumRaw(it.id); go(it.id); }} />`}
  </div>`;
}

// ---------- Set detail ----------
function SetDetail({ setNum, buys, cats, addBuy, persistSet, mocs = [], upsertMoc, onBack, onDelete }) {
  const [rec, setRec] = useState(() => load(`bt:set:${setNum}`, null));
  const [q, setQ] = useState("");
  const [showSpares, setShowSpares] = useState(false);
  const [hideFound, setHideFound] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [openColors, setOpenColors] = useState(() => new Set());
  const [moveP, setMoveP] = useState(null); // part row being pushed to a MOC
  const [groupMode, setGroupModeRaw] = useState(() => load("bt:partgroup", "group")); // group | exact
  const setGroupMode = v => { setGroupModeRaw(v); save("bt:partgroup", v); };
  // accordion open state (item 3/5): collapsed by default when the set is New
  const initCond = condOfSet(load(`bt:set:${setNum}`, {}) || {});
  const ACC_IDS = ["value", "triage", "instr", "box", "meta"];
  const [openAcc, setOpenAcc] = useState(() => new Set(initCond === "new" ? [] : ["triage", "instr", "box", "meta"]));
  const toggleAcc = id => setOpenAcc(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const allAccOpen = ACC_IDS.every(id => openAcc.has(id));
  // photo gallery (item 7): catalog image + BrickLink box image (hotlink-tested per set via onerror)
  const [boxImgOk, setBoxImgOk] = useState(true);
  const [galleryAt, setGalleryAt] = useState(null); // null | index
  // parts select mode (item 5)
  const [selMode, setSelMode] = useState(false);
  const [selIds, setSelIds] = useState(() => new Set());
  const toggleSelPart = id => setSelIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const [viewPart, setViewPart] = useState(null); // #3 full-size part image
  const toggleColor = c => setOpenColors(prev => {
    const n = new Set(prev); n.has(c) ? n.delete(c) : n.add(c); return n;
  });
  // per-part-row MOC allocations for this set
  const rowAlloc = useMemo(() => {
    const m = new Map();
    for (const mo of mocs) for (const a of (mo.parts || [])) {
      if (a.setNum !== setNum || a.qty <= 0) continue;
      if (!m.has(a.partRowId)) m.set(a.partRowId, []);
      m.get(a.partRowId).push({ mocId: mo.id, mocName: mo.name, qty: a.qty });
    }
    return m;
  }, [mocs, setNum]);
  const mocTotal = useMemo(() => { let t = 0; for (const l of rowAlloc.values()) for (const x of l) t += x.qty; return t; }, [rowAlloc]);
  const doMove = (p, mocId, qty) => {
    const mo = mocs.find(m => m.id === mocId);
    if (!mo || qty < 1) return;
    const parts = [...(mo.parts || [])];
    const i = parts.findIndex(a => a.setNum === setNum && a.partRowId === p.id);
    if (i >= 0) parts[i] = { ...parts[i], qty: parts[i].qty + qty };
    else parts.push({ id: `${Date.now()}${Math.random().toString(36).slice(2, 6)}`, setNum, setName: rec.name,
      partRowId: p.id, partNumber: p.partNumber, partName: p.partName, colorID: p.colorID, colorName: p.colorName,
      img: p.img, qty });
    upsertMoc({ ...mo, parts, status: mo.status === "disassembled" ? "building" : mo.status });
    setMoveP(null);
  };
  if (!rec) return html`<div class="card">Set not found in storage. <button class="ghost" onClick=${onBack}>Back</button></div>`;
  const { pct, found, total } = completion(rec.parts);
  const logMode = rec.logMode === "remaining" ? "remaining" : "find";
  const rstats = remainingStats(rec);

  const change = mut => setRec(prev => { const next = mut(structuredClone(prev)); persistSet(next); return next; });
  const bump = (id, d) => change(r => {
    const p = r.parts.find(x => x.id === id);
    if (p) {
      const floor = (rowAlloc.get(id) || []).reduce((a, x) => a + x.qty, 0);
      p.qtyFound = Math.max(floor, Math.max(0, Math.min(p.qtyNeeded, p.qtyFound + d)));
    }
    return r;
  });
  // #5: tap a row in select mode → mark all present; tap again → back to the MOC-allocated floor (or 0)
  const toggleFull = p => change(r => {
    const x = r.parts.find(y => y.id === p.id);
    if (x) { const floor = (rowAlloc.get(x.id) || []).reduce((a, z) => a + z.qty, 0);
      x.qtyFound = x.qtyFound >= x.qtyNeeded ? floor : x.qtyNeeded; }
    return r;
  });

  const groups = useMemo(() => {
    const ql = q.trim().toLowerCase();
    const list = rec.parts.filter(p =>
      !isSeparator(p) && (showSpares || !p.isSpare) && (!hideFound || p.qtyFound < p.qtyNeeded) &&
      (!ql || p.partName?.toLowerCase().includes(ql) || p.partNumber?.toLowerCase().includes(ql) || p.colorName?.toLowerCase().includes(ql)));
    const keyOf = p => groupMode === "group" ? colorGroup(p.colorName) : (p.colorName || "Unknown");
    const map = new Map();
    for (const p of list) { const k = keyOf(p); if (!map.has(k)) map.set(k, []); map.get(k).push(p); }
    const entries = [...map.entries()];
    if (groupMode === "group") {
      entries.sort((a, b) => groupRank(a[0]) - groupRank(b[0]));
      for (const [, l] of entries) l.sort((a, b) => `${a.colorName}|${a.partName}`.localeCompare(`${b.colorName}|${b.partName}`));
    } else {
      entries.sort((a, b) => a[0].localeCompare(b[0]));
    }
    return entries;
  }, [rec.parts, q, showSpares, hideFound, groupMode]);

  const cond = condOfSet(rec);
  const isNew = cond === "new";
  const photos = [
    { src: rec.img, label: "Catalog", kind: "rb" },
    ...(boxImgOk ? [{ src: blBoxImg(rec.setNum), label: "Box (BrickLink)", kind: "box" }] : []),
  ].filter(p => p.src);
  const defaultIdx = Math.max(0, photos.findIndex(p => p.kind === (rec.imgDefault === "box" ? "box" : "rb")));
  const setCondition = c => {
    if (c === cond) return;
    if (c === "new") {
      const fill = confirm("Mark as bought new — auto-mark ALL parts + spares as have, instructions → Book ×1 Excellent, box → Yes Excellent, triage → Keep?");
      change(r => fill ? applyNewAutofill({ ...r, condition: "new" }) : ({ ...r, condition: "new" }));
      setOpenAcc(new Set()); // values pre-filled — collapse everything
    } else {
      const unset = confirm("Switch to used — also clear the auto-filled data? (all parts → 0 found, instructions → None, box → None, triage → Undecided)");
      change(r => {
        r.condition = "used";
        if (unset) {
          for (const p of r.parts) p.qtyFound = 0;
          r.instructions = "none"; r.booklets = [];
          r.box = { has: false, cond: "good", note: r.box?.note || "" };
          r.triage = "undecided";
        }
        return r;
      });
      setOpenAcc(new Set(ACC_IDS.filter(id => id !== "value"))); // back to triaging — expand
    }
  };
  // status line priority (approved item-4 model): MOC > Built > complete (new) > x/y found
  const statusLine = mocTotal > 0 ? html`<span style="color:var(--blue);font-weight:700">♻️ ${mocTotal} parts in MOCs</span>`
    : rec.built ? html`<span style="color:var(--green);font-weight:700">Built ✓ · ${total} parts</span>`
    : isNew && found >= total ? html`<span>${total} parts · <span style="color:var(--green);font-weight:700">complete</span></span>`
    : html`<span>${found} / ${total} parts found</span>`;

  // #7: per-set logging mode. Find = tick parts up as found. Remaining = start full, tick down what's
  // physically left after a part-out; the rest is inferred parted out (canonical set count retained).
  const setLogMode = next => {
    if (next === logMode) return;
    if (next === "remaining") {
      if (!confirm("Switch to Remaining mode? This set becomes a part-out donor: it's marked as full (all parts in set), then you tick OFF what you've removed. The set's total count is kept.")) return;
      change(r => { r.logMode = "remaining"; for (const p of r.parts) if (!isSeparator(p) && !p.isSpare) p.qtyFound = p.qtyNeeded; return r; });
    } else {
      change(r => { r.logMode = "find"; return r; });
    }
  };
  const numCol = rstats.had >= rstats.needed ? "var(--green)" : "var(--red)";
  const remainingCounter = html`<div style="font-size:14px;font-weight:700">
    <span style=${`color:${numCol}`}>${rstats.had}</span><span class="dim" style="font-weight:600">/${rstats.needed} pcs in set</span>
    <div class="row" style="gap:6px;flex-wrap:wrap;margin-top:6px">
      ${rstats.parted === 0 && rstats.missing === 0
        ? html`<span class="badge" style="color:var(--green);border:1px solid var(--green)">✓ Full</span>`
        : html`<span class="badge" style="color:var(--yellow);border:1px solid var(--yellow)">${rstats.remaining} left</span>
               <span class="badge" style="color:var(--purple);border:1px solid var(--purple)">${rstats.parted} parted</span>`}
      ${rstats.missing > 0 && html`<span class="badge" style="color:var(--red);border:1px solid var(--red)">${rstats.missing} missing</span>`}
    </div>
  </div>`;

  return html`<div>
    <${Header} title=${rec.name} sub=${html`<span>${rec.setNum} · ${rec.year} · <a href=${instrHref(rec.setNum)} target="_blank">📖 Instructions ↗</a></span>`} onBack=${onBack} />
    <div class="card">
      <div class="row" style="gap:14px">
        ${photos.length > 0 && html`<img class="setimg" style="width:72px;height:72px" src=${photos[defaultIdx]?.src || rec.img}
          onClick=${() => setGalleryAt(defaultIdx)}/>`}
        <div style="flex:1;min-width:0">
          <div class="row" style="gap:6px;flex-wrap:wrap">
            <button class="badge" style=${isNew ? "background:var(--green);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => setCondition("new")}>🛍️ NEW</button>
            <button class="badge" style=${!isNew ? "background:var(--yellow);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => setCondition("used")}>🔄 USED</button>
            <button class="badge" style=${rec.built ? "background:var(--green);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => change(r => {
                r.built = !r.built;
                if (r.built) for (const p of r.parts) if (!isSeparator(p) && !p.isSpare && p.qtyFound < p.qtyNeeded) p.qtyFound = p.qtyNeeded;
                return r;
              })}>Built ${rec.built ? "✓" : ""}</button>
            ${rec.box?.has && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">📦</span>`}
          </div>
          <div class="dim" style="font-size:13px;margin-top:6px">${logMode === "remaining" ? remainingCounter : statusLine}</div>
          ${pct >= 90 && pct < 100 && !isNew && html`<div style="font-size:12px;color:var(--green);font-weight:700;margin-top:2px">Near complete — worth buying the gap?</div>`}
          <a href=${blHref(rec.setNum)} target="_blank" style="font-size:13px;font-weight:600">BrickLink price guide ↗</a>
        </div>
        ${logMode === "remaining"
          ? html`<${RemainingRing} needed=${rstats.needed} remaining=${rstats.remaining} parted=${rstats.parted} missing=${rstats.missing} size=${64} />`
          : html`<${Ring} pct=${pct} size=${64} />`}
      </div>
      ${(isNew || rec.pricePaid > 0 || (rec.buyIds || []).some(id => { const b = buys.find(x => x.id === id); return b && (b.kind || "bulk") === "regular"; })) && html`<div class="row" style="gap:10px;margin-top:12px">
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px">Price paid</div>
          <input inputmode="decimal" placeholder="—" value=${rec.pricePaid || ""}
            onChange=${e => change(r => { const v = parseFloat(e.target.value); r.pricePaid = isNaN(v) || v <= 0 ? 0 : v; return r; })} />
        </div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--dim);margin-bottom:4px">RRP${rec.rrp > 0 && rec.pricePaid > 0 && rec.rrp > rec.pricePaid ? ` · −${Math.round((1 - rec.pricePaid / rec.rrp) * 100)}%` : ""}</div>
          <input inputmode="decimal" placeholder="—" value=${rec.rrp || ""}
            onChange=${e => change(r => { const v = parseFloat(e.target.value); r.rrp = isNaN(v) || v <= 0 ? 0 : v; return r; })} />
        </div>
      </div>`}
      ${photos.length > 1 && html`<div style="display:flex;gap:8px;overflow-x:auto;margin-top:12px">
        ${photos.map((p, i) => html`<img key=${p.kind} src=${p.src}
          style=${`width:56px;height:56px;object-fit:contain;background:#fff;border-radius:8px;flex-shrink:0;border:${i === defaultIdx ? "2px solid var(--yellow)" : "1px solid var(--line)"}`}
          onClick=${() => setGalleryAt(i)}/>`)}
      </div>`}
      <img src=${blBoxImg(rec.setNum)} style="display:none" onError=${() => setBoxImgOk(false)}/>
    </div>

    <div class="row" style="justify-content:flex-end;margin:-4px 2px 8px">
      <button class="chip" style="border-color:var(--line);color:var(--dim)"
        onClick=${() => setOpenAcc(allAccOpen ? new Set() : new Set(ACC_IDS))}>${allAccOpen ? "⌃ Collapse all" : "⌄ Expand all"}</button>
    </div>

    <${Acc} title="Est. value — BrickLink" summary=${[rec.valueSet ? `Set ${money(rec.valueSet)}` : null, rec.valuePartOut ? `Parts ${money(rec.valuePartOut)}` : null].filter(Boolean).join(" · ")}
      open=${openAcc.has("value")} onToggle=${() => toggleAcc("value")}>
      <div class="row" style="gap:10px">
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:4px">As set (used)</div>
          <input inputmode="decimal" placeholder="—" value=${rec.valueSet ?? ""}
            onChange=${e => change(r => { const v = parseFloat(e.target.value); r.valueSet = isNaN(v) || v <= 0 ? null : v; return r; })} />
        </div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:4px">Parted out</div>
          <input inputmode="decimal" placeholder="—" value=${rec.valuePartOut ?? ""}
            onChange=${e => change(r => { const v = parseFloat(e.target.value); r.valuePartOut = isNaN(v) || v <= 0 ? null : v; return r; })} />
        </div>
      </div>
      <div class="dim" style="font-size:12px;margin-top:8px">Look up via the BrickLink price guide link above, enter once. Live pricing needs the BrickLink API (Phase 2).</div>
    </${Acc}>

    <${Acc} title="Triage" summary=${triageOf(rec.triage).label} open=${openAcc.has("triage")} onToggle=${() => toggleAcc("triage")}>
      <div class="row" style="gap:6px">
        ${TRIAGE.map(t => html`<${Chip} label=${t.label} color=${t.color} active=${rec.triage === t.id}
          onClick=${() => change(r => { r.triage = t.id; return r; })} />`)}
      </div>
    </${Acc}>

    <${Acc} title="Instructions" summary=${rec.instructions === "paper" ? `Books ${(rec.booklets || []).length}/${rec.bookCount || Math.max((rec.booklets || []).length, 1)}` : rec.instructions === "digital" ? "Reprint" : "None"}
      open=${openAcc.has("instr")} onToggle=${() => toggleAcc("instr")}>
      <div class="row" style="gap:6px">
        ${INSTR.map(i => html`<${Chip} label=${i.label} color="var(--blue)" active=${rec.instructions === i.id}
          onClick=${() => change(r => {
            r.instructions = i.id;

    <${Acc} title="Box" summary=${rec.box?.has ? `📦 Yes · ${condLabel(rec.box.cond)}` : "None"} open=${openAcc.has("box")} onToggle=${() => toggleAcc("box")}>

        <${Chip} label="Yes" color="var(--blue)" active=${!!rec.box?.has}

      </div>
      ${rec.box?.has && html`<div style="margin-top:10px">
        <div class="row" style="gap:6px">
          ${CONDITIONS.map(([id, label]) => html`<${Chip} label=${label} color=${condColor(id)} active=${rec.box.cond === id}

    <${Acc} title="Buys & notes" summary=${(rec.buyIds || []).length ? `${(rec.buyIds || []).length} buy${(rec.buyIds || []).length > 1 ? "s" : ""}` : ""}

      <div class="row" style="gap:6px;margin-top:10px;flex-wrap:wrap">
        <${Chip} label=${logMode === "remaining" ? "↩ Remaining" : "🔍 Find"} color="var(--purple)" active=${logMode === "remaining"}

    </div>

    ${(() => {
      const accOpen = q.trim().length > 0 || openColors.has("__acc");
      const accHave = (rec.instructions !== "none" ? 1 : 0) + (rec.box?.has ? 1 : 0);

        </div>
        <div class="row" style=${`background:var(--panel);border:1px solid ${rec.box?.has ? "var(--green)" : "var(--line)"};border-radius:12px;padding:10px;margin-bottom:6px;opacity:${rec.box?.has ? .8 : 1};cursor:pointer`}
          onClick=${() => change(r => { r.box = r.box?.has ? { ...r.box, has: false } : { has: true, cond: r.box?.cond || "good", note: r.box?.note || "" }; return r; })}>

          <div style="flex:1;min-width:0">

            <div class="dim mono" style="font-size:11px">${rec.box?.has ? condLabel(rec.box.cond) : "tap to mark have"}</div>

        <button class="chip" style="border-color:var(--line);color:var(--dim)" onClick=${() => setSelIds(new Set())}>None</button>

      <button class="btn green" disabled=${!selIds.size} onClick=${() => {
        change(r => { for (const p of r.parts) if (selIds.has(p.id)) p.qtyFound = p.qtyNeeded; return r; });

    <div style="height:8px"></div>
