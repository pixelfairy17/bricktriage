<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1A17">
<title>BrickTriage</title>
<style>
  :root {
    --bg:#1C1A17; --panel:#26231F; --panel2:#15130F; --line:#3A362F;
    --text:#EDE9E0; --dim:#9B948A; --yellow:#F5C518; --green:#5FBF6E;
    --red:#E05A4E; --blue:#4E9BE0; --purple:#A98BD6;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--text);
    font-family:-apple-system,system-ui,sans-serif; }
  html { background:var(--panel2); } /* backstop: any viewport band below the app reads as tab-bar colour */
  @keyframes navin { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:none; } }
  .navin { animation: navin .18s ease; }
  #app { max-width:520px; margin:0 auto; height:100%; height:100dvh; }
  .shell { height:100%; display:flex; flex-direction:column; }
  .content { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:none; padding:calc(16px + env(safe-area-inset-top)) 16px 24px; }
  h1 { font-size:20px; margin:0; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mono { font-family:ui-monospace,Menlo,monospace; }
  .dim { color:var(--dim); }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .label { font-family:ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:1.5px;
    color:var(--dim); text-transform:uppercase; margin-bottom:7px; }
  input, select, textarea { width:100%; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:12px; color:var(--text); font-size:16px; -webkit-appearance:none; appearance:none; }
  input::placeholder, textarea::placeholder { color:var(--dim); }
  button { cursor:pointer; }
  button:active { transform:scale(.985); }
  .btn { width:100%; background:var(--yellow); color:#1C1A17; border:none; border-radius:10px;
    padding:13px 16px; font-size:15px; font-weight:700; }
  .btn.green { background:var(--green); } .btn.red { background:var(--red); color:#fff; }
  .btn.blue { background:var(--blue); color:#fff; }
  .ghost { width:100%; background:transparent; color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:13px 16px; font-size:15px; font-weight:600; }
  .btn:disabled, .ghost:disabled { opacity:.35; }
  .chip { background:transparent; border-radius:999px; padding:7px 12px; font-size:13px; font-weight:700; white-space:nowrap; border:1px solid; }
  .step { width:42px; height:42px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:20px; font-weight:700; flex-shrink:0; }
  .step.plus { background:var(--yellow); color:#1C1A17; border:none; }
  .row { display:flex; align-items:center; gap:10px; }
  .clamp2 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .ellip { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .partimg { width:40px; height:40px; object-fit:contain; background:#fff; border-radius:6px; flex-shrink:0; }
  .setimg { width:56px; height:56px; object-fit:contain; background:#fff; border-radius:8px; flex-shrink:0; }
  .tabbar { flex-shrink:0; display:flex; background:var(--panel2);
    border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); }
  .tabbar button { flex:1; background:none; border:none; padding:14px 0 12px; font-size:13px; font-weight:700; color:var(--dim); }
  .tabbar button.on { color:var(--yellow); }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:20; display:flex; align-items:flex-end; }
  .sheet { background:var(--bg); border-top:1px solid var(--line); border-radius:18px 18px 0 0;
    width:100%; max-width:520px; margin:0 auto; max-height:85vh; overflow-y:auto;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom)); }
  .badge { font-size:11px; font-weight:700; border-radius:999px; padding:1px 7px; }
  a { color:var(--blue); }
</style>
</head>
<body>
<div id="app"><div style="padding:48px 24px;text-align:center;color:#9B948A;font-family:-apple-system,system-ui,sans-serif">Loading BrickTriage…</div></div>
<script>
window.addEventListener("error", function(e){ btBootErr(e.message || "Script error"); }, true);
window.addEventListener("unhandledrejection", function(e){ btBootErr((e.reason && e.reason.message) || String(e.reason)); });
function btBootErr(msg){
  var a = document.getElementById("app");
  if (a && !window.__btRendered) a.innerHTML = '<div style="padding:32px 20px;color:#E05A4E;font-family:-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.5">BrickTriage failed to start:<br><br><code style="color:#EDE9E0;font-size:12px;word-break:break-all">' + String(msg).replace(/</g,"&lt;") + '</code><br><br><span style="color:#9B948A">The app loads its libraries from esm.sh — check the connection and reopen. If this only happens from the Home Screen icon, screenshot this message.</span></div>';
}
</script>

// part value heuristic — avg price guide. Ordered high→low; first hit wins (name OR colour).
// Keyword map is a first-guess like COLOR_GROUPS — refine from real use.
const PART_RATES = [
  { rate: 2.00, label: "$2", name: ["minifig", "minidoll", "mini doll", "mini-doll"] },
  { rate: 0.50, label: "50c", name: ["print", "pattern", "sticker", "animal", "horse", "dragon", "shark", "crocodile", "dinosaur", "frog", "fish", "bird", "owl", "spider", "snake", "sheep", "chicken", "hull", "baseplate", "windscreen", "cockpit", "fuselage", "boat"] },
  { rate: 0.30, label: "30c", name: ["plant", "flower", "leaf", "leaves", "stem", "vine", "bamboo", "palm", "grass", "carrot"],
    color: ["trans", "lavender", "azure", "bright pink", "magenta", "coral", "aqua"] },
  { rate: 0.20, label: "20c", name: ["clip", "hinge", "bracket", "technic", "axle", "pin", "connector", "turntable", "joint", "ball", "socket", "snot"] },

const PART_RATE_BASE = { rate: 0.05, label: "5c" };
function partRate(p) {
  const n = (p.partName || "").toLowerCase(), c = (p.colorName || "").toLowerCase();
  for (const r of PART_RATES) {
    if (r.name && r.name.some(k => n.includes(k))) return r;
    if (r.color && r.color.some(k => c.includes(k))) return r;
  }

}

// ---------- storage (IndexedDB via idb-keyval; synchronous in-memory cache hydrated at boot) ----------
// App code keeps the synchronous load/save/del API. Reads come from the cache;
// writes update the cache immediately and persist to IndexedDB in the background.
const idbStore = createStore("bricktriage", "kv");
const cache = new Map();
const load = (k, f) => {
  const v = cache.get(k);
  return v === undefined ? f : v;
};
const save = (k, v) => {
  cache.set(k, v);
  idbSet(k, v, idbStore).catch(e => alert("Storage write failed: " + (e?.message || e)));
  return true;
};
const del = k => { cache.delete(k); idbDelete(k, idbStore).catch(() => {}); };
const getKey = () => cache.get("rb_api_key") || "";
const setKey = v => { cache.set("rb_api_key", v); idbSet("rb_api_key", v, idbStore).catch(() => {}); };

// One-time migration from localStorage (pre-v0.10 data), then hydrate cache.
async function initStorage() {
  const ks = await idbKeys(idbStore);
  if (ks.length === 0 && (localStorage.getItem("bt:index") || localStorage.getItem("rb_api_key"))) {
    const entries = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !(k.startsWith("bt:") || k === "rb_api_key")) continue;
      const raw = localStorage.getItem(k);
      if (raw == null) continue;
      if (k === "rb_api_key") { entries.push([k, raw]); continue; }
      try { entries.push([k, JSON.parse(raw)]); } catch {}
    }
    await idbSetMany(entries, idbStore);
    for (const [k, v] of entries) cache.set(k, v);
    // localStorage intentionally left untouched — frozen snapshot / emergency fallback
  } else {
    const vals = await idbGetMany(ks, idbStore);
    ks.forEach((k, i) => cache.set(k, vals[i]));
  }
}

// ---------- helpers ----------
// #13: brick/axle separators are tools, not set parts — excluded from inventory entirely.
const SEPARATOR_PARTS = new Set(["96874", "630", "6007"]);
function isSeparator(p) {
  const n = (p.partName || "").toLowerCase();
  return SEPARATOR_PARTS.has(p.partNumber) || n.includes("separator");
}
// #10: spares are excluded from completion % by default; Settings can opt in (bt:countSpares).
function countSpares() { return !!load("bt:countSpares", false); }
function completion(parts, includeSpares = countSpares()) {
  let need = 0, found = 0;
  for (const p of parts) {
    if (isSeparator(p)) continue;
    if (p.isSpare && !includeSpares) continue;
    need += p.qtyNeeded; found += Math.min(p.qtyFound, p.qtyNeeded);
  }
  return { found, total: need, pct: need ? Math.round((found / need) * 100) : 0 };
}
const normSetNum = s => { const t = s.trim(); return t && !t.includes("-") ? `${t}-1` : t; };
// "last bulk buy" = the BULK-kind buy most recently added to (newest set dateAdded among its links);
// falls back to the newest-created bulk buy if none has sets yet. Regular buys never qualify.
const lastBulkBuyOf = (buys, index) => {
  const bulks = buys.filter(b => (b.kind || "bulk") === "bulk");
  if (!bulks.length) return null;
  let best = null, bestT = -1;
  for (const e of index) for (const id of (e.buyIds || [])) {
    const b = bulks.find(x => x.id === id);
    if (b && e.dateAdded > bestT) { bestT = e.dateAdded; best = b; }
  }
  return best || bulks[bulks.length - 1];
};
const blHref = n => `https://www.bricklink.com/v2/catalog/catalogitem.page?S=${encodeURIComponent(n)}#T=P`;
const partsVal = parts => {
  let foundQty = 0, foundVal = 0, fullQty = 0, fullVal = 0;
  for (const p of parts) {
    if (isSeparator(p)) continue;
    const r = partRate(p).rate, f = Math.min(p.qtyFound, p.qtyNeeded);
    foundQty += f; foundVal += r * f; fullQty += p.qtyNeeded; fullVal += r * p.qtyNeeded;
  }
  return { foundQty, foundVal, fullQty, fullVal };
};
const indexEntry = rec => {
  const { found, total, pct } = completion(rec.parts);
  return { setNum: rec.setNum, name: rec.name, year: rec.year, idxVer: 3,
    img: rec.imgDefault === "box" ? blBoxImg(rec.setNum) : rec.img, triage: rec.triage,
    instructions: rec.instructions, found, total, pct, dateAdded: rec.dateAdded, buyIds: rec.buyIds || [],
    theme: rec.theme || null, bookletQty: (rec.booklets || []).length,
    condition: condOfSet(rec), built: !!rec.built,
    pricePaid: rec.pricePaid || 0, rrp: rec.rrp || 0, boxHas: !!rec.box?.has,
    valueSet: rec.valueSet || null, valuePartOut: rec.valuePartOut || null, ...partsVal(rec.parts) };
};
// regular-buy ("receipt") spend is DERIVED: Σ linked set prices + Σ linked merch prices.
// Legacy receipts with a manually entered price fall back to it when nothing is linked.
const receiptTotals = (b, index, merch) => {
  let paid = 0, rrp = 0;
  for (const e of index) if ((e.buyIds || []).includes(b.id)) { paid += e.pricePaid || 0; rrp += e.rrp || 0; }
  for (const m of merch) if ((m.buyIds || []).includes(b.id)) { paid += m.pricePaid || 0; rrp += m.rrp || 0; }
  if (!paid && b.price) { paid = b.price; rrp = rrp || b.rrp || 0; }
  return { paid, rrp };
};

// ---------- APIs ----------
async function rbFetch(url) {
  const res = await fetch(url, { headers: { Authorization: `key ${getKey().trim()}` } });
  if (!res.ok) {
    const e = new Error(res.status === 404 ? "Set not found on Rebrickable." :
      res.status === 401 || res.status === 403 ? "Rebrickable rejected the API key (Settings)." :
      `Rebrickable error HTTP ${res.status}.`);
    e.status = res.status; throw e;
  }
  return res.json();
}
// ---------- themes (Rebrickable theme list cached once; sets store their ROOT theme name) ----------
async function fetchThemesMap() {
  const cached = load("bt:themes", null);
  if (cached?.map) return cached.map;
  let url = "https://rebrickable.com/api/v3/lego/themes/?page_size=1000";
  const map = {};
  while (url) {
    const j = await rbFetch(url);
    for (const t of (j.results || [])) map[t.id] = [t.name, t.parent_id];
    url = j.next;
  }
  save("bt:themes", { fetched: Date.now(), map });
  return map;
}
function rootTheme(map, id) {
  let cur = id, guard = 0;
  while (cur != null && map[cur] && map[cur][1] != null && guard++ < 20) cur = map[cur][1];
  return map[cur] ? map[cur][0] : null;
}

async function fetchFullSet(setNum, onProgress) {
  onProgress?.("Fetching set info…");
  const m = await rbFetch(`https://rebrickable.com/api/v3/lego/sets/${setNum}/`);
  let theme = null;
  try { const map = await fetchThemesMap(); theme = rootTheme(map, m.theme_id) || "Other"; } catch {}
  const meta = { setNum: m.set_num, name: m.name, year: m.year, img: m.set_img_url, numParts: m.num_parts,
    themeId: m.theme_id, theme };
  let url = `https://rebrickable.com/api/v3/lego/sets/${setNum}/parts/?page_size=1000`;
  const rows = [];
  let page = 1;
  while (url) {
    onProgress?.(`Fetching parts — page ${page}…`);
    const j = await rbFetch(url);
    rows.push(...j.results);
    url = j.next; page++;
  }
  const parts = rows.map((r, i) => ({
    id: `${r.part?.part_num}|${r.color?.id}|${r.is_spare ? "s" : "n"}|${i}`,
    partNumber: r.part?.part_num, partName: r.part?.name,
    colorID: r.color?.id, colorName: r.color?.name,
    img: r.part?.part_img_url, qtyNeeded: r.quantity, qtyFound: 0, isSpare: !!r.is_spare,
  }));
  let minifigs = [];
  try { minifigs = await fetchSetMinifigs(setNum, onProgress); } catch { minifigs = []; }
  return { meta, parts, minifigs };
}
// #6 minifigs: a set's figs + each fig's part inventory (legs/torso/head/hair/accessories).
// Stored on the set record (rec.minifigs), tracked separately from the main parts count.
async function fetchSetMinifigs(setNum, onProgress) {
  onProgress?.("Fetching minifigs…");
  const figs = [];
  let url = `https://rebrickable.com/api/v3/lego/sets/${setNum}/minifigs/?page_size=100`;
  while (url) { const j = await rbFetch(url); figs.push(...(j.results || [])); url = j.next; }
  const out = [];
  for (const f of figs) {
    onProgress?.(`Minifig ${f.set_num}…`);
    const rows = [];
    let pu = `https://rebrickable.com/api/v3/lego/minifigs/${encodeURIComponent(f.set_num)}/parts/?page_size=1000`;
    while (pu) { const j = await rbFetch(pu); rows.push(...(j.results || [])); pu = j.next; }
    out.push({
      figNum: f.set_num, name: f.set_name, img: f.set_img_url, quantity: f.quantity || 1,
      parts: rows.map((r, i) => ({
        id: `${f.set_num}|${r.part?.part_num}|${r.color?.id}|${r.is_spare ? "s" : "n"}|${i}`,
        partNumber: r.part?.part_num, partName: r.part?.name,
        colorID: r.color?.id, colorName: r.color?.name,
        img: r.part?.part_img_url, qtyNeeded: r.quantity, qtyFound: 0, isSpare: !!r.is_spare,
      })),
    });
  }
  return out;
}

function minifigStats(figs) {

async function downscale(file, max = 1024) {
  try {
    const img = await createImageBitmap(file);
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    if (scale === 1) { img.close?.(); return file; }
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    img.close?.();
    const blob = await new Promise(r => c.toBlob(r, "image/jpeg", 0.85));
    return blob || file;
  } catch { return file; } // unsupported format etc — send original
}
const blobToDataURL = blob => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result);
  r.onerror = () => rej(new Error("Photo read failed"));
  r.readAsDataURL(blob);
});

// #7 Remaining mode: segmented donut — green (intact) / yellow (left) / purple (parted) / red (missing)
const RemainingRing = ({ needed, remaining, parted, missing, size = 64 }) => {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  const remCol = parted === 0 ? "var(--green)" : "var(--yellow)";
  const seg = (qty, offsetQty, col) => {
    const len = circ * (needed ? qty / needed : 0);
    return html`<circle cx=${size / 2} cy=${size / 2} r=${r} stroke=${col} stroke-width="6" fill="none"
      stroke-dasharray=${`${len} ${circ - len}`} stroke-dashoffset=${-circ * (needed ? offsetQty / needed : 0)}
      transform=${`rotate(-90 ${size / 2} ${size / 2})`}/>`;
  };
  return html`<svg width=${size} height=${size} style="flex-shrink:0">
    <circle cx=${size / 2} cy=${size / 2} r=${r} stroke="var(--line)" stroke-width="6" fill="none"/>
    ${seg(remaining, 0, remCol)}
    ${seg(parted, remaining, "var(--purple)")}
    ${seg(missing, remaining + parted, "var(--red)")}
    <text x="50%" y="46%" dominant-baseline="middle" text-anchor="middle" fill="var(--text)" font-size=${size * 0.28} font-weight="800">${remaining}</text>
    <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" fill="var(--dim)" font-size=${size * 0.15} font-weight="700">in set</text>
  </svg>`;
};
// aggregates for Remaining mode (excludes spares + separators). qtyFound is reused as "remaining in set".
function remainingStats(rec) {
  let needed = 0, remaining = 0;
  for (const p of rec.parts) {
    if (isSeparator(p) || p.isSpare) continue;
    needed += p.qtyNeeded;
    remaining += Math.min(Math.max(0, p.qtyFound), p.qtyNeeded);
  }
  const missing = Math.min(needed, Math.max(0, rec.missingCount || 0));
  const had = Math.max(0, needed - missing);
  const remDisp = Math.min(remaining, had);   // missing is authoritative; cap so segments sum to needed
  const parted = Math.max(0, had - remDisp);
  return { needed, remaining: remDisp, parted, missing, had };
}

function SetGalleryViewer({ photos, start, defaultIdx, onSetDefault, onClose }) {
  const [i, setI] = useState(start);
  const t = useRef({});
  const n = photos.length;
  const go = d => setI(v => (v + d + n) % n);
  return html`<div class="modal" style="align-items:center"
    onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div style="max-width:520px;width:100%;max-height:100dvh;padding:16px;position:relative;display:flex;flex-direction:column;justify-content:center"
      onTouchStart=${e => { t.current.x = e.touches[0].clientX; }}
      onTouchEnd=${e => { const dx = (e.changedTouches[0]?.clientX ?? t.current.x) - t.current.x;
        if (dx > 45) go(-1); else if (dx < -45) go(1); }}>
      <button class="step" style="position:absolute;top:26px;right:26px;z-index:2;background:rgba(0,0,0,.65);border-color:rgba(255,255,255,.3);color:#fff" onClick=${onClose}>✕</button>
      <img src=${photos[i].src} style="width:100%;max-height:70vh;object-fit:contain;border-radius:14px;background:#fff"/>
      <div class="row" style="gap:8px;margin-top:10px;justify-content:space-between">
        <button class="step" onClick=${() => go(-1)}>‹</button>
        <span class="dim mono" style="font-size:12px;font-weight:700">${photos[i].label} · ${i + 1}/${n}</span>
        <button class="step" onClick=${() => go(1)}>›</button>
      </div>
      ${i !== defaultIdx && html`<button class="ghost" style="margin-top:8px;background:var(--bg)"
        onClick=${() => onSetDefault(i)}>★ Show this on cards</button>`}
    </div>
  </div>`;
}

const DEFAULT_CATEGORIES = ["FB Marketplace", "eBay", "Gumtree", "LEGO Store", "Kmart"];
const buyKind = b => (b.kind || "bulk");
const toDateStr = ts => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };
const fromDateStr = str => { const [y, m, dd] = str.split("-").map(Number); return new Date(y, m - 1, dd, 12).getTime(); };

const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });

  const isEdit = !!initial?.id;

  const [catOther, setCatOther] = useState(initCat && !categories.includes(initCat) ? initCat : "");
  const [dateStr, setDateStr] = useState(toDateStr(initial?.date || Date.now()));
  const category = cat === "__other" ? catOther.trim() : cat;
  const showLabel = kind === "bulk" || kind === "loose" || isEdit;
  const autoName = () => `${category || "Receipt"} — ${fmtDate(fromDateStr(dateStr))}`;
  return html`<div>
    ${showLabel && html`<div>
      <input name="bt-buy-label" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder=${kind === "loose" ? 'Label — e.g. "PAB August"' : 'Label — e.g. "Container 3 — Gumtree March"'} value=${label}
        onInput=${e => setLabel(e.target.value)} />

    </div>`}
    <div class="row" style="gap:6px;flex-wrap:wrap">
      <${Chip} label="Bulk" color="var(--purple)" active=${kind === "bulk"} onClick=${() => setKind("bulk")} />
      <${Chip} label="Regular" color="var(--blue)" active=${kind === "regular"} onClick=${() => setKind("regular")} />
      <${Chip} label="Loose / PAB" color="var(--green)" active=${kind === "loose"} onClick=${() => setKind("loose")} />
    </div>
    <div style="height:8px"></div>
    <select value=${cat} onChange=${e => setCat(e.target.value)}>
      <option value="">${kind === "regular" ? "— channel —" : "— channel (optional) —"}</option>
      ${categories.map(c => html`<option value=${c}>${c}</option>`)}
      <option value="__other">Other…</option>
    </select>
    ${cat === "__other" && html`<div>
      <div style="height:8px"></div>
      <input placeholder="Custom channel" value=${catOther} onInput=${e => setCatOther(e.target.value)} />
    </div>`}
    <div style="height:8px"></div>
    ${kind === "regular"
      ? html`<div class="dim" style="font-size:12px;padding:2px 2px 0">Total + RRP are auto-calculated from the sets and merch linked to this receipt.</div>`
      : kind === "loose"
      ? html`<div>
          <${Label}>PAB box — fill-a-box pricing</${Label}>
          <div class="row" style="gap:6px;flex-wrap:wrap">
            <${Chip} label="Small $17.95" color="var(--green)" active=${price === "17.95"} onClick=${() => setPrice("17.95")} />
            <${Chip} label="Large $32.99" color="var(--green)" active=${price === "32.99"} onClick=${() => setPrice("32.99")} />
          </div>
          <div style="height:8px"></div>
          <input inputmode="decimal" placeholder="Price paid" value=${price} onInput=${e => setPrice(e.target.value)} />
        </div>`
      : html`<input inputmode="decimal" placeholder="Price paid (optional)" value=${price}
          onInput=${e => setPrice(e.target.value)} />`}
    <div style="height:8px"></div>
    <${Label}>Date purchased</${Label}>
    <input type="date" value=${dateStr} onChange=${e => e.target.value && setDateStr(e.target.value)} />
    ${kind === "regular" && !isEdit && html`<div class="dim" style="font-size:12px;margin-top:8px">Saves as "${autoName()}"</div>`}
    <div style="height:10px"></div>
    <div class="row" style="gap:8px">
      <button class="btn" style="flex:1" disabled=${kind === "bulk" && !label.trim()} onClick=${() =>
        onAdd({ ...(initial || {}), id: initial?.id || String(Date.now()),
          label: label.trim() || (kind === "regular" ? autoName() : kind === "loose" ? `PAB — ${fmtDate(fromDateStr(dateStr))}` : ""),
          price: kind === "regular" ? (initial?.price || 0) : (parseFloat(price) || 0),
          rrp: kind === "regular" ? (initial?.rrp || 0) : (initial?.rrp || 0),
          date: fromDateStr(dateStr), kind, category })}>${submitLabel}</button>

}

// ---------- scan (Brickognize) ----------
function ScanModal({ onClose, onPick, hint }) {
  const [state, setState] = useState("pick"); // pick | busy | results | error
  const [items, setItems] = useState([]);
  const [err, setErr] = useState("");
  const fileRef = useRef(null);
  useEffect(() => { fileRef.current?.click(); }, []);

  async function go(file) {
    setState("busy");
    try {
      const small = await downscale(file);
      const j = await brickognize(small);
      const its = (j.items || []).slice(0, 8);
      if (!its.length) { setErr("No candidates. Tips: ONE item per photo, plain background, fill the frame, good light. Assembled clusters of parts won't identify — scan parts individually."); setState("error"); }
      else { setItems(its); setState("results"); }
    } catch (e) { setErr(String(e.message || e) + " — check connection and retry; if it persists the photo may be unreadable."); setState("error"); }
  }

  return html`<div class="modal" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="sheet">
      <${Header} title="Scan" sub=${hint} onBack=${onClose} />
      <input ref=${fileRef} type="file" accept="image/*" style="display:none"
        onChange=${e => { const f = e.target.files?.[0]; if (f) go(f); e.target.value = ""; }} />
      ${state === "pick" && html`<button class="btn" onClick=${() => fileRef.current?.click()}>Take / choose photo</button>`}
      ${state === "busy" && html`<div class="dim" style="padding:20px;text-align:center">Identifying…</div>`}
      ${state === "error" && html`
        <div class="card" style="color:var(--red);font-size:13px">${err}</div>
        <button class="ghost" onClick=${() => fileRef.current?.click()}>Try another photo</button>`}
      ${state === "results" && items.map(it => html`
        <div class="card row" style="cursor:pointer" onClick=${() => onPick(it)}>
          ${it.img_url && html`<img class="setimg" src=${it.img_url} loading="lazy"/>`}
          <div style="flex:1;min-width:0">
            <div class="clamp2" style="font-size:14px;font-weight:600">${it.name}</div>
            <div class="dim mono" style="font-size:11px">${it.type || ""} · ${it.id} · ${Math.round((it.score || 0) * 100)}%</div>
          </div>
        </div>`)}
      ${state === "results" && html`<button class="ghost" onClick=${() => fileRef.current?.click()}>Rescan</button>`}
    </div>
  </div>`;
}

// ---------- App ----------
function App() {
  const [tab, setTab] = useState("sets");
  const [index, setIndex] = useState(() => {
    let idx = load("bt:index", []);
    if (idx.some(e => e.fullVal === undefined || e.bookletQty === undefined || e.condition === undefined || e.idxVer !== 3)) {
      idx = idx.map(e => { const rec = load(`bt:set:${e.setNum}`, null); return rec ? indexEntry(rec) : e; });
      save("bt:index", idx);
    }
    return idx;
  });
  const [merch, setMerch] = useState(() => load("bt:merch", []));
  const saveMerchList = next => { setMerch(next); save("bt:merch", next); };
  const upsertMerch = m => saveMerchList(merch.some(x => x.id === m.id) ? merch.map(x => x.id === m.id ? m : x) : [...merch, m]);
  const deleteMerch = id => {
    const victim = merch.find(x => x.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    saveMerchList(merch.filter(x => x.id !== id));
  };
  const [openMerchId, setOpenMerchId] = useState(null);
  const [mocs, setMocs] = useState(() => load("bt:mocs", []));
  const saveMocs = next => { setMocs(next); save("bt:mocs", next); };
  const upsertMoc = m => saveMocs(mocs.some(x => x.id === m.id) ? mocs.map(x => x.id === m.id ? m : x) : [...mocs, m]);
  const deleteMoc = id => {
    const victim = mocs.find(x => x.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    for (const f of (victim?.pdfs || [])) del(pdfKey(f.id));
    saveMocs(mocs.filter(x => x.id !== id));
  };
  const [openMocId, setOpenMocId] = useState(null);
  const allocBySet = useMemo(() => {
    const m = new Map();
    for (const mo of mocs) for (const a of (mo.parts || []))
      if (a.qty > 0) m.set(a.setNum, (m.get(a.setNum) || 0) + a.qty);
    return m;
  }, [mocs]);
  const [buys, setBuys] = useState(() => load("bt:buys", []).map(b => ({ kind: "bulk", category: "", ...b })));
  const [openSetNum, setOpenSetNum] = useState(null);
  const [adding, setAdding] = useState(false);
  const [openBuyId, setOpenBuyId] = useState(null);
  const [setOrigin, setSetOrigin] = useState(null); // null | "buys"
  const [cats, setCats] = useState(() => load("bt:cats", null) || DEFAULT_CATEGORIES);
  const saveCats = next => { setCats(next); save("bt:cats", next); };
  const ensureCat = c => { if (c && !cats.includes(c)) saveCats([...cats, c]); };
  const addCat = c => ensureCat(c.trim());
  const renameCat = (oldC, newC) => {
    saveCats(cats.map(x => x === oldC ? newC : x));
    setBuys(prev => { const next = prev.map(b => b.category === oldC ? { ...b, category: newC } : b); save("bt:buys", next); return next; });
  };
  const delCat = c => {
    saveCats(cats.filter(x => x !== c));
    setBuys(prev => { const next = prev.map(b => b.category === c ? { ...b, category: "" } : b); save("bt:buys", next); return next; });
  };

  const persistIndex = next => { setIndex(next); save("bt:index", next); };
  const persistSet = useCallback(rec => {
    save(`bt:set:${rec.setNum}`, rec);
    setIndex(idx => {
      const next = idx.filter(e => e.setNum !== rec.setNum).concat(indexEntry(rec))
        .sort((a, b) => b.dateAdded - a.dateAdded);
      save("bt:index", next);
      return next;
    });
  }, []);

  const backFromSet = () => {
    setOpenSetNum(null);
    if (setOrigin === "buys") setTab("buys");
    setSetOrigin(null);
  };
  const deleteSet = setNum => {
    del(`bt:set:${setNum}`);
    persistIndex(index.filter(e => e.setNum !== setNum));
    backFromSet();
  };
  const addBuy = b => {
    ensureCat(b.category);
    setBuys(prev => { const next = [...prev, b]; save("bt:buys", next); return next; });
  };
  const updateBuy = b => {
    ensureCat(b.category);
    setBuys(prev => { const next = prev.map(x => x.id === b.id ? b : x); save("bt:buys", next); return next; });
  };
  const deleteBuy = id => {
    const victim = buys.find(b => b.id === id);
    for (const pid of (victim?.photoIds || [])) del(photoKey(pid));
    for (const e of index) {
      if (!(e.buyIds || []).includes(id)) continue;
      const rec = load(`bt:set:${e.setNum}`, null);
      if (rec) { rec.buyIds = (rec.buyIds || []).filter(x => x !== id); persistSet(rec); }
    }
    setBuys(prev => { const next = prev.filter(b => b.id !== id); save("bt:buys", next); return next; });
    if (openBuyId === id) setOpenBuyId(null);
  };
  const openSetFromBuys = n => { setAdding(false); setOpenSetNum(n); setSetOrigin("buys"); setTab("sets"); };
  const openMerchFromBuys = id => { save("bt:sv:seg", "merch"); setAdding(false); setOpenSetNum(null); setSetOrigin(null); setOpenMerchId(id); setTab("sets"); };
  // add a set FROM a buy's detail page: pre-link that buy + return there afterwards
  const [addFromBuyId, setAddFromBuyId] = useState(null);
  const addSetFromBuy = id => { setAddFromBuyId(id); setOpenSetNum(null); setAdding(true); setTab("sets"); };
  const backToOriginBuy = () => { setAdding(false); setAddFromBuyId(null); setTab("buys"); }; // openBuyId still set
  const mutateBuys = fn => setBuys(prev => { const next = fn(prev); save("bt:buys", next); return next; });

  return html`
    <div class="shell">
      <div class="content">
        ${tab === "sets" && !openSetNum && !adding && !openMocId && html`
          <${SetsList} key="v-setslist" index=${index} buys=${buys} cats=${cats} addBuy=${addBuy} persistSet=${persistSet}
            merch=${merch} upsertMerch=${upsertMerch} deleteMerch=${deleteMerch}
            openMerchId=${openMerchId} setOpenMerchId=${setOpenMerchId}
            mocs=${mocs} upsertMoc=${upsertMoc} allocBySet=${allocBySet} onOpenMoc=${setOpenMocId}
            onOpen=${n => { setSetOrigin(null); setOpenSetNum(n); }} onAdd=${() => setAdding(true)} />`}
        ${tab === "sets" && !openSetNum && !adding && openMocId && html`
          <${MocDetail} key=${openMocId} moc=${mocs.find(m => m.id === openMocId)} mocs=${mocs} index=${index}
            upsertMoc=${upsertMoc} deleteMoc=${id => { deleteMoc(id); setOpenMocId(null); }}
            onBack=${() => setOpenMocId(null)} />`}
        ${tab === "sets" && adding && html`
          <${AddSet} key="v-addset" buys=${buys} cats=${cats} addBuy=${addBuy} existing=${index.map(e => e.setNum)}
            lastBuy=${lastBulkBuyOf(buys, index)}
            prefBuy=${addFromBuyId ? buys.find(b => b.id === addFromBuyId) : null}
            onCancel=${() => { if (addFromBuyId) backToOriginBuy(); else setAdding(false); }}
            onOpenExisting=${n => { setAdding(false); setAddFromBuyId(null); setSetOrigin(null); setOpenSetNum(n); }}
            onSave=${rec => { persistSet(rec); if (addFromBuyId) { backToOriginBuy(); } else { setAdding(false); setSetOrigin(null); setOpenSetNum(rec.setNum); } }}
            onQuickSave=${(rec, stay) => { persistSet(rec); if (!stay) { if (addFromBuyId) backToOriginBuy(); else { setAdding(false); setSetOrigin(null); } } }} />`}
        ${tab === "sets" && openSetNum && !adding && html`
          <${SetDetail} key=${"v-set-" + openSetNum} setNum=${openSetNum} buys=${buys} cats=${cats} addBuy=${addBuy} persistSet=${persistSet}
            mocs=${mocs} upsertMoc=${upsertMoc}
            onBack=${backFromSet} onDelete=${() => deleteSet(openSetNum)} />`}
        ${tab === "sort" && html`<${SortingMode} key="v-sort" index=${index} buys=${buys} persistSet=${persistSet} />`}
        ${tab === "buys" && html`<${Buys} key="v-buys" buys=${buys} index=${index} cats=${cats} merch=${merch} onOpenMerch=${openMerchFromBuys} upsertMerch=${upsertMerch}
          addBuy=${addBuy} updateBuy=${updateBuy} deleteBuy=${deleteBuy} mutateBuys=${mutateBuys} ensureCat=${ensureCat}
          onOpenSet=${openSetFromBuys} onAddSet=${addSetFromBuy} openBuyId=${openBuyId} setOpenBuyId=${setOpenBuyId} />`}
        ${tab === "settings" && html`<${Settings} key="v-settings" index=${index} buys=${buys} merch=${merch} saveMerchList=${saveMerchList}
          mocs=${mocs} saveMocs=${saveMocs}
          persistIndex=${persistIndex} setBuys=${setBuys}
          cats=${cats} saveCats=${saveCats} addCat=${addCat} renameCat=${renameCat} delCat=${delCat} />`}
      </div>

      <div class="tabbar">
        ${[["sets", "Sets"], ["sort", "Sorting"], ["buys", "Buys"], ["settings", "Settings"]].map(([id, label]) => html`
          <button class=${tab === id ? "on" : ""} onClick=${() => {
            if (tab === id) document.querySelector(".content")?.scrollTo({ top: 0, behavior: "smooth" });
            setTab(id); setAdding(false); setSetOrigin(null); setOpenMerchId(null); setOpenMocId(null); setOpenSetNum(null); setOpenBuyId(null);
          }}>${label}</button>`)}
      </div>
    </div>`;
}

// ---------- Sets list ----------
function SetCard({ e, buys, onOpen, showBuys = true, mocPcs = 0, compact = false, expanded = false, onToggleExpand }) {
  const linked = showBuys ? (e.buyIds || []).map(id => buys.find(b => b.id === id)).filter(Boolean) : [];
  const channels = [...new Set(linked.map(b => b.category).filter(Boolean))];
  const isNew = e.condition === "new";
  // #9: condition shown as a corner emoji on the image — part-out overrides, then new vs used
  const condEmoji = e.triage === "partOut" ? "📤" : isNew ? "✨" : "♻️";
  // #11: new-set cards hide % + triage by default (Settings can force them back on)
  const showPct = !isNew || load("bt:cardNewPct", false);
  const showTriage = !isNew || load("bt:cardNewTriage", false);
  const inSet = Math.max(0, (e.found || 0) - mocPcs);
  const priceLine = isNew && (e.pricePaid > 0 || e.rrp > 0);
  const detailBody = html`
    <div class="row" style="gap:6px;margin-top:5px;flex-wrap:wrap">
      ${showTriage && html`<span style=${`font-size:11px;font-weight:700;color:${triageOf(e.triage).color}`}>${triageOf(e.triage).label}</span>`}
      ${e.boxHas && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">📦</span>`}
