    ${galleryAt != null && html`<${SetGalleryViewer} photos=${photos} start=${galleryAt} defaultIdx=${defaultIdx}
      onSetDefault=${i => change(r => { r.imgDefault = photos[i].kind === "box" ? "box" : "rb"; return r; })}
      onClose=${() => setGalleryAt(null)} />`}
    ${viewPart && html`<${PartImgViewer} p=${viewPart} onClose=${() => setViewPart(null)} />`}
  </div>`;
}

// #6 minifig inventory — separate accordion; each fig has its own collapsible parts list, tracked
// independently of the main set completion. Existing sets get a one-tap fetch.
function MinifigSection({ rec, change, onView }) {
  const [open, setOpen] = useState(false);
  const [openFig, setOpenFig] = useState(() => new Set());
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const figs = rec.minifigs;
  const fetched = Array.isArray(figs);
  const stats = minifigStats(figs || []);
  const toggleFig = id => setOpenFig(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  async function fetchNow() {
    if (!getKey().trim()) { setErr("Add your Rebrickable key in Settings first."); return; }
    setBusy(true); setErr("");
    try { const m = await fetchSetMinifigs(rec.setNum); change(r => { r.minifigs = m; return r; }); setOpen(true); }
    catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  }
  const bumpFig = (figNum, pid, d) => change(r => {
    const f = (r.minifigs || []).find(x => x.figNum === figNum); if (!f) return r;
    const p = f.parts.find(x => x.id === pid);
    if (p) p.qtyFound = Math.max(0, Math.min(p.qtyNeeded, p.qtyFound + d));
    return r;
  });
  const markFigAll = figNum => change(r => {
    const f = (r.minifigs || []).find(x => x.figNum === figNum); if (!f) return r;
    for (const p of f.parts) if (!isSeparator(p) && !p.isSpare) p.qtyFound = p.qtyNeeded;
    return r;
  });
  const summary = fetched ? (figs.length ? `${figs.length} fig${figs.length > 1 ? "s" : ""} · ${stats.found}/${stats.total}` : "none") : "tap to fetch";
  return html`<${Acc} title="Minifigs" summary=${summary} open=${open} onToggle=${() => setOpen(v => !v)}>
    ${!fetched && html`<div>
      <div class="dim" style="font-size:13px;margin-bottom:10px">Minifigs aren't fetched for this set yet (added after the set was tracked).</div>
      <button class="btn" disabled=${busy} onClick=${fetchNow}>${busy ? "Fetching…" : "Fetch minifigs"}</button>
      ${err && html`<div class="card" style="color:var(--red);font-size:13px;margin-top:8px">${err}</div>`}
    </div>`}
    ${fetched && figs.length === 0 && html`<div class="dim" style="font-size:13px">This set has no minifigs.</div>`}
    ${fetched && figs.map(f => {
      const fs = minifigStats([f]);
      const fOpen = openFig.has(f.figNum);
      return html`<div key=${f.figNum} style="margin-bottom:8px">
        <button class="row" onClick=${() => toggleFig(f.figNum)}
          style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 10px;color:var(--text);gap:10px">
          ${f.img
            ? html`<img class="partimg" src=${f.img} loading="lazy" onClick=${ev => { ev.stopPropagation(); onView({ partName: f.name, partNumber: f.figNum, colorName: "Minifig", img: f.img }); }}/>`
            : html`<div class="partimg" style="background:var(--panel)"></div>`}
          <div style="flex:1;min-width:0;text-align:left">
            <div class="clamp2" style="font-size:13px;line-height:1.25">${f.name}${f.quantity > 1 ? ` ×${f.quantity}` : ""}</div>
            <div class="dim mono" style="font-size:11px">${f.figNum} · ${f.parts.length} parts</div>
          </div>
          <span class="mono" style=${`font-size:12px;font-weight:700;flex-shrink:0;color:${fs.found >= fs.total ? "var(--green)" : "var(--dim)"}`}>${fs.found}/${fs.total}</span>
          <span class="dim" style="flex-shrink:0">${fOpen ? "▾" : "▸"}</span>
        </button>
        ${fOpen && html`<div style="margin-top:6px">
          <button class="ghost" style="margin-bottom:6px;padding:9px" onClick=${() => markFigAll(f.figNum)}>Mark all parts present</button>
          ${f.parts.map(p => html`<${PartRow} key=${p.id} p=${p} bump=${(id, d) => bumpFig(f.figNum, id, d)} onView=${() => onView(p)} />`)}
        </div>`}
      </div>`;
    })}
  </${Acc}>`;
}

function MoveToMocSheet({ p, mocs, upsertMoc, available, onMove, onClose }) {
  const [mocId, setMocId] = useState(mocs[0]?.id || "");
  const [qty, setQty] = useState(1);
  const [newName, setNewName] = useState("");
  const [creating, setCreating] = useState(mocs.length === 0);
  const max = Math.max(0, available);
  function createAndSelect() {
    const m = { id: String(Date.now()), name: newName.trim(), notes: "", photoIds: [], pdfs: [],
      status: "building", parts: [], dateAdded: Date.now() };
    upsertMoc(m); setMocId(m.id); setCreating(false); setNewName("");
  }
  return html`<div class="modal" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="sheet">
      <${Header} title="Move to MOC" onBack=${onClose} />
      <div class="card row" style="padding:10px">
        ${p.img && html`<img class="partimg" src=${p.img}/>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px">${p.partName}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName} · ${max} available to move</div>
        </div>
      </div>
      ${max === 0 && html`<div class="card" style="color:var(--red);font-size:13px">Every found copy of this part is already in a MOC. Return some first.</div>`}
      ${max > 0 && html`<div>
        <${Label}>Destination MOC</${Label}>
        ${!creating && html`<select value=${mocId} onChange=${e => { if (e.target.value === "__new") setCreating(true); else setMocId(e.target.value); }}>
          ${mocs.map(m => html`<option value=${m.id}>${m.name}</option>`)}
          <option value="__new">＋ New MOC…</option>
        </select>`}
        ${creating && html`<div class="row" style="gap:8px">
          <input placeholder="MOC name" value=${newName} onInput=${e => setNewName(e.target.value)} />
          <button class="step plus" style="width:54px" disabled=${!newName.trim()} onClick=${createAndSelect}>✓</button>
        </div>`}
        <div style="height:10px"></div>
        <${Label}>Quantity</${Label}>
        <div class="row" style="gap:10px">
          <button class="step" disabled=${qty <= 1} onClick=${() => setQty(v => Math.max(1, v - 1))}>−</button>
          <div class="mono" style="font-size:16px;font-weight:700;min-width:44px;text-align:center">${Math.min(qty, max)}</div>
          <button class="step plus" disabled=${qty >= max} onClick=${() => setQty(v => Math.min(max, v + 1))}>+</button>
          <button class="ghost" style="flex:1" onClick=${() => setQty(max)}>All ${max}</button>
        </div>
        <div style="height:12px"></div>
        <button class="btn" disabled=${!mocId || creating} onClick=${() => onMove(p, mocId, Math.min(qty, max))}>Move ${Math.min(qty, max)} → MOC</button>
      </div>`}
    </div>
  </div>`;
}

function PartRow({ p, bump, alloc, onMove, onView, selMode = false, selected = false, onSel, onToggleFull, mode = "find" }) {
  const isRem = mode === "remaining";
  const full = p.qtyFound >= p.qtyNeeded;
  const done = full;
  const allocQty = (alloc || []).reduce((a, x) => a + x.qty, 0);
  // #3: tapping the part image opens it full-size (stopPropagation so it never triggers the row toggle)
  const imgEl = p.img
    ? html`<img class="partimg" src=${p.img} loading="lazy" onClick=${ev => { ev.stopPropagation(); onView?.(p); }}/>`
    : html`<div class="partimg" style="background:var(--panel2)" onClick=${ev => { ev.stopPropagation(); onView?.(p); }}></div>`;
  const spareTag = p.isSpare ? html` <span style="color:var(--blue);border:1px solid var(--blue);border-radius:4px;padding:0 4px;font-size:9px;font-weight:800;letter-spacing:.5px">SPARE</span>` : "";
  const allocLine = allocQty > 0 && html`<div class="ellip" style="font-size:11px;color:var(--blue);font-weight:700;margin-top:2px">♻️ ${(alloc || []).map(x => `${x.qty} → ${x.mocName}`).join(" · ")}</div>`;

  if (selMode) {
    // #4/#5: select mode keeps − / qty / + steppers; the checkbox batch-selects, and tapping the
    // body marks the row all-present (greys it out — tap again to undo). Everything autosaves.
    return html`
      <div class="row" style=${`background:var(--panel);border:1px solid ${full ? "var(--green)" : selected ? "var(--blue)" : "var(--line)"};border-radius:12px;padding:8px 10px;margin-bottom:6px;opacity:${full ? .55 : 1}`}>
        <button class="step" style=${`width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:800;flex-shrink:0;padding:0;border:2px solid ${selected ? "var(--blue)" : "var(--dim)"};background:${selected ? "var(--blue)" : "transparent"};color:#1C1A17`} onClick=${onSel}>${selected ? "✓" : ""}</button>
        ${imgEl}
        <div style="flex:1;min-width:0;cursor:pointer" onClick=${() => onToggleFull?.(p)}>
          <div class="clamp2" style="font-size:13px;line-height:1.25">${p.partName}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName} · ${p.partNumber}${spareTag}</div>
          ${allocLine}
        </div>
        <button class="step" style="width:34px" disabled=${p.qtyFound === 0} onClick=${() => bump(p.id, -1)}>−</button>
        <div class="mono" style=${`font-size:14px;font-weight:700;min-width:40px;text-align:center;color:${full ? "var(--green)" : "var(--text)"}`}>${p.qtyFound}/${p.qtyNeeded}</div>
        <button class="step plus" style="width:34px" disabled=${full} onClick=${() => bump(p.id, +1)}>+</button>
      </div>`;
  }
  const numCol = isRem ? (full ? "var(--green)" : "var(--yellow)") : (done ? "var(--green)" : "var(--text)");
  const border = (isRem ? full : done) ? "var(--green)" : "var(--line)";
  const opacity = isRem ? 1 : (done ? .65 : 1);
  return html`
    <div class="row" style=${`background:var(--panel);border:1px solid ${border};border-radius:12px;padding:8px 10px;margin-bottom:6px;opacity:${opacity}`}>
      ${imgEl}
      <div style="flex:1;min-width:0" onClick=${() => bump(p.id, full ? -p.qtyNeeded : p.qtyNeeded - p.qtyFound)}>
        <div class="clamp2" style="font-size:13px;line-height:1.25">${p.partName}</div>
        <div class="dim mono" style="font-size:11px">${p.colorName} · ${p.partNumber} · <span style="color:var(--yellow)">${partRate(p).label}</span>${spareTag}</div>
        ${allocLine}
      </div>
      ${onMove && p.qtyFound > 0 && html`<button class="step" style="width:34px;color:var(--purple);border-color:var(--purple)" onClick=${onMove}>→</button>`}
      <button class="step" disabled=${p.qtyFound === 0} onClick=${() => bump(p.id, -1)}>−</button>
      <div class="mono" style=${`font-size:14px;font-weight:700;min-width:40px;text-align:center;color:${numCol}`}>${p.qtyFound}/${p.qtyNeeded}</div>
      <button class="step plus" disabled=${full} onClick=${() => bump(p.id, +1)}>+</button>
    </div>`;
}

// ---------- Sorting mode ----------
function SortingMode({ index, buys, persistSet }) {
  const [q, setQ] = useState("");
  const [scan, setScan] = useState(false);
  const [tick, setTick] = useState(0); // re-read storage after bumps
  const [finder, setFinder] = useState(null); // null | {stage, part, colors, color, sets, count, chosen, msg}
  // #1 target set: when set, every scan/search matches ONLY this set and a single match auto-logs +1.
  const [targetNum, setTargetNumRaw] = useState(() => load("bt:sortTarget", null));
  const setTargetNum = n => { setTargetNumRaw(n); n ? save("bt:sortTarget", n) : del("bt:sortTarget"); setFinder(null); };
  const [autoMsg, setAutoMsg] = useState("");
  useEffect(() => { setFinder(null); }, [q]);
  const lastBulk = lastBulkBuyOf(buys, index);
  // drop a stale target if its set was deleted
  useEffect(() => { if (targetNum && !index.some(e => e.setNum === targetNum)) setTargetNum(null); }, [index, targetNum]);
  const target = targetNum ? index.find(e => e.setNum === targetNum) : null;

  // bump first matching part row (non-spare preferred) in a record; returns the row or null
  const bumpInRec = (rec, partNum, colorId) => {
    const p = rec.parts.find(x => x.partNumber === partNum && x.colorID === colorId && !x.isSpare && x.qtyFound < x.qtyNeeded)
      || rec.parts.find(x => x.partNumber === partNum && x.colorID === colorId && x.qtyFound < x.qtyNeeded);
    if (p) { p.qtyFound += 1; return p; }
    return null;
  };

  async function finderStart() {
    const pn = q.trim();
    if (!getKey().trim()) { setFinder({ stage: "error", msg: "Add your Rebrickable key in Settings first." }); return; }
    setFinder({ stage: "busy", msg: "Looking up part…" });
    try {
      const part = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(pn)}/`);
      const cj = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(pn)}/colors/?page_size=200`);
      const colors = cj.results || [];
      if (!colors.length) { setFinder({ stage: "error", msg: "Rebrickable lists no colours/sets for this part." }); return; }
      if (colors.length === 1) await finderSets(part, colors[0]);
      else setFinder({ stage: "colors", part, colors: [...colors].sort((a, b) => (b.num_sets || 0) - (a.num_sets || 0)) });
    } catch (e) {
      setFinder({ stage: "error", msg: e.status === 404
        ? `“${pn}” isn’t a Rebrickable part number — scan the part or type its exact number.`
        : (e.message || String(e)) });
    }
  }
  async function finderSets(part, color) {
    setFinder({ stage: "busy", msg: `Finding sets with ${color.color_name}…` });
    try {
      const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(part.part_num)}/colors/${color.color_id}/sets/?page_size=50`);
      setFinder({ stage: "sets", part, color, sets: j.results || [], count: j.count ?? (j.results || []).length });
    } catch (e) { setFinder({ stage: "error", msg: e.message || String(e) }); }
  }
  async function finderTrack(s) {
    const f = finder;
    if (index.some(e => e.setNum === s.set_num)) {
      const rec = structuredClone(load(`bt:set:${s.set_num}`, null));
      if (!rec) { setFinder({ stage: "error", msg: "Set record missing from storage." }); return; }
      const p = bumpInRec(rec, f.part.part_num, f.color.color_id);
      persistSet(rec); setTick(t => t + 1);
      setFinder({ stage: "done", msg: p
        ? `Logged +1 ${f.part.part_num} into ${rec.name} (already tracked).`
        : `${rec.name} is already tracked but doesn’t need that part/colour (or it’s complete).` });
      return;
    }
    setFinder({ ...f, stage: "busy", msg: "Fetching inventory…" });
    try {
      const r = await fetchFullSet(s.set_num, m => setFinder(prev => prev && { ...prev, msg: m }));
      const rec = { ...r.meta, instructions: "none", triage: "undecided",
        buyIds: lastBulk ? [lastBulk.id] : [], notes: "", dateAdded: Date.now(), parts: r.parts, minifigs: r.minifigs || [] };
      const p = bumpInRec(rec, f.part.part_num, f.color.color_id);
      persistSet(rec); setTick(t => t + 1);
      setFinder({ stage: "done", msg: `Tracked ${rec.name}${lastBulk ? ` → ${lastBulk.label}` : ""}${p ? ` and logged +1 ${f.part.part_num}` : ""}.` });
    } catch (e) { setFinder({ stage: "error", msg: e.message || String(e) }); }
  }

  // with a target set, only that set is in play (even if it's "complete"); otherwise every incomplete set
  const candidates = useMemo(() => targetNum
    ? index.filter(e => e.setNum === targetNum)
    : index.filter(e => e.pct < 100 && e.triage !== "sell"), [index, targetNum]);
  const recs = useMemo(() => {
    const out = {};
    for (const e of candidates) out[e.setNum] = load(`bt:set:${e.setNum}`, null);
    return out;
  }, [candidates.map(c => c.setNum).join(","), tick]);

  const hits = useMemo(() => {
    const ql = q.trim().toLowerCase();
    if (ql.length < 2) return [];
    const out = [];
    for (const e of candidates) {
      const rec = recs[e.setNum];
      if (!rec) continue;
      for (const p of rec.parts) {
        if (p.isSpare || p.qtyFound >= p.qtyNeeded) continue;
        if (p.partName?.toLowerCase().includes(ql) || p.partNumber?.toLowerCase().includes(ql) || p.colorName?.toLowerCase().includes(ql))
          out.push({ set: rec, p });
      }
    }
    out.sort((a, b) => (a.p.partNumber + a.p.colorName).localeCompare(b.p.partNumber + b.p.colorName));
    return out.slice(0, 80);
  }, [q, recs, candidates]);

  const bump = (setNum, partId) => {
    const rec = structuredClone(recs[setNum] || load(`bt:set:${setNum}`, null));
    if (!rec) return;
    const p = rec.parts.find(x => x.id === partId);
    if (p && p.qtyFound < p.qtyNeeded) p.qtyFound += 1;
    persistSet(rec);
    setTick(t => t + 1);
  };

  // #1 after a scan with a target set: if exactly one incomplete row in the target matches the scanned
  // part number, log +1 straight away. Otherwise leave the filtered list for a manual tap (colour choice).
  const tryAutoLog = pid => {
    if (!targetNum || !pid) return;
    const rec = recs[targetNum] || load(`bt:set:${targetNum}`, null);
    if (!rec) return;
    const matches = rec.parts.filter(p => !p.isSpare && p.qtyFound < p.qtyNeeded && p.partNumber === pid);
    if (matches.length === 1) {
      bump(targetNum, matches[0].id);
      setAutoMsg(`✓ +1 ${matches[0].colorName} ${pid} → ${rec.name}`);
      setTimeout(() => setAutoMsg(""), 2500);
    }
  };

  return html`<div>
    <${Header} title="Sorting mode" sub=${target ? `🎯 filling ${target.name}` : `${candidates.length} incomplete sets in the hunt`}
      right=${html`<button class="step" style="width:46px;height:46px;font-size:18px" onClick=${() => setScan(true)}>📷</button>`} />

    <div class="card" style="padding:10px">
      ${target ? html`<div class="row" style="gap:10px">
        ${target.img ? html`<img class="setimg" style="width:40px;height:40px" src=${target.img}/>` : html`<div class="setimg" style="width:40px;height:40px;background:var(--panel2)"></div>`}
        <div style="flex:1;min-width:0">
          <div class="label" style="margin:0">🎯 Target set</div>
          <div class="ellip" style="font-weight:700;font-size:14px">${target.name}</div>
          <div class="dim mono" style="font-size:11px">${target.setNum} · scans & search match only this set</div>
        </div>
        <button class="step" style="width:38px;color:var(--red);border-color:var(--red)" onClick=${() => setTargetNum(null)}>✕</button>
      </div>`
      : html`<div class="row" style="gap:8px;align-items:center">
        <span class="label" style="margin:0;flex-shrink:0">🎯 Target</span>
        <select value="" onChange=${e => e.target.value && setTargetNum(e.target.value)} style="flex:1">
          <option value="">— none (hunt all sets) —</option>
          ${index.map(e => html`<option key=${e.setNum} value=${e.setNum}>${e.name} (${e.setNum})</option>`)}
        </select>
      </div>`}
    </div>

    ${autoMsg && html`<div class="card" style="color:var(--green);font-size:14px;font-weight:700">${autoMsg}</div>`}

    <input style="font-size:18px;padding:16px 14px" placeholder=${target ? "Scan or type a part to add to this set…" : "Part name, number or colour…"}
      value=${q} onInput=${e => setQ(e.target.value)} />
    <div style="height:12px"></div>

    ${q.trim().length < 2 && html`<div class="card dim" style="font-size:14px;line-height:1.5">
      ${target
        ? html`Brick in hand → scan it with 📷 or type 2+ characters. Only <b style="color:var(--yellow)">${target.name}</b> is matched; a single match auto-logs +1, otherwise tap the right colour.`
        : html`Brick in hand → type 2+ characters (“2x4 red”, “3001”, “technic pin”) or scan it with 📷. Every incomplete set needing that part appears. Tap <b style="color:var(--yellow)">+1</b> to log it.`}
    </div>`}
    ${q.trim().length >= 2 && hits.length === 0 && !finder && html`<div>
      <div class="card dim" style="text-align:center">${target ? html`${target.name} doesn't need a part matching “${q}” (or it's complete).` : html`No incomplete set needs a part matching “${q}”.`}</div>
      ${!target && html`<button class="ghost" onClick=${finderStart}>🔎 Find LEGO sets containing “${q.trim()}”</button>`}
    </div>`}

    ${finder?.stage === "busy" && html`<div class="card dim" style="text-align:center">${finder.msg}</div>`}
    ${finder?.stage === "error" && html`<div>
      <div class="card" style="color:var(--red);font-size:13px">${finder.msg}</div>
      <button class="ghost" onClick=${() => setFinder(null)}>Back</button>
    </div>`}
    ${finder?.stage === "done" && html`<div>
      <div class="card" style="color:var(--green);font-size:13px;font-weight:600">✓ ${finder.msg}</div>
      <button class="ghost" onClick=${() => setFinder(null)}>Done</button>
    </div>`}
    ${finder?.stage === "colors" && html`<div>
      <div class="card">
        <${Label}>${finder.part.name} — pick the colour in hand</${Label}>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${finder.colors.map(c => html`<button key=${c.color_id} class="chip"
            style="border-color:var(--blue);color:var(--blue);text-align:left"
            onClick=${() => finderSets(finder.part, c)}>${c.color_name} · ${c.num_sets ?? "?"} sets</button>`)}
        </div>
      </div>
      <button class="ghost" onClick=${() => setFinder(null)}>Cancel</button>
    </div>`}
    ${finder?.stage === "sets" && html`<div>
      <div class="label" style="margin:2px 2px 8px">${finder.part.part_num} in ${finder.color.color_name} · ${finder.count} set${finder.count === 1 ? "" : "s"}${finder.count > 50 ? " (showing 50)" : ""}</div>
      ${finder.sets.length === 0 && html`<div class="card dim" style="text-align:center">No sets found for this colour.</div>`}
      ${finder.sets.map(s => {
        const tracked = index.some(e => e.setNum === s.set_num);
        return html`<div key=${s.set_num} class="card row" style="cursor:pointer"
          onClick=${() => setFinder({ ...finder, stage: "confirm", chosen: s })}>
          ${s.set_img_url ? html`<img class="setimg" src=${s.set_img_url} loading="lazy"/>` : html`<div class="setimg" style="background:var(--panel2)"></div>`}
          <div style="flex:1;min-width:0">
            <div class="ellip" style="font-weight:700">${s.name}</div>
            <div class="dim mono" style="font-size:12px">${s.set_num} · ${s.year}${s.num_parts ? ` · ${s.num_parts} parts` : ""}</div>
            ${tracked && html`<span class="badge" style="color:var(--green);border:1px solid var(--green)">tracked</span>`}
          </div>
        </div>`;
      })}
      <button class="ghost" onClick=${() => setFinder(null)}>Cancel</button>
    </div>`}
    ${finder?.stage === "confirm" && html`<div>
      <div class="card row">
        ${finder.chosen.set_img_url && html`<img class="setimg" style="width:72px;height:72px" src=${finder.chosen.set_img_url}/>`}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700">${finder.chosen.name}</div>
          <div class="dim mono" style="font-size:12px">${finder.chosen.set_num} · ${finder.chosen.year}</div>
        </div>
      </div>
      <div class="card">
        ${index.some(e => e.setNum === finder.chosen.set_num)
          ? html`<button class="btn green" onClick=${() => finderTrack(finder.chosen)}>Log +1 ${finder.part.part_num} into this set</button>`
          : html`<div>
              <button class="btn green" onClick=${() => finderTrack(finder.chosen)}>Track set + log this part</button>
              <div class="dim" style="font-size:12px;margin-top:8px">${lastBulk ? `Will be linked to “${lastBulk.label}”.` : "No bulk buy to link — set will be No Buy."}</div>
            </div>`}
        <div style="height:8px"></div>
        <button class="ghost" onClick=${() => setFinder({ ...finder, stage: "sets", chosen: null })}>Back</button>
      </div>
    </div>`}

    ${hits.map(({ set, p }) => html`
      <div class="row" style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:6px">
        ${p.img && html`<img class="partimg" style="width:44px;height:44px" src=${p.img} loading="lazy"/>`}
        <div style="flex:1;min-width:0">
          <div class="clamp2" style="font-size:13px;line-height:1.25">${p.partName}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName} · ${p.partNumber}</div>
          <div class="ellip" style="font-size:12px;color:var(--yellow);font-weight:700;margin-top:2px">→ ${set.name}</div>
        </div>
        <div class="dim mono" style="font-size:13px">${p.qtyFound}/${p.qtyNeeded}</div>
        <button class="step plus" style="width:58px;height:52px;font-size:17px" onClick=${() => bump(set.setNum, p.id)}>+1</button>
      </div>`)}

    ${scan && html`<${ScanModal} hint=${target ? `Adding to ${target.name}` : "One part per photo"} onClose=${() => setScan(false)}
      onPick=${it => { setScan(false); const pid = it.id || it.name || ""; setQ(pid); tryAutoLog(pid); }} />`}
  </div>`;
}

const CURRENCIES = ["AUD", "USD", "NZD", "CAD", "EUR", "GBP"];
const CUR_SYM = { AUD: "$", USD: "$", NZD: "$", CAD: "$", EUR: "\u20AC", GBP: "\u00A3" };

function BuyThumb({ b, sets }) {

      ${img
        ? html`<img style="position:absolute;left:0;top:4px;width:46px;height:46px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid var(--line)" src=${img} loading="lazy"/>`
        : html`<div style="position:absolute;left:0;top:4px;width:46px;height:46px;border-radius:8px;background:var(--panel2);border:1px solid var(--line)"></div>`}

function Buys({ buys, index, cats, merch = [], onOpenMerch, upsertMerch, addBuy, updateBuy, deleteBuy, mutateBuys, ensureCat, onOpenSet, onAddSet, openBuyId, setOpenBuyId }) {
  // persisted view state
  const [kindF, setKindFRaw] = useState(() => { const v = load("bt:bv:kind", "bulk"); return v === "all" ? "bulk" : v; });
  const [catF, setCatFRaw] = useState(() => load("bt:bv:cat", "all"));
  const [sort, setSortRaw] = useState(() => load("bt:bv:sort", "date_desc"));
  const setKindF = v => { setKindFRaw(v); save("bt:bv:kind", v); };
  const setCatF = v => { setCatFRaw(v); save("bt:bv:cat", v); };
  const setSort = v => { setSortRaw(v); save("bt:bv:sort", v); };

  const [showForm, setShowForm] = useState(false);
  const [editBuy, setEditBuy] = useState(null);
  const [addMerchFor, setAddMerchFor] = useState(null); // buyId for new pre-linked merch (#14)
  const [detailSort, setDetailSort] = useState("date");
  const [swipeId, setSwipeId] = useState(null);
  const [openNav, setOpenNav] = useState(null); // null | "kind" | "cat" 
  const [viewPhotoId, setViewPhotoId] = useState(null);
  const photoInput = useRef(null);
  const [openRGroups, setOpenRGroups] = useState(() => new Set(load("bt:bv:rgroups", [])));
  const toggleRGroup = id => setOpenRGroups(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id);
    save("bt:bv:rgroups", [...n]); return n;
  });

  // select / mass-edit mode
  const [selectMode, setSelectMode] = useState(false);
  const [selIds, setSelIds] = useState([]);
  const selSet = useMemo(() => new Set(selIds), [selIds]);
  const exitSelect = () => { setSelectMode(false); setSelIds([]); };
  const toggleSel = id => setSelIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const assignKind = k => mutateBuys(prev => prev.map(b => selSet.has(b.id) && buyKind(b) !== k ? { ...b, kind: k } : b));
  const assignCat = c => { ensureCat(c); mutateBuys(prev => prev.map(b => selSet.has(b.id) && b.category !== c ? { ...b, category: c } : b)); };

  // manual order
  const [orderIds, setOrderIdsRaw] = useState(() => load("bt:buyorder", []));
  const setOrderIds = ids => { setOrderIdsRaw(ids); save("bt:buyorder", ids); };

  // drag state
  const gest = useRef({});
  const rowRefs = useRef({});
  const dragRef = useRef(null);
  const [dragId, setDragId] = useState(null);
  const [dragDy, setDragDy] = useState(0);

  const setsOf = id => index.filter(e => (e.buyIds || []).includes(id));
  const usedCats = useMemo(() => [...new Set(buys.map(b => b.category).filter(Boolean))].sort(), [buys]);
  const d = new Date(), ms = new Date(d.getFullYear(), d.getMonth(), 1).getTime();
  // receipt (regular) spend is derived from linked sets + merch; bulk uses the entered price
  const spendOf = b => buyKind(b) === "regular" ? receiptTotals(b, index, merch).paid : (b.price || 0);
  const sum = l => l.reduce((a, b) => a + spendOf(b), 0);
  const stats = k => {
    const l = buys.filter(b => buyKind(b) === k);
    return { month: sum(l.filter(b => b.date >= ms)), total: sum(l) };
  };
  const bulk = stats("bulk"), reg = stats("regular"), loose = stats("loose");
  const noBuySets = useMemo(() => index.filter(e => !(e.buyIds || []).length), [index]);

  const sortedBase = useMemo(() => {
    if (sort === "manual") {
      const map = new Map(buys.map(b => [b.id, b]));
      const inO = new Set(orderIds);
      return [...orderIds.map(id => map.get(id)).filter(Boolean),
        ...buys.filter(b => !inO.has(b.id)).sort((a, b) => b.date - a.date)];
    }
    return [...buys].sort((a, b) => sort === "date_asc" ? a.date - b.date : b.date - a.date);
  }, [buys, sort, orderIds]);
  const shown = useMemo(() => sortedBase
    .filter(b => kindF === "all" || buyKind(b) === kindF)
    .filter(b => catF === "all" || b.category === catF), [sortedBase, kindF, catF]);
  const filtersActive = catF !== "all";
  const canDrag = sort === "manual" && !filtersActive && !selectMode;

  // ---- drag-to-reorder ----
  function startDrag(id) {
    const ids = shown.map(b => b.id);
    const rects = ids.map(i => rowRefs.current[i]?.getBoundingClientRect());
    if (rects.some(r => !r)) return;
    dragRef.current = { ids, rects, srcIdx: ids.indexOf(id), curIdx: ids.indexOf(id) };
    setDragId(id);
  }
  function moveDrag(y, y0) {
    const dr = dragRef.current; if (!dr) return;
    const dy = y - y0; setDragDy(dy);
    const r = dr.rects[dr.srcIdx];
    const center = r.top + r.height / 2 + dy;
    let idx = dr.rects.length - 1;
    for (let i = 0; i < dr.rects.length; i++) if (center < dr.rects[i].bottom) { idx = i; break; }
    dr.curIdx = idx;
  }
  function endDrag() {
    const dr = dragRef.current; dragRef.current = null; setDragId(null); setDragDy(0);
    if (!dr || dr.curIdx === dr.srcIdx) return;
    const ids = [...dr.ids]; const [m] = ids.splice(dr.srcIdx, 1); ids.splice(dr.curIdx, 0, m);
    // visible ids are one segment of the global order — keep the others' positions
    const visible = new Set(dr.ids);
    const globalNow = sortedBase.map(b => b.id);
    const merged = []; let vi = 0;
    for (const id of globalNow) merged.push(visible.has(id) ? ids[vi++] : id);
    setOrderIds(merged);
  }

  // ---- per-row gestures (disabled in select mode) ----
  const touchProps = b => selectMode ? {} : ({
    onTouchStart: e => {
      const g = (gest.current[b.id] = {});
      const p = e.touches[0]; g.x = p.clientX; g.y = p.clientY; g.mode = null;
      if (canDrag) g.timer = setTimeout(() => { g.mode = "drag"; startDrag(b.id); }, 350);
    },
    onTouchMove: e => {
      const g = gest.current[b.id]; if (!g) return;
      const p = e.touches[0]; const dx = p.clientX - g.x, dy = p.clientY - g.y;
      if (!g.mode && (Math.abs(dx) > 12 || Math.abs(dy) > 12)) {
        clearTimeout(g.timer);
        g.mode = Math.abs(dx) > Math.abs(dy) ? "swipe" : "scroll";
      }
      if (g.mode === "swipe") {
        g.suppress = true;
        setSwipeId(prev => dx > 30 ? b.id : dx < -30 ? null : prev);
      }
      if (g.mode === "drag") { e.preventDefault(); g.suppress = true; moveDrag(p.clientY, g.y); }
    },
    onTouchEnd: () => {
      const g = gest.current[b.id]; if (!g) return;
      clearTimeout(g.timer);
      if (g.mode === "drag") endDrag();
    },
  });

  const editModal = editBuy && html`<div class="modal" onClick=${e => { if (e.target === e.currentTarget) setEditBuy(null); }}>
    <div class="sheet">
      <${Header} title="Edit buy" onBack=${() => setEditBuy(null)} />
      <${BuyForm} categories=${cats} initial=${editBuy} submitLabel="Save changes"
        onCancel=${() => setEditBuy(null)}
        onAdd=${b => { updateBuy(b); setEditBuy(null); }} />
    </div>
  </div>`;
  const addModal = showForm && html`<div class="modal" onClick=${e => { if (e.target === e.currentTarget) setShowForm(false); }}>
    <div class="sheet">
      <${Header} title="New buy" onBack=${() => setShowForm(false)} />
      <${BuyForm} categories=${cats} onCancel=${() => setShowForm(false)}
        onAdd=${b => { addBuy(b); setShowForm(false); setOpenBuyId(b.id); }} />
    </div>
  </div>`;

  // ---- buy detail ----
  const openBuy = openBuyId && buys.find(x => x.id === openBuyId);
  async function addPhotos(files) {
    const ids = [];
    for (const file of files) {
      const small = await downscale(file, 1024);
      try {
        const dataURL = await blobToDataURL(small);
        const id = `${Date.now()}${Math.random().toString(36).slice(2, 6)}`;
        save(photoKey(id), dataURL);
        ids.push(id);
      } catch (e) { alert("Couldn’t read a photo: " + (e.message || e)); }
    }
    if (ids.length) updateBuy({ ...openBuy, photoIds: [...(openBuy.photoIds || []), ...ids] });
  }
  function setDisplayPhoto(id) {
    updateBuy({ ...openBuy, photoIds: [id, ...(openBuy.photoIds || []).filter(x => x !== id)] });
  }
  function removePhoto(id) {
    del(photoKey(id));
    updateBuy({ ...openBuy, photoIds: (openBuy.photoIds || []).filter(x => x !== id) });
    setViewPhotoId(null);
  }
  const photoViewer = viewPhotoId && html`<${PhotoViewer} photoId=${viewPhotoId}
    isDisplay=${(openBuy?.photoIds || [])[0] === viewPhotoId}
    onSetDisplay=${setDisplayPhoto} onDelete=${removePhoto}
    onClose=${() => setViewPhotoId(null)} />`;
  if (openBuy) {
    const sets = [...setsOf(openBuy.id)].sort((a, b) =>
      detailSort === "pct" ? b.pct - a.pct : b.dateAdded - a.dateAdded);
    const isReg = buyKind(openBuy) === "regular";
    return html`<div key="buy-detail">
      <${Header} title=${openBuy.label}
        sub=${`${isReg ? "Regular" : "Bulk"}${openBuy.category ? ` · ${openBuy.category}` : ""} · ${new Date(openBuy.date).toLocaleDateString()}`}
        onBack=${() => setOpenBuyId(null)} />
      <div class="card">
        ${(() => {
          const merchHere = merch.filter(m => (m.buyIds || []).includes(openBuy.id));
          const mPaid = merchHere.reduce((a, m) => a + (m.pricePaid || 0), 0);
          const mRrp = merchHere.reduce((a, m) => a + (m.rrp || 0), 0);
          const mMarket = merchHere.reduce((a, m) => a + (m.marketRate || 0) * (m.qty || 1), 0);
          const rt = isReg ? receiptTotals(openBuy, index, merch) : null;
          const paid = isReg ? rt.paid : (openBuy.price || 0);
          const rrp = isReg ? rt.rrp : (openBuy.rrp || 0);
          return html`<div>
            <div class="row" style="justify-content:space-between">
              <span class="dim" style="font-size:13px">${isReg ? "Total — auto from linked sets + merch" : "Price paid"}</span>
              <span class="mono" style="font-weight:700">${paid ? money(paid) : "—"}</span>
            </div>
            ${rrp > 0 && html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">RRP${paid > 0 && rrp > paid ? ` · saved ${Math.round((1 - paid / rrp) * 100)}%` : ""}</span>
              <span class="mono dim" style="font-size:13px;font-weight:700">${money(rrp)}</span>
            </div>`}
            ${mPaid > 0 && html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">Merch — paid${mRrp > 0 ? ` (RRP ${money(mRrp)})` : ""}</span>
              <span class="mono" style="font-size:13px;font-weight:700;color:var(--yellow)">${money(mPaid)}</span>
            </div>`}
            ${mMarket > 0 && html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">Merch — market now</span>
              <span class="mono" style="font-size:13px;font-weight:700;color:var(--purple)">${money(mMarket)}</span>
            </div>`}
          </div>`;
        })()}
        ${(() => {
          const rs = sets.reduce((a, e) => a + (e.valueSet || 0), 0);
          const rp = sets.reduce((a, e) => a + (e.valuePartOut || 0), 0);
          let pn = 0, pval = 0, tn = 0, tval = 0;
          for (const e of sets) {
            pn += e.foundQty || 0; pval += e.foundVal || 0;
            tn += e.fullQty || 0; tval += e.fullVal || 0;
          }
          return html`
            ${(rs || rp) ? html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">Est. recovery</span>
              <span class="mono" style="font-size:13px;font-weight:700">
                ${rs ? html`<span style="color:var(--yellow)">Set ${money(rs)}</span>` : ""}${rs && rp ? " · " : ""}${rp ? html`<span style="color:var(--purple)">Parts ${money(rp)}</span>` : ""}
              </span>
            </div>` : ""}
            ${pn > 0 ? html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">Found parts (avg guide)</span>
              <span class="mono" style="font-size:13px;font-weight:700;color:var(--green)">${pn.toLocaleString()} pcs ≈ ${money(pval)}</span>
            </div>` : ""}
            ${tn > 0 ? html`<div class="row" style="justify-content:space-between;margin-top:8px">
              <span class="dim" style="font-size:13px">All parts if complete</span>
              <span class="mono dim" style="font-size:13px;font-weight:700">${tn.toLocaleString()} pcs ≈ ${money(tval)}</span>
            </div>` : ""}`;
        })()}
        <div style="height:10px"></div>
        <button class="ghost" onClick=${() => setEditBuy(openBuy)}>Edit buy…</button>
      </div>

      <div class="card">
        <${Label}>Photos · ${(openBuy.photoIds || []).length}</${Label}>
        <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">
          ${(openBuy.photoIds || []).map((id, i) => {
            const src = photoSrc(id);
            return src && html`<img key=${id} src=${src}
              style=${`width:72px;height:72px;object-fit:cover;border-radius:10px;flex-shrink:0;border:${i === 0 ? "2px solid var(--yellow)" : "1px solid var(--line)"}`}
              onClick=${() => setViewPhotoId(id)}/>`;
          })}
          <button class="step" style="width:72px;height:72px;font-size:26px" onClick=${() => photoInput.current?.click()}>＋</button>
        </div>
        <input ref=${photoInput} type="file" accept="image/*" multiple style="display:none"
          onChange=${e => { const fs = [...(e.target.files || [])]; if (fs.length) addPhotos(fs); e.target.value = ""; }} />
        <div class="dim" style="font-size:12px;margin-top:8px">Multi-select supported. Yellow border = display pic on the buy card; tap a photo → ★ to change it.</div>
      </div>

      <div class="row" style="gap:8px;margin:4px 0 12px">
        <button class="btn" style="flex:1" onClick=${() => onAddSet?.(openBuy.id)}>+ Add set</button>
        <button class="btn" style="flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text)" onClick=${() => setAddMerchFor(openBuy.id)}>+ Add merch</button>
      </div>
      <div class="row" style="justify-content:space-between;margin:4px 2px 8px">
        <div class="label" style="margin:0">Sets from this buy · ${sets.length}</div>
        <${Chip} label=${detailSort === "pct" ? "↓ Completion" : "↓ Newest"} color="var(--blue)" active
          onClick=${() => setDetailSort(v => v === "pct" ? "date" : "pct")} />
      </div>
      ${sets.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">
        No sets linked yet. Link from a set's detail screen or when adding a set.</div>`}
      ${sets.map(e => html`
        <div class="card row" style="cursor:pointer" onClick=${() => onOpenSet(e.setNum)}>
          ${e.img ? html`<img class="setimg" src=${e.img} loading="lazy"/>` : html`<div class="setimg" style="background:var(--panel2)"></div>`}
          <div style="flex:1;min-width:0">
            <div class="ellip" style="font-weight:700">${e.name}</div>
            <div class="dim mono" style="font-size:12px">${e.setNum} · ${e.year}</div>
            <span style=${`font-size:11px;font-weight:700;color:${triageOf(e.triage).color}`}>${triageOf(e.triage).label}</span>
          </div>
          <${Ring} pct=${e.pct} />
        </div>`)}
      ${(() => {
        const merchHere = merch.filter(m => (m.buyIds || []).includes(openBuy.id));
        return merchHere.length > 0 && html`<div>
          <div class="label" style="margin:12px 2px 8px">Merch from this buy · ${merchHere.length}</div>
          ${merchHere.map(m => {
            const src = (m.photoIds || [])[0] && photoSrc(m.photoIds[0]);
            return html`<div key=${m.id} class="card row" style="cursor:pointer" onClick=${() => onOpenMerch?.(m.id)}>
              ${src ? html`<img class="setimg" style="width:44px;height:44px;object-fit:cover" src=${src}/>`
                : html`<div class="setimg" style="width:44px;height:44px;background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:18px">🧰</div>`}
              <div style="flex:1;min-width:0">
                <div class="ellip" style="font-weight:700;font-size:14px">${m.name}</div>
                <span class="badge" style=${`color:${condColor(m.condition)};border:1px solid ${condColor(m.condition)}`}>${condLabel(m.condition)}</span>
              </div>
              ${m.pricePaid ? html`<span class="mono" style="font-weight:700;font-size:13px;color:var(--yellow)">${money(m.pricePaid)}</span>` : ""}
            </div>`;
          })}
        </div>`;
      })()}
      ${addMerchFor && html`<${MerchSheet} initial=${null} presetBuyIds=${[addMerchFor]} buys=${buys} cats=${cats} addBuy=${addBuy}
        onClose=${() => setAddMerchFor(null)}
        onSave=${m => { upsertMerch?.(m); setAddMerchFor(null); }} />`}
      ${editModal}
      ${photoViewer}
    </div>`;
  }

  // ---- list ----
  const catOpts = [{ id: "all", label: "All Channels", color: "var(--dim)" },
    ...usedCats.map(c => ({ id: c, label: c, color: "var(--yellow)" }))];
  const catActive = catOpts.find(o => o.id === catF) || catOpts[0];

  return html`<div key="buy-list">
    <${Header} title="All Buys" sub=${`${buys.length} recorded · v${APP_VERSION}`} />

    <div class="card" style="padding:12px 14px">
      <div class="row" style="justify-content:space-between">
        <span style="font-size:12px;font-weight:800;letter-spacing:1px;color:var(--purple)">BULK</span>
        <span class="mono dim" style="font-size:13px">${money(bulk.month)} this month · ${money(bulk.total)} total</span>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:6px">
        <span style="font-size:12px;font-weight:800;letter-spacing:1px;color:var(--blue)">REGULAR</span>
        <span class="mono dim" style="font-size:13px">${money(reg.month)} this month · ${money(reg.total)} total</span>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:6px">
        <span style="font-size:12px;font-weight:800;letter-spacing:1px;color:var(--green)">LOOSE / PAB</span>
        <span class="mono dim" style="font-size:13px">${money(loose.month)} this month · ${money(loose.total)} total</span>
      </div>
    </div>

    <button class="btn" style="margin-bottom:12px" onClick=${() => setShowForm(true)}>+ Add buy</button>

    <div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:12px">
      ${[["bulk", "Bulk"], ["regular", "Regular"], ["loose", "Loose"], ["nobuy", "No Buy"]].map(([id, label]) => html`
        <button key=${id} onClick=${() => { setKindF(id); setOpenNav(null); }}
          style=${`flex:1;border:none;padding:9px 6px;border-radius:9px;font-weight:700;font-size:13px;` +
            (kindF === id ? "background:var(--yellow);color:#1C1A17" : "background:transparent;color:var(--dim)")}>${label}</button>`)}
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:10px;align-items:center">
      ${kindF === "bulk" && html`<${Chip} label=${selectMode ? "✓" : "☑"} color="var(--green)" active=${selectMode}
        onClick=${() => selectMode ? exitSelect() : setSelectMode(true)} />`}
      ${kindF === "bulk" && usedCats.length > 0 && html`<${Chip}
        label=${`${catActive.label} ${openNav === "cat" ? "▴" : "▾"}`} color=${catActive.color} active
        onClick=${() => setOpenNav(v => v === "cat" ? null : "cat")} />`}
      ${kindF !== "nobuy" && html`<${Chip}
        label=${sort === "manual" ? (kindF === "regular" ? "↓ Date" : "☰ Manual") : sort === "date_asc" ? "↑ Date" : "↓ Date"} color="var(--yellow)" active
        onClick=${() => setSort(sort === "date_desc" ? "date_asc" : sort === "date_asc" ? (kindF === "regular" ? "date_desc" : "manual") : "date_desc")} />`}
      ${filtersActive && kindF === "bulk" && html`<${Chip} label="✕ Clear" color="var(--red)" active=${false}
        onClick=${() => { setCatF("all"); setOpenNav(null); }} />`}
    </div>

    ${openNav === "cat" && html`<div key="nav-cat" class="card navin" style="padding:10px;display:flex;flex-direction:column;gap:8px">
      ${catOpts.map(o => html`<button key=${o.id} class="chip"
        style=${`text-align:left;border-color:${o.color};color:${catF === o.id ? "#1C1A17" : o.color};background:${catF === o.id ? o.color : "transparent"}`}
        onClick=${() => { setCatF(o.id); setOpenNav(null); }}>${o.label}</button>`)}
    </div>`}

    ${kindF === "nobuy" && html`<div>
      <div class="label" style="margin:2px 2px 8px">Sets with no buy configured · ${noBuySets.length}</div>
      ${noBuySets.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">Every set is linked to a buy.</div>`}
      ${noBuySets.map(e => html`
        <div class="card row" style="cursor:pointer" onClick=${() => onOpenSet(e.setNum)}>
          ${e.img ? html`<img class="setimg" src=${e.img} loading="lazy"/>` : html`<div class="setimg" style="background:var(--panel2)"></div>`}
          <div style="flex:1;min-width:0">
            <div class="ellip" style="font-weight:700">${e.name}</div>
            <div class="dim mono" style="font-size:12px">${e.setNum} · ${e.year}</div>
          </div>
          <${Ring} pct=${e.pct} />
        </div>`)}
    </div>`}

    ${kindF === "regular" && html`<div>
      ${(() => {
        const regs = sortedBase.filter(b => buyKind(b) === "regular");
        if (!regs.length) return html`<div class="card dim" style="text-align:center;padding:28px">
          No receipts yet. + Add buy → Regular: just channel, date and price.</div>`;
        const m = new Map();
        for (const b of regs) { const k = b.category || ""; if (!m.has(k)) m.set(k, []); m.get(k).push(b); }
        const groups = [...m.entries()].sort((a, b) =>
          a[0] === "" ? 1 : b[0] === "" ? -1 : a[0].localeCompare(b[0]));
        const dir = sort === "date_asc" ? 1 : -1;
        return groups.map(([ch, list]) => {
          const gid = ch || "__nochan";
          const open = openRGroups.has(gid);
          const total = list.reduce((a, b) => a + receiptTotals(b, index, merch).paid, 0);
          const receipts = [...list].sort((a, b) => dir * (a.date - b.date));
          return html`<div key=${gid} style="margin-bottom:8px">
            <button class="row" onClick=${() => toggleRGroup(gid)}
              style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);justify-content:space-between">
              <span class="label ellip" style="margin:0;min-width:0;flex:1;text-align:left">${ch || "No channel"}</span>
              <span class="row" style="gap:10px;flex-shrink:0">
                <span class="mono dim" style="font-size:12px;font-weight:700">${receipts.length} receipt${receipts.length === 1 ? "" : "s"} · ${money(total)}</span>
                <span class="dim">${open ? "▾" : "▸"}</span>
              </span>
            </button>
            ${open && html`<div style="margin-top:6px">
              ${receipts.map(b => {
                const sets = setsOf(b.id);
                const rt = receiptTotals(b, index, merch);
                const pct = rt.rrp > 0 && rt.paid > 0 && rt.rrp > rt.paid ? Math.round((1 - rt.paid / rt.rrp) * 100) : 0;
                return html`<div key=${b.id} class="card" style="padding:10px 12px;cursor:pointer" onClick=${() => setOpenBuyId(b.id)}>
                  <div class="row" style="justify-content:space-between">
                    <span style="font-weight:700;font-size:14px">${fmtDate(b.date)}</span>
                    <span class="mono" style="font-size:13px;font-weight:700;color:var(--yellow)">${rt.paid ? money(rt.paid) : "—"}</span>
                  </div>
                  ${rt.rrp > 0 && html`<div class="row" style="justify-content:flex-end">
                    <span class="dim mono" style="font-size:11px">RRP ${money(rt.rrp)}${pct > 0 ? ` · −${pct}%` : ""}</span>
                  </div>`}
                  <div class="row" style="gap:6px;margin-top:6px">
                    ${sets.slice(0, 4).map(e => e.img
                      ? html`<img key=${e.setNum} src=${e.img} loading="lazy" style="width:34px;height:34px;object-fit:contain;background:#fff;border-radius:6px;border:1px solid var(--line);flex-shrink:0"/>`
                      : html`<div key=${e.setNum} style="width:34px;height:34px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);flex-shrink:0"></div>`)}
                    ${sets.length > 4 && html`<span class="dim mono" style="font-size:12px;font-weight:700">+${sets.length - 4}</span>`}
                    <span class="dim" style="font-size:12px">${sets.length === 0 ? "no sets linked" : `${sets.length} set${sets.length > 1 ? "s" : ""}`}</span>
                  </div>
                </div>`;
              })}
            </div>`}
          </div>`;
        });
      })()}
    </div>`}

    ${(kindF === "bulk" || kindF === "loose") && html`<div>
      ${sort === "manual" && !canDrag && !selectMode && html`<div class="dim" style="font-size:12px;margin:0 2px 10px">Clear the channel filter to drag-reorder.</div>`}
      ${sort === "manual" && canDrag && html`<div class="dim" style="font-size:12px;margin:0 2px 10px">Hold a buy, then drag to reorder.</div>`}
      ${selectMode && html`<div class="dim" style="font-size:12px;margin:0 2px 10px">Tap buys to select, then assign below.</div>`}

      ${shown.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
        ${buys.length === 0 ? "No buys yet." : "Nothing matches this filter."}</div>`}
      ${shown.map(b => {
        const sets = setsOf(b.id);
        const k = buyKind(b);
        const isReg = k === "regular";
        const kLabel = k === "regular" ? "Regular" : k === "loose" ? "Loose / PAB" : "Bulk";
        const kColor = k === "regular" ? "var(--blue)" : k === "loose" ? "var(--green)" : "var(--purple)";
        const revealed = !selectMode && swipeId === b.id;
        const isDrag = dragId === b.id;
        const checked = selSet.has(b.id);
        return html`<div style="position:relative;margin-bottom:12px" ref=${el => { rowRefs.current[b.id] = el; }}>
          ${revealed && html`<div class="row" style="position:absolute;left:4px;top:0;bottom:0;gap:6px;z-index:0;align-items:center">
            <button class="step" style="font-size:15px" onClick=${() => { setSwipeId(null); setEditBuy(b); }}>•••</button>
            <button class="step" style="font-size:15px;color:var(--red);border-color:var(--red)"
              onClick=${() => { if (confirm(`Delete "${b.label}"? Its sets move to No Buy Configured.`)) { setSwipeId(null); deleteBuy(b.id); } }}>✕</button>
          </div>`}
          <div class="card" ...${touchProps(b)}
            onClick=${() => {
              if (selectMode) { toggleSel(b.id); return; }
              const g = gest.current[b.id];
              if (g?.suppress) { g.suppress = false; return; }
              if (swipeId) { setSwipeId(null); return; }
              setOpenBuyId(b.id);
            }}
            style=${`margin-bottom:0;cursor:pointer;position:relative;z-index:1;` +
              `transition:${isDrag ? "none" : "transform .15s ease"};` +
              `transform:${isDrag ? `translateY(${dragDy}px)` : revealed ? "translateX(104px)" : "none"};` +
              (isDrag ? "border-color:var(--yellow);touch-action:none;box-shadow:0 6px 18px rgba(0,0,0,.5);" : "") +
              (checked ? "border-color:var(--green);" : "")}>
            <div class="row" style="align-items:flex-start;gap:10px">
              ${selectMode && html`<div style=${`width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid ${checked ? "var(--green)" : "var(--dim)"};background:${checked ? "var(--green)" : "transparent"};color:#1C1A17`}>${checked ? "✓" : ""}</div>`}
              <${BuyThumb} b=${b} sets=${sets} />
              <div style="flex:1;min-width:0">
                <div class="row" style="justify-content:space-between;align-items:baseline">
                  <div class="ellip" style="font-weight:700;min-width:0;flex:1">${b.label}</div>
                  <div class="dim mono" style="font-size:13px;flex-shrink:0">${spendOf(b) ? money(spendOf(b)) : ""}</div>
                </div>
                <div class="row" style="gap:6px;margin-top:6px;flex-wrap:wrap">
                  <span class="badge" style=${`color:${kColor};border:1px solid ${kColor}`}>${kLabel}</span>
                  ${b.category
                    ? html`<span class="badge" style="color:var(--yellow);border:1px solid var(--yellow)">${b.category}</span>`
                    : html`<span class="badge dim" style="border:1px solid var(--line)">no channel</span>`}
                </div>
                <div class="row" style="gap:10px;margin-top:5px;align-items:baseline">
                  <span class="dim" style="font-size:12px;min-width:0;flex:1">${sets.length === 0 ? "no sets linked" : `${sets.length} set${sets.length > 1 ? "s" : ""}`}${(merch.filter(m => (m.buyIds || []).includes(b.id)).length) ? ` · ${merch.filter(m => (m.buyIds || []).includes(b.id)).length} merch` : ""}</span>
                  <span class="dim mono" style="font-size:11px;flex-shrink:0">${new Date(b.date).toLocaleDateString()}</span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
      })}
    </div>`}

    ${selectMode && kindF === "bulk" && html`<div style="position:sticky;bottom:0;margin:0 -16px;background:var(--panel2);border-top:1px solid var(--line);padding:10px 16px 12px;z-index:9">
      <div class="row" style="gap:8px;margin-bottom:8px">
        <span class="mono dim" style="font-size:12px;flex:1">${selIds.length} selected</span>
        <button class="chip" style="border-color:var(--line);color:var(--dim)" onClick=${() => setSelIds(shown.map(b => b.id))}>All shown</button>
        <button class="chip" style="border-color:var(--line);color:var(--dim)" onClick=${() => setSelIds([])}>None</button>
      </div>
      <div class="row" style="gap:8px">
        <button class="ghost" style="flex:1;padding:10px" disabled=${!selIds.length} onClick=${() => assignKind("bulk")}>→ Bulk</button>
        <button class="ghost" style="flex:1;padding:10px" disabled=${!selIds.length} onClick=${() => assignKind("regular")}>→ Regular</button>
        <select style="flex:1.3;padding:10px" disabled=${!selIds.length} value=""
          onChange=${e => { if (e.target.value !== "__none") assignCat(e.target.value === "__clear" ? "" : e.target.value); e.target.value = ""; }}>
          <option value="" disabled>Channel…</option>
          ${cats.map(c => html`<option value=${c}>${c}</option>`)}
          <option value="__clear">— clear channel —</option>
        </select>
      </div>
    </div>`}

    ${editModal}
    ${addModal}
  </div>`;
}

// ---------- Settings ----------
function Section({ title, children }) {
  const [open, setOpen] = useState(false);
  return html`<div class="card">
    <button class="row" style="width:100%;background:none;border:none;color:var(--text);padding:0;justify-content:space-between"
      onClick=${() => setOpen(v => !v)}>
      <span class="label" style="margin:0">${title}</span>
      <span class="dim">${open ? "▾" : "▸"}</span>
    </button>
    ${open && html`<div key="body" style="margin-top:12px">${children}</div>`}
  </div>`;
}

function Settings({ index, buys, merch = [], saveMerchList, mocs = [], saveMocs, persistIndex, setBuys, cats, saveCats, addCat, renameCat, delCat }) {
  const [key, setKeyState] = useState(getKey());
  const [saved, setSaved] = useState(false);
  const [msg, setMsg] = useState("");
  const [confirmWipe, setConfirmWipe] = useState(false);
  const [newCat, setNewCat] = useState("");
  const [currency, setCurrencyRaw] = useState(() => load("bt:currency", "AUD"));
  const setCurrency = v => { setCurrencyRaw(v); save("bt:currency", v); };
  const [countSp, setCountSp] = useState(() => !!load("bt:countSpares", false));
  const [cardPct, setCardPct] = useState(() => !!load("bt:cardNewPct", false));
  const [cardTri, setCardTri] = useState(() => !!load("bt:cardNewTriage", false));
  function toggleSpares() {
    const v = !countSp; setCountSp(v); save("bt:countSpares", v);
    // recompute every set's cached completion with the new rule
    persistIndex(index.map(e => { const rec = load(`bt:set:${e.setNum}`, null); return rec ? indexEntry(rec) : e; }));
    setMsg(v ? "Spares now count toward completion %." : "Spares no longer count toward completion %.");
  }
  const importRef = useRef(null);

  function onKey(v) { setKeyState(v); setKey(v); setSaved(true); setTimeout(() => setSaved(false), 1200); }

  function doExport() {
    const sets = {};
    for (const e of index) sets[e.setNum] = load(`bt:set:${e.setNum}`, null);
    const photos = {};
    for (const b of buys) for (const id of (b.photoIds || [])) {
      const s = load(photoKey(id), null);
      if (s) photos[id] = s;
    }
    for (const m of merch) for (const id of (m.photoIds || [])) {
      const s = load(photoKey(id), null);
      if (s) photos[id] = s;
    }
    for (const mo of mocs) for (const id of (mo.photoIds || [])) {
      const s = load(photoKey(id), null);
      if (s) photos[id] = s;
    }
    const blob = new Blob([JSON.stringify({ v: 6, exported: new Date().toISOString(), apiKey: getKey(), buys, sets, cats, merch, mocs, photos, buyOrder: load("bt:buyorder", []) })], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `bricktriage-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  async function doImport(file) {
    setMsg("");
    try {
      const j = JSON.parse(await file.text());
      if (!j.sets) throw new Error("Not a BrickTriage backup.");
      const newIndex = [];
      for (const rec of Object.values(j.sets)) { save(`bt:set:${rec.setNum}`, rec); newIndex.push(indexEntry(rec)); }
      newIndex.sort((a, b) => b.dateAdded - a.dateAdded);
      persistIndex(newIndex);
      if (j.buys) { setBuys(j.buys); save("bt:buys", j.buys); }
      if (j.photos) for (const [id, s] of Object.entries(j.photos)) save(photoKey(id), s);
      if (j.merch) saveMerchList?.(j.merch);
      if (j.mocs) saveMocs?.(j.mocs);
      if (j.cats) saveCats(j.cats);
      if (j.buyOrder) save("bt:buyorder", j.buyOrder);
      let keyRestored = false;
      if (j.apiKey && j.apiKey !== getKey()) { setKey(j.apiKey); setKeyState(j.apiKey); keyRestored = true; }
      setMsg(`Imported ${newIndex.length} sets.${keyRestored ? " API key restored." : ""}`);
    } catch (e) { setMsg(`Import failed: ${e.message}`); }
  }

  function wipe() {
    for (const e of index) del(`bt:set:${e.setNum}`);
    for (const k of [...cache.keys()]) if (k.startsWith("bt:photo:") || k.startsWith("bt:pdf:")) del(k);
    del("bt:index"); del("bt:buys"); del("bt:buyorder"); del("bt:merch"); del("bt:mocs");
    del("bt:bv:kind"); del("bt:bv:cat"); del("bt:bv:sort");
    del("bt:sv:filter"); del("bt:sv:sort"); del("bt:sv:view"); del("bt:sv:groups");
    del("bt:sv:theme"); del("bt:sv:tgroups"); del("bt:sv:seg"); del("bt:sortTarget");
    persistIndex([]); setBuys([]); saveMerchList?.([]); saveMocs?.([]); setConfirmWipe(false); setMsg("All data wiped.");
  }

  // browser-reported storage usage/quota (IndexedDB included)
  const [est, setEst] = useState(null);
  useEffect(() => { navigator.storage?.estimate?.().then(setEst).catch(() => {}); }, [msg]);
  const mb = n => (n / 1024 / 1024).toFixed(1);

  return html`<div>
    <${Header} title="Settings" />

    <${Section} title=${`Currency · ${currency} (${CUR_SYM[currency]})`}>
      <select value=${currency} onChange=${e => setCurrency(e.target.value)}>
        ${CURRENCIES.map(c => html`<option value=${c}>${c} (${CUR_SYM[c]})</option>`)}
      </select>
      <div class="dim" style="font-size:12px;margin-top:8px">Symbol only — no conversion. Proper multi-currency comes in the native app.</div>
    </${Section}>

    <${Section} title=${`Completion % · spares ${countSp ? "counted" : "excluded"}`}>
      <div class="row" style="justify-content:space-between;gap:10px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">Count spare parts in completion %</div>
          <div class="dim" style="font-size:12px;margin-top:3px">Off by default — spares are extras, so a set reads 100% without them. Brick separators are always excluded.</div>
        </div>
        <button class="chip" style=${`flex-shrink:0;border-color:${countSp ? "var(--green)" : "var(--line)"};color:${countSp ? "#1C1A17" : "var(--dim)"};background:${countSp ? "var(--green)" : "transparent"}`}
          onClick=${toggleSpares}>${countSp ? "On" : "Off"}</button>
      </div>
    </${Section}>

    <${Section} title="Set cards (new sets)">
      <div class="row" style="justify-content:space-between;gap:10px;margin-bottom:10px">
        <div style="flex:1"><div style="font-size:14px;font-weight:600">Show completion % on new-set cards</div>
          <div class="dim" style="font-size:12px;margin-top:3px">New sets are complete by definition — hidden by default to cut noise.</div></div>
        <button class="chip" style=${`flex-shrink:0;border-color:${cardPct ? "var(--green)" : "var(--line)"};color:${cardPct ? "#1C1A17" : "var(--dim)"};background:${cardPct ? "var(--green)" : "transparent"}`}
          onClick=${() => { const v = !cardPct; setCardPct(v); save("bt:cardNewPct", v); }}>${cardPct ? "On" : "Off"}</button>
      </div>
      <div class="row" style="justify-content:space-between;gap:10px">
        <div style="flex:1"><div style="font-size:14px;font-weight:600">Show triage on new-set cards</div></div>
        <button class="chip" style=${`flex-shrink:0;border-color:${cardTri ? "var(--green)" : "var(--line)"};color:${cardTri ? "#1C1A17" : "var(--dim)"};background:${cardTri ? "var(--green)" : "transparent"}`}
          onClick=${() => { const v = !cardTri; setCardTri(v); save("bt:cardNewTriage", v); }}>${cardTri ? "On" : "Off"}</button>
      </div>
    </${Section}>

    <${Section} title=${`Buy channels · ${cats.length}`}>
      ${cats.length === 0 && html`<div class="dim" style="font-size:13px;margin-bottom:8px">No channels yet.</div>`}
      ${cats.map(c => html`<div class="row" style="margin-bottom:8px" key=${c}>
        <div class="ellip" style="flex:1;font-size:14px">${c}</div>
        <button class="step" style="width:38px;height:38px;font-size:14px" onClick=${() => {
          const n = prompt("Rename channel", c);
          if (n && n.trim() && n.trim() !== c) renameCat(c, n.trim());
        }}>✎</button>
        <button class="step" style="width:38px;height:38px;font-size:14px;color:var(--red);border-color:var(--red)"
          onClick=${() => { if (confirm(`Delete channel "${c}"? Buys using it lose their channel.`)) delCat(c); }}>✕</button>
      </div>`)}
      <div class="row" style="gap:8px;margin-top:4px">
        <input placeholder="New channel" value=${newCat} onInput=${e => setNewCat(e.target.value)} />
        <button class="step plus" style="width:54px" disabled=${!newCat.trim()}
          onClick=${() => { addCat(newCat); setNewCat(""); }}>+</button>
      </div>
      <div class="dim" style="font-size:12px;margin-top:8px">Renames update every buy using the channel. (Kind = Bulk/Regular/No Buy; channel = where you bought.)</div>
    </${Section}>

    <${Section} title="Rebrickable API key">
      <input type="password" autocomplete="off" value=${key} placeholder="Stored in this browser only"
        onInput=${e => onKey(e.target.value)} />
      ${saved && html`<div style="font-size:12px;color:var(--green);margin-top:6px">Saved</div>`}
      <div class="dim" style="font-size:12px;margin-top:8px">Sent only to rebrickable.com as the Authorization header. Never leaves this device otherwise.</div>
    </${Section}>

    <${Section} title="Backup / transfer">
      <button class="ghost" onClick=${doExport}>Download backup JSON</button>
      <div style="height:8px"></div>
      <input ref=${importRef} type="file" accept=".json,application/json" style="display:none"
        onChange=${e => { const f = e.target.files?.[0]; if (f) doImport(f); e.target.value = ""; }} />
      <button class="ghost" onClick=${() => importRef.current?.click()}>Restore from backup (replaces data)</button>
      <div class="dim" style="font-size:12px;margin-top:10px">
        Data lives in IndexedDB in this browser. Safari can still evict storage for sites unused ~7 days —
        Add to Home Screen and regular use protects it; back up after big sorting sessions anyway.
        The backup file includes your API key, so restoring it also restores the key — keep backup files private.
        ${est ? `Used: ~${mb(est.usage)} MB of ~${mb(est.quota)} MB available.` : ""}
      </div>
    </${Section}>

    <${Section} title="Danger zone">
      ${!confirmWipe
        ? html`<button class="ghost" style="color:var(--red);border-color:var(--red)" onClick=${() => setConfirmWipe(true)}>Wipe all data…</button>`
        : html`<button class="btn red" onClick=${wipe}>Tap again to wipe everything</button>`}
    </${Section}>

    ${msg && html`<div class="card" style="font-size:13px;color:var(--yellow)">${msg}</div>`}

    <${Section} title=${`Version & changelog · v${APP_VERSION}`}>
      ${CHANGELOG.map(([v, date, items]) => html`<div style="margin-bottom:12px" key=${v}>
        <div class="mono" style="font-size:12px;font-weight:700;color:var(--yellow)">v${v} <span class="dim" style="font-weight:400">· ${date}</span></div>
        ${items.map(i => html`<div class="dim" style="font-size:12px;line-height:1.45;margin-top:3px">— ${i}</div>`)}
      </div>`)}
    </${Section}>

    <div class="dim mono" style="font-size:11px;text-align:center;margin-top:8px;padding-bottom:16px">
      BrickTriage v${APP_VERSION} · Phase 0 / Plan C · direct fetch (Rebrickable + Brickognize, CORS verified 2026-06-11)
    </div>
  </div>`;
}

// Standalone iOS can serve stale CSS viewport units (100%/dvh) — size the app from the
// real runtime height instead. #8: when the soft keyboard opens, visualViewport shrinks
// while window.innerHeight does NOT, so a field in the main content (notes, merch qty, etc.)
// stays hidden behind the keyboard. Size #app to the visual viewport whenever the keyboard
// is open, otherwise to window.innerHeight (the standalone-stale-units fix).
function vph() { return window.visualViewport ? window.visualViewport.height : window.innerHeight; }
function kbOpen() { var vv = window.visualViewport; return !!vv && (window.innerHeight - vv.height) > 120; }
function fitApp() {
  var a = document.getElementById("app");
  if (!a) return;
  var h = kbOpen() ? vph() : (window.innerHeight || vph());
  if (h > 0) a.style.height = h + "px";
}
// Pin open .modal layers (bottom sheets) to the VISUAL viewport so their fields stay above the
// keyboard. Critical: also follow visualViewport.offsetTop/offsetLeft — when iOS opens the keyboard
// it shifts the visual viewport down (offsetTop > 0) while a position:fixed sheet stays anchored to
// the layout-viewport top, which pushes the sheet up off-screen and reveals the app/tab-bar behind
// it (the merch-edit bug). Tracking the offset keeps the sheet aligned to what's actually visible.
function fitModals() {
  var v = window.visualViewport;
  var top = v ? v.offsetTop : 0;
  var left = v ? v.offsetLeft : 0;
  var h = v ? v.height : window.innerHeight;
  var ms = document.getElementsByClassName("modal");
  for (var i = 0; i < ms.length; i++) {
    ms[i].style.top = top + "px";
    ms[i].style.left = left + "px";
    ms[i].style.height = h + "px";
  }
}
function fitAll() { fitApp(); fitModals(); }
addEventListener("resize", fitAll);
addEventListener("orientationchange", fitAll);
addEventListener("pageshow", fitAll);
window.visualViewport?.addEventListener("resize", fitAll);
window.visualViewport?.addEventListener("scroll", fitAll);
// Bring the focused field into view above the keyboard — anywhere in the app, not just sheets.
addEventListener("focusin", function (e) {
  var t = e.target;
  if (!t || !t.matches || !t.matches("input, textarea, select")) return;
  fitAll();
  setTimeout(function () { try { t.scrollIntoView({ block: "center", behavior: "smooth" }); } catch (_) {} }, 250);
});

(async () => {
  try { await initStorage(); }
  catch (e) { alert("Storage init failed — running without persistence this session: " + (e?.message || e)); }
  fitApp();
  render(html`<${App} />`, document.getElementById("app"));
  window.__btRendered = true;
  setTimeout(fitApp, 300); // late viewport settle in standalone
})();
</script>
