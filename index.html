// ---------- WTB (want-to-buy) ŌĆö named lists, optionally linked to a Set or MOC ----------
// Migrates the old flat bt:wtb array into one "General" list the first time.
function loadWtbLists() {
  const v = load("bt:wtbLists", null);
  if (v) return v;
  const old = load("bt:wtb", []);
  const migrated = old.length ? [{ id: "wtb-general", name: "General", linkType: null, linkId: null, dateAdded: Date.now(),
    parts: old.map(w => ({ id: w.id || ("p" + Math.random().toString(36).slice(2, 8)), partNum: w.partNum || "", name: "", colorName: w.colorName || "", qty: w.qty || 1, got: !!w.got, note: w.note || "" })) }] : [];
  if (migrated.length) save("bt:wtbLists", migrated);
  return migrated;
}
const wtbStats = list => {
  let open = 0, gotPcs = 0, totalPcs = 0; const parts = list.parts || [];
  for (const p of parts) { const qty = p.qty || 1; const have = Math.min(p.have != null ? p.have : (p.got ? qty : 0), qty); if (have < qty) open++; gotPcs += have; totalPcs += qty; }
  return { open, total: parts.length, gotPcs, totalPcs, pct: totalPcs ? Math.round(gotPcs / totalPcs * 100) : 0 };
};
const wtbSyncMode = () => load("bt:wtbSync", "ask"); // manual | ask | auto
const newWtbPart = p => ({ id: "p" + Date.now() + Math.random().toString(36).slice(2, 6), got: false, name: "", colorName: "", note: "", qty: 1, ...p });

// WTB add flow ŌĆö find a part by scanning, typing a part number, or searching Rebrickable by
// description, then pick colour + qty (+ optional "For" link) before adding. Replaces the old
// blind type-it-in form so wanted parts arrive with a real name, picture and matching colour.
function WtbAddPart({ onAdd, linkTargets }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [busy, setBusy] = useState(false);
  const [res, setRes] = useState(null);
  const [msg, setMsg] = useState("");
  const [scan, setScan] = useState(false);
  const [chosen, setChosen] = useState(null); // a picked part ŌåÆ opens the colour/qty sheet
  const search = async () => {
    const ql = q.trim();
    if (!ql) return;
    if (!getKey().trim()) { setMsg("Add your Rebrickable key in Settings first."); return; }
    setBusy(true); setMsg(""); setRes(null);
    try {
      // a bare part number resolves directly (also catches printed/BrickLink ids); otherwise search by text
      let results = [];
      if (/^[A-Za-z0-9.\-]+$/.test(ql) && /\d/.test(ql)) { const p = await resolveRbPart(ql); if (p) results = [p]; }
      if (!results.length) { const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/?search=${encodeURIComponent(ql)}&page_size=24`); results = j.results || []; }
      setRes(results);
      if (!results.length) setMsg("No parts matched.");
    } catch (e) { setMsg(e.message || "Search failed."); }
    setBusy(false);
  };
  const choose = p => { setChosen({ partNum: p.part_num, name: p.name, img: p.part_img_url, qty: 1 }); };
  const reset = () => { setChosen(null); setRes(null); setQ(""); setMsg(""); setOpen(false); };
  return html`<div class="card" style="padding:12px">
    ${!open
      ? html`<button class="btn" onClick=${() => setOpen(true)}>+ Add a part</button>`
      : html`<div>
        <${Label}>Find a part ŌĆö scan, part #, or description</${Label}>
        <div class="row" style="gap:6px">
          <input style="flex:1" placeholder="e.g. 3001 or 'plate 1x2'" value=${q}
            onInput=${e => setQ(e.target.value)} onKeyDown=${e => { if (e.key === "Enter") search(); }} />
          <button class="step" style="width:auto;padding:0 12px;font-size:13px" disabled=${busy || !q.trim()} onClick=${search}>${busy ? "ŌĆ”" : "Search"}</button>
          <button class="step" style="width:44px" title="Scan" onClick=${() => setScan(true)}>­¤ōĘ</button>
        </div>
        ${msg && html`<div class="dim" style="font-size:12px;margin-top:6px">${msg}</div>`}
        ${res && res.length > 0 && html`<div style="margin-top:8px;max-height:300px;overflow:auto">
          ${res.map(p => html`<div key=${p.part_num} class="row" style="gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:5px">
            <${Thumb} src=${p.part_img_url} size=${34} />
            <div style="flex:1;min-width:0">
              <div class="clamp2" style="font-size:13px;font-weight:600;line-height:1.2">${p.name}</div>
              <div class="dim mono" style="font-size:11px">${p.part_num}</div>
            </div>
            <button class="step plus" style="width:40px" onClick=${() => choose(p)}>+</button>
          </div>`)}
        </div>`}
        <button class="ghost" style="margin-top:8px;padding:8px" onClick=${reset}>Cancel</button>
      </div>`}
    ${scan && html`<${ScanModal} hint="Scan a part to want" onClose=${() => setScan(false)}
      onPick=${it => { setScan(false); choose({ part_num: it.id, name: it.name, part_img_url: it.img_url }); }} />`}
    ${chosen && html`<${PartColorQtySheet} part=${chosen} title="Add to want list" linkTargets=${linkTargets}
      onClose=${() => setChosen(null)}
      onSave=${patch => { onAdd({ partNum: chosen.partNum, name: chosen.name, ...patch }); reset(); }} />`}
  </div>`;
}

// Add / edit one loose part on a Loose / PAB buy. Find the part by ­¤ōĘ scan, part number, or
// Rebrickable description search (the want-list finder), optionally pick its colour, then record
// qty (plain text box ŌĆö no stepper), price paid, and any per-part shipping. Shows the live unit
// price = (price + shipping) ├Ę qty so per-piece cost is comparable across sellers.
function LoosePartSheet({ initial, onSave, onDelete, onClose }) {
  const editing = !!(initial && initial.partNum);
  const [chosen, setChosen] = useState(editing ? initial : null);
  // finder
  const [q, setQ] = useState("");
  const [busy, setBusy] = useState(false);
  const [res, setRes] = useState(null);
  const [msg, setMsg] = useState("");
  const [scan, setScan] = useState(false);
  // fields
  const [qty, setQty] = useState(String(initial?.qty || 1));
  const [price, setPrice] = useState(initial?.pricePaid ? String(initial.pricePaid) : "");
  const [ship, setShip] = useState(initial?.shipping ? String(initial.shipping) : "");
  // colour (optional, lazy-loaded once a part is chosen)
  const [colors, setColors] = useState(null);
  const [colBusy, setColBusy] = useState(false);
  const [sel, setSel] = useState({ colorName: initial?.colorName || "", rbColorId: initial?.rbColorId ?? null, img: initial?.img || null });

  const loadColors = async pn => {
    if (!getKey().trim()) { setColors([]); return; }
    setColBusy(true);
    try { setColors(await fetchPartColors(pn)); } catch (e) { setColors([]); }
    setColBusy(false);
  };
  useEffect(() => { if (editing && chosen?.partNum) loadColors(chosen.partNum); }, []);

  const search = async () => {
    const ql = q.trim();
    if (!ql) return;
    if (!getKey().trim()) { setMsg("Add your Rebrickable key in Settings first."); return; }
    setBusy(true); setMsg(""); setRes(null);
    try {
      let results = [];
      if (/^[A-Za-z0-9.\-]+$/.test(ql) && /\d/.test(ql)) { const p = await resolveRbPart(ql); if (p) results = [p]; }
      if (!results.length) { const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/?search=${encodeURIComponent(ql)}&page_size=24`); results = j.results || []; }
      setRes(results);
      if (!results.length) setMsg("No parts matched.");
    } catch (e) { setMsg(e.message || "Search failed."); }
    setBusy(false);
  };
  const choose = p => {
    setChosen({ partNum: p.part_num, name: p.name, img: p.part_img_url });
    setSel({ colorName: "", rbColorId: null, img: p.part_img_url || null });
    setColors(null); loadColors(p.part_num);
  };

  const n = Math.max(1, parseInt(qty) || 1);
  const unit = ((parseFloat(price) || 0) + (parseFloat(ship) || 0)) / n;
  const save = () => onSave({
    id: initial?.id || `${Date.now()}${Math.random().toString(36).slice(2, 6)}`,
    partNum: chosen.partNum, name: chosen.name,
    colorName: sel.colorName, rbColorId: sel.rbColorId, img: sel.img || chosen.img || null,
    qty: n, pricePaid: parseFloat(price) || 0, shipping: parseFloat(ship) || 0,
  });

  return html`<${Portal}><div class="modal" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
    <div class="sheet">
      <${Header} title=${editing ? "Edit part" : "Add loose part"}
        sub=${chosen ? `${chosen.name || chosen.partNum} ┬Ę ${chosen.partNum}` : "PAB / AliExpress part"} onBack=${onClose} />
      ${!chosen ? html`<div>
        <${Label}>Find a part ŌĆö scan, part #, or description</${Label}>
        <div class="row" style="gap:6px">
          <input style="flex:1" placeholder="e.g. 3001 or 'plate 1x2'" value=${q}
            onInput=${e => setQ(e.target.value)} onKeyDown=${e => { if (e.key === "Enter") search(); }} />
          <button class="step" style="width:auto;padding:0 12px;font-size:13px" disabled=${busy || !q.trim()} onClick=${search}>${busy ? "ŌĆ”" : "Search"}</button>
          <button class="step" style="width:44px" title="Scan" onClick=${() => setScan(true)}>­¤ōĘ</button>
        </div>
        ${msg && html`<div class="dim" style="font-size:12px;margin-top:6px">${msg}</div>`}
        ${res && res.length > 0 && html`<div style="margin-top:8px;max-height:340px;overflow:auto">
          ${res.map(p => html`<div key=${p.part_num} class="row" style="gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:5px">
            <${Thumb} src=${p.part_img_url} size=${34} />
            <div style="flex:1;min-width:0">
              <div class="clamp2" style="font-size:13px;font-weight:600;line-height:1.2">${p.name}</div>
              <div class="dim mono" style="font-size:11px">${p.part_num}</div>
            </div>
            <button class="step plus" style="width:40px" onClick=${() => choose(p)}>+</button>
          </div>`)}
        </div>`}
        <button class="ghost" style="margin-top:10px" onClick=${onClose}>Cancel</button>
      </div>` : html`<div>
        <div class="row" style="gap:8px;margin-bottom:14px;align-items:center">
          <${Thumb} src=${sel.img || chosen.img} size=${46} />
          <div style="flex:1;min-width:0">
            <div class="clamp2" style="font-weight:700;font-size:14px;line-height:1.2">${chosen.name || chosen.partNum}</div>
            <div class="dim mono" style="font-size:11px">${chosen.partNum}${sel.colorName ? ` ┬Ę ${sel.colorName}` : ""}</div>
          </div>
          ${!editing && html`<button class="ghost" style="width:auto;padding:8px 10px;font-size:12px" onClick=${() => { setChosen(null); setRes(null); setColors(null); }}>Change</button>`}
        </div>

        <${Label}>Quantity</${Label}>
        <input inputmode="numeric" style="margin-bottom:14px" placeholder="How many"
          value=${qty} onInput=${e => setQty(e.target.value.replace(/[^0-9]/g, ""))} />

        <div class="row" style="gap:8px;margin-bottom:6px">
          <div style="flex:1">
            <${Label}>Price paid</${Label}>
            <input inputmode="decimal" placeholder=${curSym() + "0.00"} value=${price} onInput=${e => setPrice(e.target.value)} />
          </div>
          <div style="flex:1">
            <${Label}>Part shipping</${Label}>
            <input inputmode="decimal" placeholder="optional" value=${ship} onInput=${e => setShip(e.target.value)} />
          </div>
        </div>

        <div class="card" style="padding:11px 13px;margin:8px 0 14px;display:flex;justify-content:space-between;align-items:center">
          <span class="dim" style="font-size:13px">Unit price ┬Ę (price${parseFloat(ship) ? " + shipping" : ""}) ├Ę ${n}</span>
          <span class="mono" style="font-weight:800;color:var(--green)">${money(unit)}</span>
        </div>

        <${Label}>Colour ŌĆö optional${sel.colorName ? ` ┬Ę ${sel.colorName}` : ""}</${Label}>
        ${colBusy && html`<div class="dim" style="font-size:12px;padding:8px 2px">Loading coloursŌĆ”</div>`}
        ${colors && colors.length > 0 && html`<div style="max-height:200px;overflow:auto;margin-bottom:8px">
          ${colors.map(c => { const on = String(c.color_id) === String(sel.rbColorId);
            return html`<button key=${c.color_id} class="row" onClick=${() => setSel({ colorName: c.color_name, rbColorId: c.color_id, img: c.part_img_url || null })}
              style=${`width:100%;gap:8px;background:var(--panel);border:1px solid ${on ? "var(--blue)" : "var(--line)"};border-radius:10px;padding:6px 8px;margin-bottom:5px;color:var(--text);text-align:left`}>
              <${Thumb} src=${c.part_img_url} size=${30} />
              <div style="flex:1;min-width:0"><div class="ellip" style="font-size:13px;font-weight:600">${c.color_name}</div></div>
              ${on && html`<span style="color:var(--blue);font-weight:800;flex-shrink:0">Ō£ō</span>`}
            </button>`; })}
        </div>`}
        ${colors && colors.length === 0 && !colBusy && html`<div class="dim" style="font-size:12px;margin-bottom:8px">No colours${getKey().trim() ? " listed for this part on Rebrickable" : " ŌĆö add your Rebrickable key in Settings"}.</div>`}

        <div class="row" style="gap:8px;margin-top:8px">
          <button class="btn" style="flex:2" onClick=${save}>${editing ? "Save" : "Add part"}</button>
          ${editing && onDelete && html`<button class="ghost" style="flex:1;color:var(--red)" onClick=${onDelete}>Delete</button>`}
          <button class="ghost" style="flex:1" onClick=${onClose}>Cancel</button>
        </div>
      </div>`}
    </div>
    ${scan && html`<${ScanModal} hint="Scan a loose part" onClose=${() => setScan(false)}
      onPick=${it => { setScan(false); choose({ part_num: it.id, name: it.name, part_img_url: it.img_url }); }} />`}
  </div></${Portal}>`;
}

// WTB list detail ŌĆö split into "To Get" (still short) and "Got It" (have Ōēź qty) collapsible
// sections, each colour-grouped with thumbnails. Per-row: typeable got-qty, swipe Edit (colour/qty/
// For) + Delete, tap thumbnail to enlarge, tap name to toggle got (moves the part between sections).
function WtbListDetail({ list, info, mocs = [], index = [], tags = [], createTag, onSetHave, onUpdate, syncMode, onDelete, onOpenLink, onBack }) {
  const [renaming, setRenaming] = useState(false);
  const [name, setName] = useState(list.name || "");
  const [confirmDel, setConfirmDel] = useState(false);
  const [open, setOpen] = useState(() => new Set());
  // set-style parts filter (mirrors the set parts list): text filter, hide-purchased, group by
  // colour Ōåö part type, expand/collapse all, reset filter.
  const [q, setQ] = useState("");
  const [hideGot, setHideGot] = useState(false);
  const [groupMode, setGroupModeRaw] = useState(() => load("bt:wtbpartgroup", "color")); // color | type
  const setGroupMode = v => { setGroupModeRaw(v); save("bt:wtbpartgroup", v); };
  const [viewPart, setViewPart] = useState(null); // tap thumbnail ŌåÆ enlarge
  const [editPart, setEditPart] = useState(null);  // swipe Edit ŌåÆ colour/qty/For sheet
  const [imgBusy, setImgBusy] = useState(false);
  const [imgMsg, setImgMsg] = useState("");
  const toggle = g => setOpen(prev => { const n = new Set(prev); n.has(g) ? n.delete(g) : n.add(g); return n; });
  const parts = list.parts || [];
  const haveOf = p => p.have != null ? p.have : (p.got ? (p.qty || 1) : 0);
  const s = wtbStats(list);
  const addPart = p => onUpdate({ ...list, parts: [newWtbPart(p), ...parts] });
  const delPart = id => onUpdate({ ...list, parts: parts.filter(p => p.id !== id) });
  const patchPart = (id, patch) => onUpdate({ ...list, parts: parts.map(p => p.id === id ? { ...p, ...patch } : p) });
  const imgFor = p => p.img || blPartImg(p.partNum, p.blColorId);
  // per-part "For" destination (item 8) ŌĆö optional MOC/set this part is destined for
  const linkTargets = [
    ...[...mocs].sort((a, b) => (a.name || "").localeCompare(b.name || "")).map(m => ({ type: "moc", id: m.id, label: `­¤¦® ${m.name}` })),
    ...[...index].sort((a, b) => (a.name || "").localeCompare(b.name || "")).map(e => ({ type: "set", id: e.setNum, label: `­¤¦▒ ${e.name}` })),
  ];
  const forLabel = p => {
    if (p.forType === "moc") { const m = mocs.find(x => x.id === p.forId); return m ? `­¤¦® ${m.name}` : null; }
    if (p.forType === "set") { const e = index.find(x => x.setNum === p.forId); return e ? `­¤¦▒ ${e.name}` : null; }
    return null;
  };
  // pull colour-correct Rebrickable images for any line missing one (item 4). `silent` = auto-run
  // on open (no toast / no "key first" nag ŌĆö just fill what it can in the background).
  const getImages = async (silent = false) => {
    if (!getKey().trim()) { if (!silent) { setImgMsg("Add your Rebrickable key in Settings first."); setTimeout(() => setImgMsg(""), 3500); } return; }
    setImgBusy(true);
    const next = [...parts]; let changed = 0;
    for (let i = 0; i < next.length; i++) { const p = next[i]; if (p.img || !p.partNum) continue;
      try {
        if (p.colorName || p.rbColorId != null) { const ci = await colorImgFor(p.partNum, { rbColorId: p.rbColorId, colorName: p.colorName });
          if (ci?.img) { next[i] = { ...p, img: ci.img, rbColorId: ci.rbColorId, colorName: ci.colorName || p.colorName }; changed++; continue; } }
        const r = await resolveRbPart(p.partNum); if (r?.part_img_url) { next[i] = { ...p, img: r.part_img_url, name: p.name || r.name }; changed++; }
      } catch {}
    }
    if (changed) onUpdate({ ...list, parts: next });
    setImgBusy(false);
    if (!silent) { setImgMsg(changed ? `Fetched ${changed} image${changed === 1 ? "" : "s"}.` : "No new images found."); setTimeout(() => setImgMsg(""), 3500); }
  };
  // Auto-fetch missing images when the list opens ŌĆö same effect as a set's parts (whose images come
  // free with the inventory). Runs once per list (a ref guards against the onUpdate re-render loop),
  // only when a key is set and something is actually missing an image.
  const autoImgDone = useRef("");
  useEffect(() => {
    if (autoImgDone.current === list.id) return;
    if (!getKey().trim()) return;
    if (!parts.some(p => !p.img && p.partNum)) return;
    autoImgDone.current = list.id;
    getImages(true);
  }, [list.id, parts]);
  // one part row ŌĆö same look as a set's parts list (PartRow): tappable thumbnail to enlarge, tap the
  // name area to toggle got full/none, horizontal ŌłÆ / got/needed / + stepper, green border + dimmed
  // when complete. Swipe left for Edit (colour/qty/For) + Delete.
  const renderRow = p => {
    const qty = p.qty || 1, have = Math.min(haveOf(p), qty), done = have >= qty, fl = forLabel(p);
    const border = done ? "var(--green)" : "var(--line)";
    return html`<${SwipeRow} key=${p.id} onEdit=${() => setEditPart(p)} onDelete=${() => delPart(p.id)}>
      <div class="row" style=${`gap:6px;background:var(--panel);border:1px solid ${border};border-radius:12px;padding:8px 10px;opacity:${done ? .65 : 1}`}>
        <span style="flex-shrink:0;cursor:pointer" onClick=${() => setViewPart({ img: imgFor(p), partName: p.name || p.partNum, partNumber: p.partNum, colorName: p.colorName || "" })}>
          <${Thumb} src=${imgFor(p)} size=${40} />
        </span>
        <div style="flex:1;min-width:0;cursor:pointer" onClick=${() => onSetHave(list, p, done ? 0 : qty)}>
          <div class="clamp2" style="font-size:13px;line-height:1.25">${p.name || p.partNum || "(part)"}</div>
          <div class="dim mono" style="font-size:11px">${p.colorName || "ŌĆö"} ┬Ę ${p.partNum || "?"}${p.note ? ` ┬Ę ${p.note}` : ""}</div>
          ${fl && html`<div style="margin-top:3px"><span class="badge" style="font-size:10px;color:var(--blue);border:1px solid var(--blue)">For: ${fl}</span></div>`}
          ${(() => { const pt = resolveTags(tags, partTagIds(p.partNum)); return pt.length ? html`<div style="margin-top:3px"><${TagChips} tags=${pt} small /></div>` : null; })()}
        </div>
        <button class="step" style="width:34px" disabled=${have === 0} onClick=${() => onSetHave(list, p, have - 1)}>ŌłÆ</button>
        <div class="mono" style=${`font-size:14px;font-weight:700;min-width:38px;text-align:center;color:${done ? "var(--green)" : "var(--text)"}`}>${have}/${qty}</div>
        <button class="step plus" style="width:34px" disabled=${done} onClick=${() => onSetHave(list, p, have + 1)}>+</button>
      </div>
    </${SwipeRow}>`;
  };
  // set-style filter + grouping: text filter (name/number/colour), optional hide-purchased, then
  // bucket by colour or part type. Typing in the filter auto-expands every group (like the set list).
  const ql = q.trim().toLowerCase();
  const visible = parts.filter(p =>
    (!hideGot || haveOf(p) < (p.qty || 1)) &&
    (!ql || (p.name || "").toLowerCase().includes(ql) || (p.partNum || "").toLowerCase().includes(ql) || (p.colorName || "").toLowerCase().includes(ql)));
  const groups = (() => {
    const m = new Map();
    for (const p of visible) { const g = groupMode === "type" ? partType(p.name, p.partNum) : colorGroup(p.colorName); if (!m.has(g)) m.set(g, []); m.get(g).push(p); }
    const rank = groupMode === "type" ? typeRank : groupRank;
    return [...m.entries()].sort((a, b) => rank(a[0]).localeCompare(rank(b[0])));
  })();
  const allOpen = groups.length > 0 && groups.every(([g]) => open.has(g));
  const toggleAll = () => setOpen(allOpen ? new Set() : new Set(groups.map(([g]) => g)));
  const resetFilter = () => { setQ(""); setHideGot(false); };
  const gotCount = parts.filter(p => haveOf(p) >= (p.qty || 1)).length;
  const renderGroups = entries => entries.map(([g, gi]) => {
    const gOpen = ql.length > 0 || open.has(g);
    const gHave = gi.reduce((a, p) => a + Math.min(haveOf(p), p.qty || 1), 0);
    const gNeed = gi.reduce((a, p) => a + (p.qty || 1), 0);
    return html`<div key=${g} style="margin-bottom:6px">
      <button class="row" onClick=${() => toggle(g)}
        style="width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--text);justify-content:space-between">
        <span class="label" style="margin:0">${g} ┬Ę ${gi.length}</span>
        <span class="row" style="gap:10px">
          <span class="mono" style=${`font-size:12px;font-weight:700;color:${gHave >= gNeed ? "var(--green)" : "var(--dim)"}`}>${gHave}/${gNeed}</span>
          <span class="dim">${gOpen ? "Ō¢Š" : "Ō¢Ė"}</span>
        </span>
      </button>
      ${gOpen && html`<div style="margin-top:6px">${gi.map(renderRow)}</div>`}
    </div>`;
  });
  return html`<div class="navin" key="wtb-detail">
    <${Header} title=${list.name || "Want list"} sub=${`${s.open} to get ┬Ę ${s.total} parts ┬Ę ${s.pct}% got`} onBack=${onBack}
      right=${html`<button class="step" style="width:40px" onClick=${() => setRenaming(v => !v)}>Ō£Å’ĖÅ</button>`} />
    ${renaming && html`<div class="card"><div class="row" style="gap:8px">
      <input value=${name} onInput=${e => setName(e.target.value)} />
      <button class="step plus" style="width:54px" disabled=${!name.trim()} onClick=${() => { onUpdate({ ...list, name: name.trim() }); setRenaming(false); }}>Ō£ō</button>
    </div></div>`}
    ${info.kind && html`<div class="card row" style="gap:10px;align-items:center">
      <div style="flex:1;min-width:0"><div class="label" style="margin:0">Linked to</div><div class="ellip" style="font-weight:700">${info.label}</div></div>
      ${info.ok && html`<button class="ghost" style="width:auto;padding:8px 12px" onClick=${onOpenLink}>Open ŌåŚ</button>`}
    </div>`}
    ${info.kind === "set" && html`<div class="dim" style="font-size:12px;margin:0 2px 10px">Completing a part (have = qty) ${syncMode === "auto" ? "also marks it found in the linked set" : syncMode === "ask" ? "asks whether to also mark it found in the linked set" : "just marks it off here (sync off ŌĆö change in Settings)"}.</div>`}
    <${WtbAddPart} onAdd=${addPart} linkTargets=${linkTargets} />
    ${parts.length > 0 && parts.some(p => !p.img) && html`<button class="ghost" style="margin-top:8px;padding:9px" disabled=${imgBusy} onClick=${() => getImages()}>${imgBusy ? "Fetching imagesŌĆ”" : "­¤¢╝ Get part images"}</button>`}
    ${imgMsg && html`<div class="dim" style="font-size:12px;margin-top:4px">${imgMsg}</div>`}
    <div style="height:12px"></div>
    ${parts.length === 0 && html`<div class="card dim" style="text-align:center;padding:20px">No parts yet ŌĆö add above, or push a set/MOC's shortfall from its detail page.</div>`}
    ${parts.length > 0 && html`<div class="card" style="padding:12px">
      <input placeholder="Filter parts (name / number / colour)" value=${q} onInput=${e => setQ(e.target.value)} />
      <div class="row" style="gap:6px;margin-top:10px;flex-wrap:wrap">
        <${Chip} label="Hide purchased" color="var(--green)" active=${hideGot} onClick=${() => setHideGot(v => !v)} />
        <${Chip} label=${groupMode === "type" ? "Group: Part" : "Group: Colour"} color="var(--blue)" active
          onClick=${() => setGroupMode(groupMode === "type" ? "color" : "type")} />
        <${Chip} label=${allOpen ? "Ōīā All" : "Ōīä All"} color="var(--dim)" active=${false} onClick=${toggleAll} />
        <${Chip} label="Ōå║ Reset filter" color="var(--red)" active=${false} onClick=${resetFilter} />
      </div>
    </div>`}
    ${parts.length > 0 && groups.length === 0 && html`<div class="card dim" style="text-align:center;padding:16px;font-size:13px">No parts match the filter.</div>`}
    ${parts.length > 0 && renderGroups(groups)}
    ${gotCount > 0 && html`<button class="ghost" style="margin-top:4px" onClick=${() => { if (confirm("Remove all purchased parts from this list?")) onUpdate({ ...list, parts: parts.filter(p => haveOf(p) < (p.qty || 1)) }); }}>Clear purchased (${gotCount})</button>`}
    <div style="height:12px"></div>
    ${!confirmDel
      ? html`<button class="ghost" style="color:var(--red);border-color:var(--red)" onClick=${() => setConfirmDel(true)}>Delete listŌĆ”</button>`
      : html`<div class="row" style="gap:8px"><button class="ghost" style="flex:1" onClick=${() => setConfirmDel(false)}>Cancel</button><button class="btn red" style="flex:2" onClick=${onDelete}>Delete list permanently</button></div>`}
    <div style="height:16px"></div>
    ${viewPart && html`<${PartImgViewer} p=${viewPart} tags=${tags} createTag=${createTag} onClose=${() => setViewPart(null)} />`}
    ${editPart && html`<${PartColorQtySheet} part=${editPart} title="Edit part" linkTargets=${linkTargets}
      onClose=${() => setEditPart(null)}
      onSave=${patch => { patchPart(editPart.id, patch); setEditPart(null); }} />`}
  </div>`;
}

function SetsList({ index, buys, cats, addBuy, persistSet, merch, upsertMerch, deleteMerch, openMerchId, setOpenMerchId, mocs = [], upsertMoc, allocBySet, onOpenMoc, wtbLists = [], saveWtbLists, upsertWtbList, tags = [], createTag, onOpen, onAdd }) {
  const [tagM, setTagMRaw] = useState(() => load("bt:sv:tagM", [])); // tag-id filter (sets segment); empty = all
  const setTagM = v => { setTagMRaw(v); save("bt:sv:tagM", v); };
  const toggleTagM = id => setTagM(tagM.includes(id) ? tagM.filter(x => x !== id) : [...tagM, id]);
  const [newMoc, setNewMoc] = useState(false);
  const [openWtbId, setOpenWtbId] = useState(null); // WTB list being viewed
  const [newWtb, setNewWtb] = useState(false);
  const [newWtbName, setNewWtbName] = useState("");
  // #4: remember the list's scroll position so returning from a set/MOC lands where you were
  // (the shared .content scroll is otherwise reset on remount). Stashed on the window across mounts.
  useEffect(() => {
    const restore = window.__btSetsScroll;
    if (typeof restore === "number") requestAnimationFrame(() => { const c = document.querySelector(".content"); if (c) c.scrollTop = restore; });
    return () => { const c = document.querySelector(".content"); if (c) window.__btSetsScroll = c.scrollTop; };
  }, []);
  const [editingMerch, setEditingMerch] = useState(false); // merch edit sheet over the detail page
  // segment: sets | merch
  const [seg, setSegRaw] = useState(() => load("bt:sv:seg", "sets"));
  const setSeg = v => { setSegRaw(v); save("bt:sv:seg", v); };
  // persisted view state
  // triage/theme filters are MULTI-SELECT (v0.21): arrays of included ids; Keep is unticked by default.
  const [filterM, setFilterMRaw] = useState(() => load("bt:sv:filterM", ["undecided", "sell", "partOut"]));
  const [themeM, setThemeMRaw] = useState(() => load("bt:sv:themeM", [])); // empty = all themes
  const setFilterM = v => { setFilterMRaw(v); save("bt:sv:filterM", v); };
  const setThemeM = v => { setThemeMRaw(v); save("bt:sv:themeM", v); };
  const toggleFilter = id => setFilterM(filterM.includes(id) ? filterM.filter(x => x !== id) : [...filterM, id]);
  const toggleTheme = t => setThemeM(themeM.includes(t) ? themeM.filter(x => x !== t) : [...themeM, t]);
  const [sort, setSortRaw] = useState(() => load("bt:sv:sort", "date"));
  const [sortDir, setSortDirRaw] = useState(() => load("bt:sv:sortdir", "desc")); // #8 asc | desc
  const setSortDir = v => { setSortDirRaw(v); save("bt:sv:sortdir", v); };
  const [view, setViewRaw] = useState(() => load("bt:sv:view", "flat")); // flat | bybuy | bytheme
  const [density, setDensityRaw] = useState(() => load("bt:sv:density", "detailed")); // detailed | compact
  const setDensity = v => { setDensityRaw(v); save("bt:sv:density", v); };
  const [expandedIds, setExpandedIds] = useState(() => new Set()); // compact rows expanded in place
  const toggleExpanded = n => setExpandedIds(prev => { const x = new Set(prev); x.has(n) ? x.delete(n) : x.add(n); return x; });
  const [bkind, setBkindRaw] = useState(() => load("bt:sv:bkind", "all")); // by-buy view: bulk | regular | all
  const setBkind = v => { setBkindRaw(v); save("bt:sv:bkind", v); };
  const [buyPick, setBuyPickRaw] = useState(() => load("bt:sv:buypick", "")); // by-buy view: narrow to one specific buy
  const setBuyPick = v => { setBuyPickRaw(v); save("bt:sv:buypick", v); };
  const [openNav, setOpenNav] = useState(null); // null | "triage" | "theme"
  const setSort = v => { const nv = typeof v === "function" ? v(sort) : v; setSortRaw(nv); save("bt:sv:sort", nv); };
  const setView = v => { setViewRaw(v); save("bt:sv:view", v); };
  const [condF, setCondFRaw] = useState(() => load("bt:sv:cond", "all")); // all | new | used (#2)
  const setCondF = v => { setCondFRaw(v); save("bt:sv:cond", v); };
  const [incompleteOnly, setIncRaw] = useState(() => load("bt:sv:incomplete", false));
  const setIncompleteOnly = v => { setIncRaw(v); save("bt:sv:incomplete", v); };
  const [buildingOnly, setBuildingRaw] = useState(() => load("bt:sv:building", false));
  const setBuildingOnly = v => { setBuildingRaw(v); save("bt:sv:building", v); };
  const [openBuyGroups, setOpenBuyGroups] = useState(() => new Set(load("bt:sv:groups", [])));
  const toggleBuyGroup = id => setOpenBuyGroups(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id);
    save("bt:sv:groups", [...n]); return n;
  });
  const [openThemeGroups, setOpenThemeGroups] = useState(() => new Set(load("bt:sv:tgroups", [])));
  const toggleThemeGroup = id => setOpenThemeGroups(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id);
    save("bt:sv:tgroups", [...n]); return n;
  });

  // theme backfill for sets added before v0.16
  const [backfill, setBackfill] = useState("");
  const missingTheme = useMemo(() => index.filter(e => !e.theme), [index]);
  async function fetchThemes() {
    if (!getKey().trim()) { setBackfill("Add your Rebrickable key in Settings first."); return; }
    try {
      const map = await fetchThemesMap();
      let i = 0;
      for (const e of missingTheme) {
        setBackfill(`Fetching themesŌĆ” ${++i}/${missingTheme.length}`);
        const rec = structuredClone(load(`bt:set:${e.setNum}`, null));
        if (!rec) continue;
        const m = await rbFetch(`https://rebrickable.com/api/v3/lego/sets/${e.setNum}/`);
        rec.themeId = m.theme_id;
        rec.theme = rootTheme(map, m.theme_id) || "Other";
        persistSet(rec);
      }
      setBackfill("");
    } catch (e) { setBackfill("Theme fetch failed: " + (e.message || e)); }
  }

  const themeOf = e => e.theme || "No theme";
  const usedThemes = useMemo(() => {
    const m = new Map();
    for (const e of index) { const t = themeOf(e); m.set(t, (m.get(t) || 0) + 1); }
    return [...m.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }, [index]);

  const bestVal = e => Math.max(e.valueSet || 0, e.valuePartOut || 0);
  const allTriage = filterM.length >= TRIAGE.length;
  const shown = useMemo(() => {
    let l = index;
    if (!allTriage) l = l.filter(e => filterM.includes(e.triage));
    if (themeM.length) l = l.filter(e => themeM.includes(themeOf(e)));
    if (condF !== "all") l = l.filter(e => (e.condition === "new" ? "new" : "used") === condF);
    if (incompleteOnly) l = l.filter(e => (e.pct || 0) < 100);
    if (buildingOnly) l = l.filter(e => e.building);
    if (tagM.length) l = l.filter(e => tagM.every(id => (e.tags || []).includes(id)));
    const dir = sortDir === "asc" ? -1 : 1; // base comparators are descending; flip for asc
    return [...l].sort((a, b) => dir * (
      sort === "pct" ? b.pct - a.pct :
      sort === "value" ? bestVal(b) - bestVal(a) :
      b.dateAdded - a.dateAdded));
  }, [index, filterM, themeM, sort, sortDir, allTriage, condF, incompleteOnly, buildingOnly, tagM]);

  // by-buy view (v0.21): groups by CHANNEL ŌĆö all Amazon together, all FB Marketplace togetherŌĆ”
  // A set spanning channels appears under each; unlinked sets under No Buy (All segment only).
  const buyGroups = useMemo(() => {
    if (view !== "bybuy") return [];
    const kindOk = b => bkind === "all" || buyKind(b) === bkind;
    // narrow to a single specific buy (by its name) ŌåÆ one group of just that buy's sets
    if (buyPick) {
      const b = buys.find(x => x.id === buyPick);
      if (!b) return [];
      const sets = shown.filter(e => (e.buyIds || []).includes(buyPick));
      return [{ id: "buy:" + buyPick, label: b.label + (b.category ? ` ┬Ę ${b.category}` : ""), sets }];
    }
    const m = new Map(); // channel -> Map(setNum -> entry)
    for (const e of shown) for (const id of (e.buyIds || [])) {
      const b = buys.find(x => x.id === id);
      if (!b || !kindOk(b)) continue;
      const ch = b.category || "No channel";
      if (!m.has(ch)) m.set(ch, new Map());
      m.get(ch).set(e.setNum, e);
    }
    const gs = [...m.entries()]
      .sort((a, b) => a[0] === "No channel" ? 1 : b[0] === "No channel" ? -1 : a[0].localeCompare(b[0]))
      .map(([ch, sm]) => ({ id: "ch:" + ch, label: ch, sets: [...sm.values()] }));
    if (bkind === "all") {
      const noBuy = shown.filter(e => !(e.buyIds || []).length);
      if (noBuy.length) gs.push({ id: "__nobuy", label: "No Buy Configured", sets: noBuy });
    }
    return gs;
  }, [view, shown, buys, bkind, buyPick]);

  // by-theme grouping: alpha order, No theme last
  const themeGroups = useMemo(() => {
    if (view !== "bytheme") return [];
    const m = new Map();
    for (const e of shown) { const t = themeOf(e); if (!m.has(t)) m.set(t, []); m.get(t).push(e); }
    return [...m.entries()].sort((a, b) =>
      a[0] === "No theme" ? 1 : b[0] === "No theme" ? -1 : a[0].localeCompare(b[0]));
  }, [view, shown]);

  // #12: New purchases vs Bulk/used (independent of the by-buy channel grouping)
  const condGroups = useMemo(() => {
    if (view !== "bycond") return [];
    const groups = { "Ō£© New purchases": [], "ŌÖ╗’ĖÅ Bulk / used": [] };
    for (const e of shown) groups[e.condition === "new" ? "Ō£© New purchases" : "ŌÖ╗’ĖÅ Bulk / used"].push(e);
    return Object.entries(groups).filter(([, l]) => l.length);
  }, [view, shown]);

  const filtersActive = !allTriage || themeM.length > 0 || condF !== "all" || incompleteOnly || buildingOnly || tagM.length > 0;
  const triageActive = allTriage ? "Triage" : `Triage ┬Ę ${filterM.length}`;
  const themeActive = themeM.length === 0 ? "Theme" : `Theme ┬Ę ${themeM.length}`;
  const seenMerch = useMemo(() => [...merch].sort((a, b) => b.dateAdded - a.dateAdded), [merch]);

  const segBar = html`<div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:12px">
    ${[["sets", `Sets ┬Ę ${index.length}`], ["merch", `Merch ┬Ę ${merch.length}`], ["mocs", `MOCs ┬Ę ${mocs.length}`], ["wtb", `WTB ┬Ę ${wtbLists.reduce((a, l) => a + (l.parts || []).filter(p => !p.got).length, 0)}`]].map(([id, label]) => html`
      <button key=${id} onClick=${() => setSeg(id)}
        style=${`flex:1;border:none;padding:9px 5px;border-radius:9px;font-weight:700;font-size:12px;` +
          (seg === id ? "background:var(--yellow);color:#1C1A17" : "background:transparent;color:var(--dim)")}>${label}</button>`)}
  </div>`;

  if (seg === "mocs") return html`<div key="seg-mocs">
    <${Header} title="MOCs" sub=${`${mocs.length} build${mocs.length === 1 ? "" : "s"}`} />
    ${segBar}
    <button class="btn" style="margin-bottom:12px" onClick=${() => setNewMoc(true)}>+ Add MOC</button>
    ${mocs.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
      No MOCs yet. Create one, then pull real parts in from your tracked sets ŌĆö the app remembers where every genuine piece came from.</div>`}
    ${[...mocs].sort((a, b) => b.dateAdded - a.dateAdded).map(m => {
      const s = mocStats(m);
      const src = (m.photoIds || [])[0] && photoSrc(m.photoIds[0]);
      const st = mocStatus(m.status);
      return html`<div key=${m.id} class="card row" style="cursor:pointer" onClick=${() => onOpenMoc(m.id)}>
        ${src ? html`<img class="setimg" style="object-fit:cover" src=${src}/>`
          : html`<div class="setimg" style="background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px">­¤¦®</div>`}
        <div style="flex:1;min-width:0">
          <div class="ellip" style="font-weight:700">${m.name}</div>
          <div class="dim mono" style="font-size:12px">${s.pcs} real pcs from ${s.sets} set${s.sets === 1 ? "" : "s"}${(m.pdfs || []).length ? " ┬Ę ­¤ōä" : ""}</div>
          <div class="row" style="margin-top:5px;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="badge" style=${m.status === "built"
              ? "color:#1C1A17;background:var(--green)"
              : `color:${st[2]};border:1px solid ${st[2]}`}>${st[1]}</span>
            ${resolveTags(tags, m.tags).length > 0 && html`<${TagChips} tags=${resolveTags(tags, m.tags)} small />`}
          </div>
        </div>
      </div>`;
    })}
    ${newMoc && html`<${MocSheet} initial=${null} onClose=${() => setNewMoc(false)}
      onSave=${m => { upsertMoc(m); setNewMoc(false); onOpenMoc(m.id); }} />`}
  </div>`;

  // WTB link label + a got-toggle that optionally syncs back to the linked SET (Settings ŌåÆ bt:wtbSync)
  const wtbLinkInfo = list => {
    if (list.linkType === "set") { const e = index.find(x => x.setNum === list.linkId); return { label: e ? `­¤¦▒ ${e.name}` : "­¤¦▒ (set removed)", kind: "set", ok: !!e }; }
    if (list.linkType === "moc") { const m = mocs.find(x => x.id === list.linkId); return { label: m ? `­¤¦® ${m.name}` : "­¤¦® (MOC removed)", kind: "moc", ok: !!m }; }
    return { label: "Standalone list", kind: null, ok: false };
  };
  // set a WTB part's "have" count (steppers / tap-to-fill). When it crosses to complete and the list
  // is set-linked, optionally mark those parts found in the set (per Settings ŌåÆ bt:wtbSync).
  const wtbSetHave = (list, part, newHave) => {
    const qty = part.qty || 1;
    const nv = Math.max(0, Math.min(qty, newHave));
    const oldHave = part.have != null ? part.have : (part.got ? qty : 0);
    const nowComplete = nv >= qty, wasComplete = oldHave >= qty;
    upsertWtbList({ ...list, parts: list.parts.map(p => p.id === part.id ? { ...p, have: nv, got: nowComplete } : p) });
    if (nowComplete && !wasComplete && list.linkType === "set" && list.linkId) {
      const mode = wtbSyncMode();
      const ok = mode === "auto" || (mode === "ask" && confirm(`Also mark ${qty}├Ś ${part.name || part.partNum} found in this set?`));
      if (ok) {
        const rec = structuredClone(load(`bt:set:${list.linkId}`, null));
        if (rec) {
          let remaining = qty;
          const rows = rec.parts.filter(sp => !sp.isSpare && partMatches(sp, part.partNum))
            .sort((a, b) => (((b.colorName || "").toLowerCase() === (part.colorName || "").toLowerCase()) - 0) - (((a.colorName || "").toLowerCase() === (part.colorName || "").toLowerCase()) - 0));
          for (const sp of rows) { if (remaining <= 0) break; const room = sp.qtyNeeded - sp.qtyFound; if (room > 0) { const add = Math.min(room, remaining); sp.qtyFound += add; remaining -= add; } }
          persistSet(rec);
        }
      }
    }
  };

  if (seg === "wtb") {
    const openList = openWtbId ? wtbLists.find(l => l.id === openWtbId) : null;
    if (openList) return html`<${WtbListDetail} key=${"wtb-" + openList.id} list=${openList} info=${wtbLinkInfo(openList)}
      mocs=${mocs} index=${index} tags=${tags} createTag=${createTag}
      onSetHave=${wtbSetHave} onUpdate=${upsertWtbList} syncMode=${wtbSyncMode()}
      onDelete=${() => { saveWtbLists(wtbLists.filter(l => l.id !== openList.id)); setOpenWtbId(null); }}
      onOpenLink=${() => { if (openList.linkType === "set") { setOpenWtbId(null); onOpen(openList.linkId); } else if (openList.linkType === "moc") { setOpenWtbId(null); onOpenMoc(openList.linkId); } }}
      onBack=${() => setOpenWtbId(null)} />`;
    return html`<div key="seg-wtb">
      <${Header} title="Want to buy" sub=${`${wtbLists.length} list${wtbLists.length === 1 ? "" : "s"}`} />
      ${segBar}
      ${!newWtb && html`<button class="btn" onClick=${() => { setNewWtb(true); setNewWtbName(""); }}>+ New want list</button>`}
      ${newWtb && html`<div class="card">
        <${Label}>New list name</${Label}>
        <div class="row" style="gap:8px">
          <input autofocus placeholder="e.g. PAB wall trip" value=${newWtbName} onInput=${e => setNewWtbName(e.target.value)} />
          <button class="step plus" style="width:54px" disabled=${!newWtbName.trim()}
            onClick=${() => { const l = { id: "wtb-" + Date.now(), name: newWtbName.trim(), linkType: null, linkId: null, dateAdded: Date.now(), parts: [] }; upsertWtbList(l); setNewWtb(false); setOpenWtbId(l.id); }}>Ō£ō</button>
          <button class="ghost" style="width:auto;padding:0 12px" onClick=${() => setNewWtb(false)}>Ō£Ģ</button>
        </div>
        <div class="dim" style="font-size:12px;margin-top:8px">Or push a set/MOC's missing parts into a list from its detail page ŌĆö that list links back two ways.</div>
      </div>`}
      <div style="height:10px"></div>
      ${wtbLists.length === 0 && html`<div class="card dim" style="text-align:center;padding:24px">
        No want lists yet. Make one here, or open a set/MOC and tap "Add missing to want list".</div>`}
      ${[...wtbLists].sort((a, b) => b.dateAdded - a.dateAdded).map(list => { const s = wtbStats(list), info = wtbLinkInfo(list);
        return html`<div key=${list.id} class="card row" style="gap:12px;cursor:pointer" onClick=${() => setOpenWtbId(list.id)}>
          <div class="setimg" style="width:44px;height:44px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${info.kind === "moc" ? "­¤¦®" : info.kind === "set" ? "­¤¦▒" : "­¤øÆ"}</div>
          <div style="flex:1;min-width:0">
            <div class="ellip" style="font-weight:700;font-size:15px">${list.name || "(unnamed)"}</div>
            <div class="dim" style="font-size:12px">${s.open} to get ┬Ę ${s.total} part${s.total === 1 ? "" : "s"}${info.kind ? ` ┬Ę ${info.label}` : ""}</div>
          </div>
          <span class="mono" style=${`font-size:12px;font-weight:800;flex-shrink:0;color:${s.pct >= 100 ? "var(--green)" : "var(--dim)"}`}>${s.pct}%</span>
          <span class="dim" style="flex-shrink:0">ŌĆ║</span>
        </div>`; })}
    </div>`;
  }

  const openMerchItem = openMerchId && openMerchId !== "__new" ? (merch.find(m => m.id === openMerchId) || null) : null;
  const merchSheet = (openMerchId === "__new" || (openMerchItem && editingMerch)) && html`<${MerchSheet}
    initial=${openMerchId === "__new" ? null : openMerchItem}
    buys=${buys} cats=${cats} addBuy=${addBuy}
    onClose=${() => { setEditingMerch(false); if (openMerchId === "__new") setOpenMerchId(null); }}
    onSave=${m => { upsertMerch(m); setEditingMerch(false); if (openMerchId === "__new") setOpenMerchId(m.id); }}
    onDelete=${() => { deleteMerch(openMerchId); setEditingMerch(false); setOpenMerchId(null); }} />`;

  // full-page read-only merch detail (replaces the list while open)
  if (seg === "merch" && openMerchItem) return html`<div key=${"seg-merch-detail-" + openMerchItem.id}>
    <${MerchDetail} m=${openMerchItem} buys=${buys} upsertMerch=${upsertMerch}
      onEdit=${() => setEditingMerch(true)}
      onBack=${() => { setEditingMerch(false); setOpenMerchId(null); }} />
    ${merchSheet}
  </div>`;

  if (seg === "merch") return html`<div key="seg-merch">
    <${Header} title="Merch" sub=${`${merch.length} item${merch.length === 1 ? "" : "s"}`} />
    ${segBar}
    <button class="btn" style="margin-bottom:12px" onClick=${() => setOpenMerchId("__new")}>+ Add merch</button>
    ${merch.length === 0 && html`<div class="card dim" style="text-align:center;padding:28px">
      No merch yet. Track LEGO-branded boxes, storage, displays ŌĆö anything that isn't a set.</div>`}
    ${seenMerch.map(m => {
      const linked = (m.buyIds || []).map(id => buys.find(b => b.id === id)).filter(Boolean);
      const src = (m.photoIds || [])[0] && photoSrc(m.photoIds[0]);
      return html`<div key=${m.id} class="card row" style="cursor:pointer" onClick=${() => setOpenMerchId(m.id)}>
        ${src ? html`<img class="setimg" style="object-fit:cover" src=${src}/>`
          : html`<div class="setimg" style="background:var(--panel2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:22px">­¤¦░</div>`}

// ---------- Add set (direct fetch + scan) ----------
function AddSet({ buys, cats, addBuy, existing, lastBuy, prefBuy, onCancel, onOpenExisting, onSave, onQuickSave }) {
  const [numRaw, setNumRaw] = useState("");
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState("");
  const [err, setErr] = useState("");
  const [dup, setDup] = useState(null); // already-tracked set number
  const [fetched, setFetched] = useState(null); // {meta, parts}
  const [buyIds, setBuyIds] = useState(() => prefBuy ? [prefBuy.id] : lastBuy ? [lastBuy.id] : []);
  const [scan, setScan] = useState(false);
  const [scanPart, setScanPart] = useState(null); // scan returned a PART, not a set
  // Request 1: when the scan matches a PART, resolve which SET(s) contain it on Rebrickable and let
  // you pick one to add ŌĆö instead of dead-ending. {stage:'busy'|'colors'|'sets'|'error', ...}
  const [pf, setPf] = useState(null);
  async function pfStart(it) {
    setPf({ stage: "busy", msg: "Looking up the partŌĆ”" });
    try {
      const part = await resolveRbPart(it.id);
      if (!part) { setPf({ stage: "error", msg: `Couldn't resolve "${it.name}" (${it.id}) on Rebrickable ŌĆö scan the box / instructions, or type the set number.` }); return; }
      const cj = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(part.part_num)}/colors/?page_size=200`);
      const colors = (cj.results || []).sort((a, b) => (b.num_sets || 0) - (a.num_sets || 0));
      if (!colors.length) { setPf({ stage: "error", msg: "No set data for this part on Rebrickable." }); return; }
      if (colors.length === 1) await pfSets(part, colors[0]);
      else setPf({ stage: "colors", part, colors });
    } catch (e) { setPf({ stage: "error", msg: e.message || String(e) }); }
  }
  async function pfSets(part, color) {
    setPf({ stage: "busy", msg: `Finding sets with ${color.color_name}ŌĆ”` });
    try {
      const j = await rbFetch(`https://rebrickable.com/api/v3/lego/parts/${encodeURIComponent(part.part_num)}/colors/${color.color_id}/sets/?page_size=50`);
      const sets = (j.results || []).sort((a, b) => (b.year || 0) - (a.year || 0));
      setPf({ stage: "sets", part, color, sets, count: j.count ?? sets.length });
    } catch (e) { setPf({ stage: "error", msg: e.message || String(e) }); }
  }
  const pfPick = s => { setPf(null); setScanPart(null); setNumRaw(s.set_num); go(s.set_num); };
  const [newReceipt, setNewReceipt] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  // mode: normal | quick | bulk (bulk implies quick) ŌĆö persisted via the two legacy keys
  const [quick, setQuickRaw] = useState(() => load("bt:quickadd", false));
  const [bulkMode, setBulkModeRaw] = useState(() => load("bt:bulkadd", false));
  const mode = quick ? (bulkMode ? "bulk" : "quick") : "normal";
  const setMode = m => {
    const q = m !== "normal", b = m === "bulk";
    setQuickRaw(q); save("bt:quickadd", q);
    setBulkModeRaw(b); save("bt:bulkadd", b);
  };
  const [savedMsg, setSavedMsg] = useState("");
  const key = getKey().trim();

  // #1: autosave an in-progress add as a draft so tabbing away (jump-to-top) never loses it.
  // Only for the general add flow (not when adding into a specific buy).
  const clearDraft = () => del("bt:addset:draft");
  useEffect(() => {
    if (prefBuy) return;
    const d = load("bt:addset:draft", null);
    if (d) { if (d.numRaw) setNumRaw(d.numRaw); if (Array.isArray(d.buyIds) && d.buyIds.length) setBuyIds(d.buyIds); if (d.fetched) setFetched(d.fetched); }
  }, []);
  useEffect(() => {
    if (prefBuy) return;
    if (numRaw || fetched) save("bt:addset:draft", { numRaw, buyIds, fetched });
    else del("bt:addset:draft");
  }, [numRaw, buyIds, fetched, prefBuy]);

  async function go(raw) {
    const setNum = normSetNum(raw);
    setErr(""); setSavedMsg(""); setDup(null);
    if (!key) { setErr("Add your Rebrickable key in Settings first."); return; }
    if (existing.includes(setNum)) { setDup(setNum); return; }
    setBusy(true);
    try {
      const r = await fetchFullSet(setNum, setProgress);
      if (quick) {
        const linked = buys.filter(b => buyIds.includes(b.id));
        const cond = defaultCondFromBuys(buyIds, buys);
        let rec = { ...r.meta, instructions: "none", triage: "undecided", condition: cond,
          built: false, pricePaid: 0, rrp: 0, box: { has: false, cond: "good", note: "" },
          buyIds: [...buyIds], notes: "", dateAdded: Date.now(), parts: r.parts, minifigs: r.minifigs || [] };
        if (cond === "new") rec = applyNewAutofill(rec);
        onQuickSave(rec, bulkMode);
        if (!bulkMode) clearDraft();
        if (bulkMode) { setNumRaw(""); setSavedMsg(`Saved ${r.meta.name} (${r.meta.setNum})${linked.length ? " ŌåÆ " + linked.map(b => b.label).join(" + ") : ""}`); }
      } else {
        setFetched(r);
      }
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false); setProgress("");
  }

  const MODE_HINT = {
    normal: "Fetch, review, then save manually.",
    quick: `Fetch auto-saves, linked to the buys below, then returns to ${prefBuy ? "the buy" : "the sets list"}.`,
    bulk: "Fetch auto-saves and stays here for the next set.",
  };
  const FETCH_LABEL = { normal: "Fetch set + inventory", quick: "Fetch + save", bulk: "Fetch + save (stay)" };
  const MODE_ON = { normal: "background:var(--line);color:var(--text)",
    quick: "background:var(--yellow);color:#1C1A17", bulk: "background:var(--purple);color:#1C1A17" };

  return html`<div>
    <${Header} title="Add set" sub=${prefBuy ? `into ${prefBuy.label}` : "Rebrickable direct"} onBack=${() => { clearDraft(); onCancel(); }} />
    <div class="row" style="background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:0;margin-bottom:6px">
      ${[["normal", "Normal"], ["quick", "ŌÜĪ Quick"], ["bulk", "Ōå╗ Bulk"]].map(([id, label]) => html`
        <button key=${id} onClick=${() => setMode(id)}
          style=${"flex:1;border:none;padding:9px 4px;border-radius:9px;font-weight:700;font-size:13px;" +
            (mode === id ? MODE_ON[id] : "background:transparent;color:var(--dim)")}>${label}</button>`)}
    </div>
    <div class="dim" style="font-size:12px;margin:0 2px 12px">${MODE_HINT[mode]}</div>
    ${savedMsg && html`<div class="card" style="color:var(--green);font-size:13px;font-weight:600">Ō£ō ${savedMsg}</div>`}
    ${!fetched && html`<div>
      <div class="card">
        <${Label}>Link to buy</${Label}>
        ${(() => {
          const chosen = buys.filter(b => buyIds.includes(b.id));
          const summary = chosen.length ? chosen.map(b => b.label).join("  +  ") : "No buy ŌĆö tap to link";
          return html`<button class="row" onClick=${() => setPickerOpen(v => !v)}
            style=${`width:100%;background:var(--panel2);border:1px solid ${chosen.length ? "var(--purple)" : "var(--line)"};border-radius:10px;padding:12px;color:var(--text);justify-content:space-between;text-align:left`}>
            <span class="ellip" style=${`font-weight:700;font-size:14px;min-width:0;flex:1;${chosen.length ? "" : "color:var(--dim)"}`}>${summary}</span>
            <span class="dim" style="flex-shrink:0">${pickerOpen ? "Ō¢┤" : "Ō¢Š"}</span>
          </button>`;
        })()}
        ${pickerOpen && html`<div style="margin-top:10px">
          ${(() => {
            const isToday = ts => { const a = new Date(ts), b = new Date();
              return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); };
            const todays = buys.filter(b => buyKind(b) === "regular" && isToday(b.date) && !buyIds.includes(b.id)).slice(-2).reverse();
            return html`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:8px">
              ${todays.map(b => html`<button key=${b.id} class="chip"
                style="border-color:var(--blue);color:var(--blue)"
                onClick=${() => setBuyIds([...buyIds, b.id])}>ŌÜĪ ${b.label}</button>`)}
              ${!newReceipt && html`<button class="chip" style="border-color:var(--line);color:var(--dim)"
                onClick=${() => setNewReceipt(true)}>’╝ŗ New receiptŌĆ”</button>`}
            </div>`;
          })()}
          ${newReceipt && html`<div style="margin-bottom:8px">
            <${BuyForm} categories=${cats} initial=${{ kind: "regular" }} submitLabel="Add receipt"
              onCancel=${() => setNewReceipt(false)}
              onAdd=${b => { addBuy(b); setBuyIds([...buyIds, b.id]); setNewReceipt(false); }} />
          </div>`}
          <${BuySelect} buys=${buys} cats=${cats} selected=${buyIds} onChange=${setBuyIds} onCreateBuy=${addBuy} />
          <div class="dim" style="font-size:12px;margin-top:8px">Defaults to the last bulk buy added to. ŌÜĪ chips link today's receipts. Applies to every set saved from this page. Receipt-linked sets save as ­¤øŹ’ĖÅ New (all parts auto-marked have).</div>
        </div>`}
      </div>
      <div class="card">
        <${Label}>Set number</${Label}>
        <input inputmode="numeric" placeholder="e.g. 75281 or 75281-1" value=${numRaw}
          onInput=${e => setNumRaw(e.target.value)} />
        <div style="height:10px"></div>
        <button class="btn" disabled=${busy || !numRaw.trim()} onClick=${() => go(numRaw)}>
          ${busy ? (progress || "FetchingŌĆ”") : FETCH_LABEL[mode]}
        </button>
        <div style="height:8px"></div>
        <button class="ghost" disabled=${busy} onClick=${() => setScan(true)}>­¤ōĘ Scan box / instructions / model</button>
      </div>
    </div>`}

    ${fetched && html`
      <div class="card row">
        ${fetched.meta.img && html`<img class="setimg" style="width:72px;height:72px" src=${fetched.meta.img}/>`}
        <div>
          <div style="font-weight:700">${fetched.meta.name}</div>
          <div class="dim mono" style="font-size:12px">${fetched.meta.setNum} ┬Ę ${fetched.meta.year} ┬Ę ${fetched.meta.numParts} parts ┬Ę ${fetched.parts.length} inventory rows</div>
        </div>
      </div>
      <div class="card">
        <button class="btn green" onClick=${() => {
          const cond = defaultCondFromBuys(buyIds, buys);
          let rec = { ...fetched.meta, instructions: "none", triage: "undecided", condition: cond,
            built: false, pricePaid: 0, rrp: 0, box: { has: false, cond: "good", note: "" },
            buyIds, notes: "", dateAdded: Date.now(), parts: fetched.parts, minifigs: fetched.minifigs || [] };
          if (cond === "new") rec = applyNewAutofill(rec);
          clearDraft();
          onSave(rec);
        }}>Save set</button>
        <div style="height:8px"></div>
        <button class="ghost" onClick=${() => setFetched(null)}>Back</button>
      </div>`}

    ${dup && html`<div class="card">
      <div style="font-weight:700;margin-bottom:4px">${dup} is already tracked</div>
      <div class="dim" style="font-size:13px;margin-bottom:10px">Open it to log more parts, or dismiss and keep adding.</div>
      <div class="row" style="gap:8px">
        <button class="btn" style="flex:1" onClick=${() => onOpenExisting(dup)}>Open set</button>
        <button class="ghost" style="flex:1" onClick=${() => { setDup(null); setNumRaw(""); }}>Dismiss</button>
      </div>
    </div>`}
    ${err && html`<div class="card" style="color:var(--red);font-size:13px">${err}</div>`}
    ${scanPart && html`<div class="card">
      <div class="row" style="gap:10px;margin-bottom:8px">
        ${scanPart.img_url && html`<img class="setimg" src=${scanPart.img_url}/>`}
        <div style="min-width:0">
          <div style="font-weight:700">Scan matched a part</div>
          <div class="dim mono" style="font-size:12px">${scanPart.name} ┬Ę ${scanPart.id}</div>
        </div>
      </div>
      <div class="dim" style="font-size:13px;margin-bottom:10px">Find which set${pf?.stage === "sets" && pf.count !== 1 ? "s" : ""} this part belongs to, then add it ŌĆö or scan the box / instructions for a direct set match.</div>
      ${pf?.stage === "busy" && html`<div class="dim" style="text-align:center;padding:6px">${pf.msg}</div>`}
      ${pf?.stage === "error" && html`<div class="card" style="color:var(--red);font-size:13px;margin:0 0 8px">${pf.msg}</div>`}
      ${pf?.stage === "colors" && html`<div style="margin-bottom:8px">
        <${Label}>${pf.part.name} ŌĆö pick the colour in hand</${Label}>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:260px;overflow:auto">
          ${pf.colors.map(c => html`<button key=${c.color_id} class="chip" style="border-color:var(--blue);color:var(--blue);text-align:left"
            onClick=${() => pfSets(pf.part, c)}>${c.color_name} ┬Ę ${c.num_sets ?? "?"} sets</button>`)}
        </div>
      </div>`}
      ${pf?.stage === "sets" && html`<div style="margin-bottom:8px">
        <div class="label" style="margin:0 2px 6px">${pf.count} set${pf.count === 1 ? "" : "s"} with this part${pf.count > 50 ? " (showing 50)" : ""} ┬Ę tap to add</div>
        ${pf.sets.length === 0 && html`<div class="card dim" style="text-align:center">No sets found for this colour.</div>`}
        <div style="max-height:300px;overflow:auto">
          ${pf.sets.map(s => { const tracked = existing.includes(s.set_num);
            return html`<div key=${s.set_num} class="row" style="gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:5px;cursor:pointer" onClick=${() => pfPick(s)}>
              ${s.set_img_url ? html`<img class="setimg" style="width:44px;height:44px" src=${s.set_img_url} loading="lazy"/>` : html`<div class="setimg" style="width:44px;height:44px;background:var(--panel2)"></div>`}
              <div style="flex:1;min-width:0">
                <div class="ellip" style="font-weight:700;font-size:13px">${s.name}</div>
                <div class="dim mono" style="font-size:11px">${s.set_num} ┬Ę ${s.year}${s.num_parts ? ` ┬Ę ${s.num_parts} parts` : ""}${tracked ? " ┬Ę tracked" : ""}</div>
              </div>
            </div>`; })}
        </div>
      </div>`}
      <div class="row" style="gap:8px">
        ${!pf && html`<button class="btn blue" style="flex:1" onClick=${() => pfStart(scanPart)}>­¤öÄ Find the set</button>`}
        <a class="ghost" style="flex:1;display:flex;align-items:center;justify-content:center;text-decoration:none" href=${blPartInSets(scanPart.id)} target="_blank">BrickLink ŌåŚ</a>
        <button class="ghost" style="flex:1" onClick=${() => { setScanPart(null); setPf(null); }}>Dismiss</button>
      </div>
    </div>`}
    ${scan && html`<${ScanModal} hint="Scan the box, instructions, or a built model" onClose=${() => setScan(false)}
      onPick=${it => { setScan(false); setScanPart(null); setPf(null);
        if ((it.type || "").toLowerCase() === "set") { setNumRaw(it.id); go(it.id); }
        else { setScanPart(it); pfStart(it); } }} />`}
  </div>`;
}

// ---------- Set detail ----------
function SetDetail({ setNum, buys, cats, addBuy, persistSet, mocs = [], upsertMoc, wtbLists = [], pushMissingToWtb, tags = [], createTag, onBack, onDelete }) {
  const [rec, setRec] = useState(() => load(`bt:set:${setNum}`, null));
  const [tagPick, setTagPick] = useState(false);
  const [recatTick, setRecatTick] = useState(0); // bump to recompute type grouping after a recategorise
  const [q, setQ] = useState("");
  const [showSpares, setShowSpares] = useState(false);
  const [hideFound, setHideFound] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [lastAct, setLastAct] = useState(null); // {id, applied, qty, ts} ŌĆö tiny "just changed" hint under a row
  // #3: opening a set always starts at the top (the shared .content kept the list's scroll position)
  useEffect(() => { document.querySelector(".content")?.scrollTo({ top: 0 }); }, []);
  const [openColors, setOpenColors] = useState(() => new Set());
  const [moveP, setMoveP] = useState(null); // part row being pushed to a MOC
  const [bulkMoc, setBulkMoc] = useState(false); // #7 bulk-move selected parts to a MOC (picker open)
  const [savedMsg2, setSavedMsg2] = useState(""); // transient "added to want list" confirmation
  const [groupMode, setGroupModeRaw] = useState(() => load("bt:partgroup", "group")); // group | exact
  const setGroupMode = v => { setGroupModeRaw(v); save("bt:partgroup", v); };
  // accordion open state (item 3/5): collapsed by default when the set is New
  const initCond = condOfSet(load(`bt:set:${setNum}`, {}) || {});
  const ACC_IDS = ["value", "triage", "instr", "box", "meta"];
  const [openAcc, setOpenAcc] = useState(() => new Set(initCond === "new" ? [] : ["triage"]));
  const toggleAcc = id => setOpenAcc(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const allAccOpen = ACC_IDS.every(id => openAcc.has(id));
  // photo gallery (item 7): catalog image + BrickLink box image (hotlink-tested per set via onerror)
  const [boxImgOk, setBoxImgOk] = useState(true);
  const [galleryAt, setGalleryAt] = useState(null); // null | index
  // parts multi-select ŌĆö checkboxes are always shown; the batch bar appears when any are ticked
  const [selIds, setSelIds] = useState(() => new Set());
  // ticking a part only SELECTS it (it doesn't change the count) ŌĆö apply with the batch
  // "Mark N as have" / "Mark N as not have" bar at the bottom. (Reverted the auto-mark-on-tick.)
  const toggleSelPart = id => {
    setSelIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  };
  const [viewPart, setViewPart] = useState(null); // #3 full-size part image
  const toggleColor = c => setOpenColors(prev => {
    const n = new Set(prev); n.has(c) ? n.delete(c) : n.add(c); return n;
  });
  // per-part-row MOC allocations for this set
  const rowAlloc = useMemo(() => {
    const m = new Map();
    for (const mo of mocs) for (const a of (mo.parts || [])) {
      if (a.setNum !== setNum || a.qty <= 0) continue;
      if (!m.has(a.partRowId)) m.set(a.partRowId, []);
      m.get(a.partRowId).push({ mocId: mo.id, mocName: mo.name, qty: a.qty });
    }
    return m;
  }, [mocs, setNum]);
  const mocTotal = useMemo(() => { let t = 0; for (const l of rowAlloc.values()) for (const x of l) t += x.qty; return t; }, [rowAlloc]);
  const doMove = (p, mocId, qty) => {
    const mo = mocs.find(m => m.id === mocId);
    if (!mo || qty < 1) return;
    const parts = [...(mo.parts || [])];
    const i = parts.findIndex(a => a.setNum === setNum && a.partRowId === p.id);
    if (i >= 0) parts[i] = { ...parts[i], qty: parts[i].qty + qty };
    else parts.push({ id: `${Date.now()}${Math.random().toString(36).slice(2, 6)}`, setNum, setName: rec.name,
      partRowId: p.id, partNumber: p.partNumber, partName: p.partName, colorID: p.colorID, colorName: p.colorName,
      img: p.img, qty });
    upsertMoc({ ...mo, parts, status: mo.status === "disassembled" ? "building" : mo.status });
    setMoveP(null);
  };
  // #7: bulk-move every selected part's available qty into one MOC in a single upsert
  const doBulkMove = mocId => {
    const mo = mocs.find(m => m.id === mocId);
    if (!mo) return;
    const parts = [...(mo.parts || [])];
    for (const id of selIds) {
      const p = rec.parts.find(x => x.id === id);
      if (!p) continue;
      const avail = Math.max(0, p.qtyFound - allocatedRow(mocs, setNum, p.id));
      if (avail < 1) continue;
      const i = parts.findIndex(a => a.setNum === setNum && a.partRowId === p.id);
      if (i >= 0) parts[i] = { ...parts[i], qty: parts[i].qty + avail };
      else parts.push({ id: `${Date.now()}${Math.random().toString(36).slice(2, 6)}${p.id}`, setNum, setName: rec.name,
        partRowId: p.id, partNumber: p.partNumber, partName: p.partName, colorID: p.colorID, colorName: p.colorName, img: p.img, qty: avail });
    }
    upsertMoc({ ...mo, parts, status: mo.status === "disassembled" ? "building" : mo.status });
    save("bt:lastMoc", mocId);
    setBulkMoc(false); setSelIds(new Set());
  };
  if (!rec) return html`<div class="card">Set not found in storage. <button class="ghost" onClick=${onBack}>Back</button></div>`;
  const { pct, found, total } = completion(rec.parts);
  const logMode = rec.logMode === "remaining" ? "remaining" : "find";
  const rstats = remainingStats(rec);

  const change = mut => setRec(prev => { const next = mut(structuredClone(prev)); persistSet(next); return next; });
  // #1: record the applied delta so the row can show a tiny "just changed ŌåÆ x/y" hint (e kept
  // re-counting because she couldn't tell whether a tap had registered).
  const bump = (id, d) => {
    let act = null;
    // delta computed INSIDE the updater (against the latest pending clone) so rapid +1 taps
    // accumulate correctly; capture the applied result for the "just changed" hint.
    change(r => {
      const p = r.parts.find(x => x.id === id);
      if (p) {
        const floor = (rowAlloc.get(id) || []).reduce((a, x) => a + x.qty, 0);
        const before = p.qtyFound;
        p.qtyFound = Math.max(floor, Math.max(0, Math.min(p.qtyNeeded, before + d)));
        if (p.qtyFound !== before) act = { id, applied: p.qtyFound - before, qty: p.qtyFound, needed: p.qtyNeeded, ts: Date.now() };
      }
      return r;
    });
    if (act) setLastAct(act);
  };
  // #1: reset every part count so e can recount from scratch ŌĆö back to 0, or the MOC-allocated
  // floor so existing allocations stay valid. Also clears Built (a recount supersedes it).
  const resetCounts = () => {
    change(r => {
      for (const p of r.parts) { const floor = (rowAlloc.get(p.id) || []).reduce((a, x) => a + x.qty, 0); p.qtyFound = floor; }
      if (r.built) { r.built = false; delete r.builtFill; }
      return r;
    });
    setLastAct(null); setConfirmReset(false);
  };
  // #5: tap a row in select mode ŌåÆ mark all present; tap again ŌåÆ back to the MOC-allocated floor (or 0)
  const groups = useMemo(() => {
    const ql = q.trim().toLowerCase();
    const list = rec.parts.filter(p =>
      // #3: hiding spares still surfaces spares you've actually logged (qtyFound > 0) so they don't vanish
      !isExcludedPart(p) && (showSpares || !p.isSpare || p.qtyFound > 0) && (!hideFound || p.qtyFound < p.qtyNeeded) &&
      (!ql || p.partName?.toLowerCase().includes(ql) || p.partNumber?.toLowerCase().includes(ql) || p.colorName?.toLowerCase().includes(ql)));
    const keyOf = p => groupMode === "group" ? colorGroup(p.colorName)
      : groupMode === "type" ? partType(p.partName, p.partNumber)
      : (p.colorName || "Unknown");
    const map = new Map();
    for (const p of list) { const k = keyOf(p); if (!map.has(k)) map.set(k, []); map.get(k).push(p); }
    const entries = [...map.entries()];
    if (groupMode === "group") {
      entries.sort((a, b) => groupRank(a[0]).localeCompare(groupRank(b[0])));
      for (const [, l] of entries) l.sort((a, b) => `${a.colorName}|${a.partName}`.localeCompare(`${b.colorName}|${b.partName}`));
    } else if (groupMode === "type") {
      entries.sort((a, b) => typeRank(a[0]).localeCompare(typeRank(b[0])));
      for (const [, l] of entries) l.sort((a, b) => `${a.partName}|${a.colorName}`.localeCompare(`${b.partName}|${b.colorName}`));
    } else {
      entries.sort((a, b) => a[0].localeCompare(b[0]));
    }
    return entries;
  }, [rec.parts, q, showSpares, hideFound, groupMode, recatTick]);

  const cond = condOfSet(rec);
  const isNew = cond === "new";
  const photos = [
    { src: rec.img, label: "Catalog", kind: "rb" },
    ...(boxImgOk ? [{ src: blBoxImg(rec.setNum), label: "Box (BrickLink)", kind: "box" }] : []),
  ].filter(p => p.src);
  const defaultIdx = Math.max(0, photos.findIndex(p => p.kind === (rec.imgDefault === "box" ? "box" : "rb")));
  const setCondition = c => {
    if (c === cond) return;
    if (c === "new") {
      const fill = confirm("Mark as bought new ŌĆö auto-mark ALL parts + spares as have, instructions ŌåÆ Book ├Ś1 Excellent, box ŌåÆ Yes Excellent, triage ŌåÆ Keep?");
      change(r => fill ? applyNewAutofill({ ...r, condition: "new" }) : ({ ...r, condition: "new" }));
      setOpenAcc(new Set()); // values pre-filled ŌĆö collapse everything
    } else {
      const unset = confirm("Switch to used ŌĆö also clear the auto-filled data? (all parts ŌåÆ 0 found, instructions ŌåÆ None, box ŌåÆ None, triage ŌåÆ Undecided)");
      change(r => {
        r.condition = "used";
        if (unset) {
          for (const p of r.parts) p.qtyFound = 0;
          r.instructions = "none"; r.booklets = [];
          r.box = { has: false, cond: "good", note: r.box?.note || "" };
          r.triage = "undecided";
        }
        return r;
      });
      setOpenAcc(new Set(ACC_IDS.filter(id => id !== "value"))); // back to triaging ŌĆö expand
    }
  };
  // status line priority (approved item-4 model): MOC > Built > complete (new) > x/y found
  const statusLine = mocTotal > 0 ? html`<span style="color:var(--blue);font-weight:700">ŌÖ╗’ĖÅ ${mocTotal} parts in MOCs</span>`
    : rec.built ? html`<span style="color:var(--green);font-weight:700">Built Ō£ō ┬Ę ${total} parts</span>`
    : isNew && found >= total ? html`<span>${total} parts ┬Ę <span style="color:var(--green);font-weight:700">complete</span></span>`
    : html`<span>${found} / ${total} parts found</span>`;

  // #7: per-set logging mode. Find = tick parts up as found. Remaining = start full, tick down what's
  // physically left after a part-out; the rest is inferred parted out (canonical set count retained).
  const setLogMode = next => {
    if (next === logMode) return;
    if (next === "remaining") {
      if (!confirm("Switch to Remaining mode? This set becomes a part-out donor: it's marked as full (all parts in set), then you tick OFF what you've removed. The set's total count is kept.")) return;
      change(r => { r.logMode = "remaining"; for (const p of r.parts) if (!isExcludedPart(p) && !p.isSpare) p.qtyFound = p.qtyNeeded; return r; });
    } else {
      change(r => { r.logMode = "find"; return r; });
    }
  };
  const numCol = rstats.had >= rstats.needed ? "var(--green)" : "var(--red)";
  const remainingCounter = html`<div style="font-size:14px;font-weight:700">
    <span style=${`color:${numCol}`}>${rstats.had}</span><span class="dim" style="font-weight:600">/${rstats.needed} pcs in set</span>
    <div class="row" style="gap:6px;flex-wrap:wrap;margin-top:6px">
      ${rstats.parted === 0 && rstats.missing === 0
        ? html`<span class="badge" style="color:var(--green);border:1px solid var(--green)">Ō£ō Full</span>`
        : html`<span class="badge" style="color:var(--yellow);border:1px solid var(--yellow)">${rstats.remaining} left</span>
               <span class="badge" style="color:var(--purple);border:1px solid var(--purple)">${rstats.parted} parted</span>`}
      ${rstats.missing > 0 && html`<span class="badge" style="color:var(--red);border:1px solid var(--red)">${rstats.missing} missing</span>`}
    </div>
  </div>`;

  const myTags = resolveTags(tags, rec.tags);
  return html`<div>
    <${Header} title=${rec.name} sub=${html`<span>${rec.setNum} ┬Ę ${rec.year} ┬Ę <a href=${instrHref(rec.setNum)} target="_blank">­¤ō¢ Instructions ŌåŚ</a></span>`} onBack=${onBack} />
    <div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:10px">
      ${myTags.length > 0 && html`<${TagChips} tags=${myTags} />`}
      <button class="chip" style="border-color:var(--purple);color:var(--purple)" onClick=${() => setTagPick(true)}>­¤ÅĘ ${myTags.length ? "Edit tags" : "Add tags"}</button>
    </div>
    <div class="card">
      <div class="row" style="gap:14px">
        ${photos.length > 0 && html`<img class="setimg" style="width:72px;height:72px" src=${photos[defaultIdx]?.src || rec.img}
          onClick=${() => setGalleryAt(defaultIdx)}/>`}
        <div style="flex:1;min-width:0">
          <div class="row" style="gap:6px;flex-wrap:wrap">
            <button class="badge" style=${isNew ? "background:var(--green);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => setCondition("new")}>­¤øŹ’ĖÅ NEW</button>
            <button class="badge" style=${!isNew ? "background:var(--yellow);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => setCondition("used")}>­¤öä USED</button>
            <button class="badge" style=${rec.built ? "background:var(--green);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => change(r => {
                if (!r.built) {
                  // mark Built ŌåÆ fill every unticked main part, remembering its prior count so un-building
                  // can undo cleanly without wiping parts you'd already found by hand.
                  r.built = true;
                  const fill = {};
                  for (const p of r.parts) {
                    if (isExcludedPart(p) || p.isSpare) continue;
                    if (p.qtyFound < p.qtyNeeded) { fill[p.id] = p.qtyFound; p.qtyFound = p.qtyNeeded; }
                  }
                  r.builtFill = fill;
                } else {
                  // un-build ŌåÆ restore exactly what Built auto-filled, leaving manual counts alone
                  r.built = false;
                  const fill = r.builtFill || {};
                  for (const p of r.parts) if (Object.prototype.hasOwnProperty.call(fill, p.id)) p.qtyFound = fill[p.id];
                  delete r.builtFill;
                }
                if (r.built) r.building = false; // built supersedes the in-progress marker
                return r;
              })}>Built ${rec.built ? "Ō£ō" : ""}</button>
            <button class="badge" style=${rec.building ? "background:var(--yellow);color:#1C1A17;border:none;padding:4px 9px" : "background:transparent;color:var(--dim);border:1px solid var(--line);padding:4px 9px"}
              onClick=${() => change(r => { r.building = !r.building; return r; })}>­¤ö© Building ${rec.building ? "Ō£ō" : ""}</button>
            ${rec.box?.has && html`<span class="badge" style="color:var(--blue);border:1px solid var(--blue)">­¤ō”</span>`}
          </div>
          <div class="dim" style="font-size:13px;margin-top:6px">${logMode === "remaining" ? remainingCounter : statusLine}</div>
          ${pct >= 90 && pct < 100 && !isNew && html`<div style="font-size:12px;color:var(--green);font-weight:700;margin-top:2px">Near complete ŌĆö worth buying the gap?</div>`}
          <a href=${blHref(rec.setNum)} target="_blank" style="font-size:13px;font-weight:600">BrickLink price guide ŌåŚ</a>
        </div>
        ${logMode === "remaining"
          ? html`<${RemainingRing} needed=${rstats.needed} remaining=${rstats.remaining} parted=${rstats.parted} missing=${rstats.missing} size=${64} />`
